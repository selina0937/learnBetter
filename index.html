<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Noto+Sans+TC:wght@400;700&display=swap');

:root { --brand: #4f46e5; }

}

.no-print { display: none !important; }
.print-only { display: block !important; }
body { background: white !important; padding: 0 !important; }
.report-card { border: 1px solid #eee !important; width: 100% !important; margin: 0 !important; box-shadow: none !important; }
}
.print-only { display: none; }

.loader {

animation: rotation 1s linear infinite;
}
@keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

.matrix-grid {
display: grid;
grid-template-columns: repeat(2, 1fr);

}
@media (max-width: 768px) { .matrix-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body class="min-h-screen">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, Fragment } = React;

// --- 子組件：圖標渲染 ---
function Icon({ name, className = "w-6 h-6" }) {
const paths = {
brain: <path d="M12 2a5 5 0 0 1 5 5c0 1.25-.46 2.39-1.21 3.26A5 5 0 0 1 12 19a5 5 0 0 1-3.79-8.74A5 5 0 0 1 7 7a5 5 0 0 1 5-5z" />,
compass: <g><circle cx="12" cy="12" r="10"/><path d="m16.24 7.76-1.42 4.24-4.24 1.42 1.42-4.24 4.24-1.42Z"/></g>,
zap: <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />,
check: <polyline points="20 6 9 17 4 12" />,
alert: <g><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y1="16"/></g>,
file: <g><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></g>,
crown: <path d="m2 4 3 12h14l3-12-6 7-4-7-4 7-6-7zm3 16h14" />,
chevronRight: <polyline points="9 18 15 12 9 6" />,
chevronLeft: <polyline points="15 18 9 12 15 6" />,
coins: <g><circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8"/></g>,
shield: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />,
map: <path d="M1 6v16l7-4 8 4 7-4V2l-7 4-8-4-7 4zm7-2v16m8-12v16" />
};
return (
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
{paths[name] || <circle cx="12" cy="12" r="10" />}
</svg>
);
}

// --- 子組件：專業報告樣板 ---
function PrintableReport({ data }) {
return (
<div className="p-16 bg-white text-slate-900 report-card min-h-screen border-t-8 border-indigo-600 text-left">
<div className="flex justify-between items-start mb-12 border-b pb-8">
<div>
<h1 className="text-4xl font-extrabold text-indigo-950 mb-2 uppercase tracking-tight">Decision Audit Executive Summary</h1>
<p className="text-slate-500 font-bold uppercase tracking-widest text-sm">COGNAV Pro - 三系統決策審計報告</p>
</div>
<div className="text-right text-xs text-slate-400 font-bold uppercase">
<p>Generated: {new Date().toLocaleDateString()}</p>
<p>License: Commercial v4.6</p>
</div>
</div>
<div className="space-y-12">
<section>
<h3 className="text-xs font-black text-orange-500 uppercase tracking-[0.2em] mb-4">Phase 1: Raw Intuition</h3>
<div className="bg-slate-50 p-6 rounded-2xl text-xl font-medium border-l-4 border-orange-500 italic">"{data.decision || "N/A"}"</div>
</section>
<section>
<h3 className="text-xs font-black text-blue-500 uppercase tracking-[0.2em] mb-4 text-left">Phase 2: Logical Audit Matrix</h3>
<div className="grid grid-cols-2 gap-6 pl-2">
<div className="p-4 bg-slate-50 rounded-xl border border-slate-100">
<p className="text-[10px] font-black uppercase text-indigo-400 mb-1">事前驗屍 (Pre-mortem)</p>
<p className="text-sm font-bold">{data.matrix.preMortem || "未填寫"}</p>
</div>
<div className="p-4 bg-slate-50 rounded-xl border border-slate-100">
<p className="text-[10px] font-black uppercase text-blue-400 mb-1">基礎比率 (Base Rate)</p>
<p className="text-sm font-bold">{data.matrix.baseRate || "未填寫"}</p>
</div>
<div className="p-4 bg-slate-50 rounded-xl border border-slate-100">
<p className="text-[10px] font-black uppercase text-orange-400 mb-1">外部視角 (External View)</p>
<p className="text-sm font-bold">{data.matrix.externalView || "未填寫"}</p>
</div>
<div className="p-4 bg-slate-50 rounded-xl border border-slate-100">
<p className="text-[10px] font-black uppercase text-emerald-400 mb-1">二階效應 (Second-order)</p>
<p className="text-sm font-bold">{data.matrix.secondOrder || "未填寫"}</p>
</div>
</div>
</section>
<section>
<h3 className="text-xs font-black text-indigo-500 uppercase tracking-[0.2em] mb-4">Phase 3: Visual Identity Simulation</h3>
<div className="bg-indigo-50 p-8 rounded-3xl text-indigo-950 leading-relaxed whitespace-pre-wrap font-medium border border-indigo-100 italic">
{data.futureScript || "模擬劇本未生成。"}
</div>
</section>
<section>
<h3 className="text-xs font-black text-emerald-500 uppercase tracking-[0.2em] mb-4">Phase 4: Behavioral Action Nudges</h3>
<div className="bg-emerald-50/50 p-8 rounded-3xl text-emerald-950 leading-relaxed whitespace-pre-wrap font-bold border border-emerald-100">
{data.nudges || "助推方案未生成。"}
</div>
</section>
</div>
<div className="mt-20 pt-10 border-t flex justify-between items-end opacity-40">
<div className="text-[10px] text-slate-300 font-bold uppercase">© 2024 COGNAV LABS. ALL RIGHTS RESERVED.</div>
</div>
</div>
);
}

// --- 主應用組件 ---
export default function App() {
const [view, setView] = useState('audit'); // audit | pricing | roadmap
const [step, setStep] = useState(1);
const [credits, setCredits] = useState(10);
const [isAiLoading, setIsAiLoading] = useState(false);
const [aiError, setAiError] = useState(null);

const [data, setData] = useState({
decision: '',
matrix: { preMortem: '', baseRate: '', externalView: '', secondOrder: '' },
futureScript: '',
nudges: ''
});

// 當進入 Step 4 時自動觸發助推生成
useEffect(() => {
if (step === 4 && !data.nudges && data.futureScript) {
generateNudges();
}
}, [step]);

// 核心後端呼叫 (帶入點數校驗與更新)
const callAiService = async (prompt, type) => {
if (credits <= 0) throw new Error("點數不足，請前往儲值頁面。");

const response = await fetch('/api/cognav', {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify({ prompt, type, currentCredits: credits })
});

const resData = await response.json();
if (!response.ok) throw new Error(resData.error || "系統異常");

// 成功後更新前端點數
setCredits(resData.newBalance);
return resData.text;
};

const generateFutureScript = async () => {
if (!data.decision) return;
setIsAiLoading(true); setAiError(null);
try {
const prompt = `你是認知科學與心理學專家。針對我的決策：『${data.decision}』。
請寫一段約 600 字、具備極高感官細節的「未來成功模擬劇本」。
內容要求：
1. 禁止前言、禁止說「好的」、禁止說「身為專家」，直接從具體細節開始。
2. 描述一年後成功的具體週二下午。空氣中的味道、陽光落下的角度、周遭細微的聲音。
3. 描述你對這個決定的情感認同，以及它如何讓你成為了理想中的自己。
4. 內容要深刻，要有文學感染力，字數必須充足。`;
const text = await callAiService(prompt, "script");
setData(prev => ({...prev, futureScript: text}));
} catch (e) { setAiError(e.message); }
finally { setIsAiLoading(false); }
};

const generateNudges = async () => {
setIsAiLoading(true);
try {
const prompt = `你是行為經濟學家。根據決策：『${data.decision}』與審計矩陣：${JSON.stringify(data.matrix)}。
請提供 3 個極其具體的「環境助推（Nudge）」方案。
要求：禁止廢話與引言，直接條列。方案 1 關於環境阻力，方案 2 關於視覺提醒，方案 3 關於預設執行路徑。`;
const text = await callAiService(prompt, "nudge");
setData(prev => ({...prev, nudges: text}));
} catch (e) { setAiError(e.message); }
finally { setIsAiLoading(false); }
};

return (
<div className="min-h-screen pb-12 selection:bg-indigo-100 transition-all duration-300">
{/* Header */}
<nav className="no-print w-full px-8 py-4 flex justify-between items-center glass-card sticky top-0 z-50">
<div className="flex items-center gap-3 cursor-pointer group" onClick={()=>{setView('audit'); setStep(1);}}>
<div className="bg-indigo-600 p-2.5 rounded-2xl text-white shadow-lg shadow-indigo-200 group-hover:scale-110 transition-transform">
<Icon name="compass" className="w-5 h-5" />
</div>
<span className="font-extrabold text-2xl tracking-tighter">COGNAV <span className="text-indigo-600 text-sm">PRO</span></span>
</div>
<div className="flex items-center gap-4 md:gap-10">
<button onClick={()=>setView('audit')} className={`text-xs font-black uppercase tracking-widest ${view === 'audit' ? 'text-indigo-600 border-b-2 border-indigo-600 pb-1' : 'text-slate-400 hover:text-slate-600'}`}>決策審計</button>
<button onClick={()=>setView('roadmap')} className={`text-xs font-black uppercase tracking-widest ${view === 'roadmap' ? 'text-indigo-600 border-b-2 border-indigo-600 pb-1' : 'text-slate-400 hover:text-slate-600'}`}>產品路徑</button>
<button onClick={()=>setView('pricing')} className="px-5 py-2.5 bg-slate-900 text-white rounded-2xl text-[10px] font-black uppercase tracking-[0.2em] hover:bg-indigo-600 transition-all flex items-center gap-2 shadow-xl shadow-slate-200">
<Icon name="coins" className="w-3.5 h-3.5" /> Credits：{credits}
</button>
</div>
</nav>

<main className="no-print max-w-5xl mx-auto py-12 px-6">
{view === 'audit' && (
<div className="bg-white rounded-[3.5rem] shadow-2xl border border-white p-8 md:p-14 min-h-[600px] flex flex-col justify-between fade-in relative overflow-hidden text-left">
<div className="relative z-10">
{step === 1 && (
<div className="fade-in">
<div className="flex items-center gap-3 text-orange-500 mb-8 font-black uppercase tracking-widest text-xs"><Icon name="brain" className="w-4 h-4" /> System 1 Baseline</div>
<h2 className="text-4xl font-extrabold mb-4 tracking-tighter text-slate-900 leading-tight">捕捉原始直覺</h2>
<p className="text-slate-500 mb-10 font-medium text-lg">在理智介入前，寫下大腦最初始的想法。不必過濾，真實就好。</p>
<textarea className="w-full p-8 bg-slate-50 border-2 border-slate-100 rounded-[2.5rem] h-56 outline-none focus:border-indigo-500 font-medium text-xl shadow-inner transition-all focus:bg-white" placeholder="例如：我想全職創業賣倉鼠周邊商品..." value={data.decision} onChange={(e)=>setData({...data, decision: e.target.value})} />
</div>
)}

{step === 2 && (
<div className="fade-in">
<div className="flex items-center gap-3 text-blue-500 mb-8 font-black uppercase tracking-widest text-xs"><Icon name="check" className="w-4 h-4" /> System 2 Matrix Audit</div>
<h2 className="text-4xl font-extrabold mb-10 tracking-tighter text-slate-900 font-inter leading-tight">深度決策審計矩陣</h2>
<div className="matrix-grid">
<div className="p-6 bg-slate-50 rounded-[2rem] border-2 border-slate-100 focus-within:border-indigo-500 transition-all">
<label className="text-[10px] font-black uppercase text-indigo-500 tracking-widest mb-3 block">事前驗屍法 (Pre-mortem)</label>
<textarea className="w-full bg-transparent border-none outline-none text-sm h-24 font-bold" placeholder="想像一年後失敗了，死因可能是什麼？" value={data.matrix.preMortem} onChange={(e)=>setData({...data, matrix:{...data.matrix, preMortem: e.target.value}})} />
</div>
<div className="p-6 bg-slate-50 rounded-[2rem] border-2 border-slate-100 focus-within:border-blue-500 transition-all">
<label className="text-[10px] font-black uppercase text-blue-500 tracking-widest mb-3 block">基礎比率 (Base Rate)</label>
<textarea className="w-full bg-transparent border-none outline-none text-sm h-24 font-bold" placeholder="類似決策在市場上的統計成功率是多少？" value={data.matrix.baseRate} onChange={(e)=>setData({...data, matrix:{...data.matrix, baseRate: e.target.value}})} />
</div>
<div className="p-6 bg-slate-50 rounded-[2rem] border-2 border-slate-100 focus-within:border-orange-500 transition-all">
<label className="text-[10px] font-black uppercase text-orange-500 tracking-widest mb-3 block">外部視角 (External View)</label>
<textarea className="w-full bg-transparent border-none outline-none text-sm h-24 font-bold" placeholder="客觀專家會如何批評這個決定？" value={data.matrix.externalView} onChange={(e)=>setData({...data, matrix:{...data.matrix, externalView: e.target.value}})} />
</div>
<div className="p-6 bg-slate-50 rounded-[2rem] border-2 border-slate-100 focus-within:border-emerald-500 transition-all">
<label className="text-[10px] font-black uppercase text-emerald-500 tracking-widest mb-3 block">二階效應 (Second-order)</label>
<textarea className="w-full bg-transparent border-none outline-none text-sm h-24 font-bold" placeholder="這在一年後會帶來的「連鎖反應」？" value={data.matrix.secondOrder} onChange={(e)=>setData({...data, matrix:{...data.matrix, secondOrder: e.target.value}})} />
</div>
</div>
</div>
)}

{step === 3 && (
<div className="fade-in text-center">
<div className="flex justify-center items-center gap-3 text-indigo-500 mb-8 font-black uppercase tracking-widest text-xs"><Icon name="compass" className="w-4 h-4" /> System 3 Simulation</div>
<h2 className="text-4xl font-extrabold mb-10 tracking-tighter">未來模擬艙</h2>
{!data.futureScript ? (
<button onClick={generateFutureScript} disabled={isAiLoading} className="w-full py-24 bg-indigo-50 border-2 border-dashed border-indigo-200 rounded-[3.5rem] flex flex-col items-center gap-4 group hover:bg-indigo-100 transition-all">
{isAiLoading ? <div className="loader"></div> : <Fragment><Icon name="zap" className="w-16 h-16 text-indigo-600 mb-2" /><span className="text-indigo-600 font-black uppercase tracking-widest text-sm">消耗 1 點啟動深度渲染</span></Fragment>}
</button>
) : (
<div className="bg-slate-950 p-12 rounded-[3.5rem] shadow-2xl relative border border-slate-800 text-left">
<div className="flex justify-between items-center mb-8 border-b border-white/10 pb-4">
<span className="text-[10px] font-black text-indigo-400 uppercase tracking-widest">Vision Script v4.6</span>
<button onClick={()=>setData({...data, futureScript: ''})} className="text-[10px] text-white/40 hover:text-white uppercase font-bold tracking-widest transition-colors">再次模擬 (-1 Credit)</button>
</div>
<p className="text-indigo-50 italic text-xl leading-relaxed whitespace-pre-wrap font-medium">{data.futureScript}</p>
</div>
)}
</div>
)}

{step === 4 && (
<div className="fade-in">
<div className="flex items-center gap-3 text-emerald-500 mb-8 font-black uppercase tracking-widest text-xs"><Icon name="zap" className="w-4 h-4" /> Implementation Nudges</div>
<h2 className="text-4xl font-extrabold mb-10 tracking-tighter text-slate-900">智慧行動助推</h2>
{isAiLoading ? (
<div className="p-20 flex flex-col items-center gap-6 text-center">
<div className="loader border-t-emerald-500 border-r-transparent border-b-transparent border-l-transparent"></div>
<p className="text-slate-400 font-bold animate-pulse tracking-widest text-xs uppercase">正在根據矩陣優化環境方案...</p>
</div>
) : (
<div className="bg-emerald-50 p-12 rounded-[3.5rem] border border-emerald-100 text-emerald-950 font-bold leading-relaxed whitespace-pre-wrap text-xl text-left">
{data.nudges || "暫無助推方案。"}
</div>
)}
</div>
)}

{step === 5 && (
<div className="text-center py-10 fade-in">
<div className="w-24 h-24 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-10 shadow-2xl"><Icon name="crown" className="w-12 h-12" /></div>
<h2 className="text-5xl font-extrabold mb-6 tracking-tighter text-slate-900 leading-tight">審計已完成</h2>
<p className="text-slate-500 text-xl font-medium mb-12 max-w-lg mx-auto leading-relaxed">我們已經為您的決策建立了完整的保護網。下載報告以進行後續追蹤。</p>
<button onClick={()=>window.print()} className="bg-indigo-600 text-white px-12 py-5 rounded-full font-black text-lg shadow-2xl hover:bg-black active:scale-95 transition-all flex items-center gap-4 mx-auto">
<Icon name="file" className="w-6 h-6" /> 下載 PDF 專業報告
</button>
</div>
)}
</div>

{step < 5 && (
<div className="mt-16 flex justify-between items-center pt-10 border-t border-slate-50">
<button onClick={()=>setStep(s=>Math.max(1, s-1))} disabled={step===1} className={`flex items-center gap-2 font-bold px-8 py-3 rounded-2xl transition-all ${step===1 ? 'text-slate-200' : 'text-slate-400 hover:bg-slate-100'}`}><Icon name="chevronLeft" className="w-5 h-5" /> BACK</button>
<button onClick={()=>setStep(s=>Math.min(5, s+1))} className="bg-slate-900 text-white px-12 py-4 rounded-full font-black flex items-center gap-3 hover:bg-indigo-600 shadow-2xl transition-all active:scale-95 uppercase text-sm tracking-widest">
{step === 4 ? 'Finish Audit' : 'Next Step'} <Icon name="chevronRight" className="w-5 h-5" />
</button>
</div>
)}
</div>
)}

{view === 'roadmap' && (
<div className="fade-in space-y-16 text-left">
<div className="text-center">
<h2 className="text-5xl font-extrabold tracking-tighter text-slate-900 mb-6 font-inter">產品發展路徑圖</h2>
<p className="text-slate-400 font-bold uppercase tracking-widest text-xs">COGNAV Evolution Path 2024</p>
</div>
<div className="grid grid-cols-1 md:grid-cols-2 gap-10">
{[
{ title: "認知審計核心", desc: "完成 System 1 & 2 的原始捕捉與邏輯矩陣審核模組。", icon: "brain", status: "Done" },
{ title: "安全代理部署", desc: "Serverless Proxy 完全隱藏 API 金鑰，保障企業級數據安全。", icon: "shield", status: "Done" },
{ title: "智慧助推引擎", desc: "AI 自動化環境優化建議，解決決策執行力低下的痛點。", icon: "zap", status: "Active" },
{ title: "專家級付費系統", desc: "計次點數收費與專家訂閱方案，整合 Stripe 支付機制。", icon: "crown", status: "Active" }
].map((item, i) => (
<div key={i} className="p-10 bg-white rounded-[3rem] border border-slate-100 shadow-sm hover:shadow-xl transition-all group">
<div className="flex justify-between items-start mb-8 text-left">
<div className={`p-4 rounded-[1.5rem] ${item.status === 'Done' ? 'bg-emerald-100 text-emerald-600' : 'bg-indigo-100 text-indigo-600'}`}><Icon name={item.icon} className="w-7 h-7" /></div>
<span className={`text-[10px] font-black uppercase tracking-widest px-3 py-1.5 rounded-full ${item.status === 'Done' ? 'bg-emerald-50 text-emerald-500' : 'bg-indigo-50 text-indigo-500'}`}>{item.status}</span>
</div>
<h4 className="text-2xl font-extrabold mb-4 text-slate-900 group-hover:text-indigo-600 transition-colors">{item.title}</h4>
<p className="text-slate-500 font-medium leading-relaxed text-lg">{item.desc}</p>
</div>
))}
</div>
</div>
)}

{view === 'pricing' && (
<div className="fade-in space-y-16">
<div className="text-center">
<h2 className="text-5xl font-extrabold tracking-tighter text-slate-900 mb-6 font-inter">點數儲值與方案</h2>
<p className="text-slate-400 font-bold uppercase tracking-widest text-xs font-inter">PAY-PER-USE DECISION AUDIT</p>
