<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COGNAV - 三系統 AI 決策導航器</title>
    <!-- 引入開發所需的 CDN 資源 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background: white !important; padding: 0 !important; }
            .report-card { border: none !important; box-shadow: none !important; width: 100% !important; max-width: 100% !important; }
        }
        .print-only { display: none; }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #4f46e5; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, Fragment } = React;

        // --- Gemini API 核心配置 ---
        // 1. 請在此填入您的 API Key (GitHub Pages 執行時必須填寫)
        const apiKey = "AIzaSyD-0UEeZYRsesGJz9FuNJn4hL9TQqK_9Ok"; 

        // 別名對應表：讓介面更簡潔
        const MODEL_MAP = {
            'gemini-flash': 'gemini-1.5-flash',
            'gemini-pro': 'gemini-1.5-pro'
        };
        
        // --- API 請求函數 ---
        async function fetchGeminiAI(userDecision, checks, alias) {
            const realId = MODEL_MAP[alias] || alias;
            const activeChecks = checks.filter(c => c.checked).map(c => c.text).join('、');
            
            // 最高相容性 Prompt (不區分 v1/v1beta 特殊欄位)
            const prompt = `你是認知科學專家。請針對以下決策生成約300字的「系統三」未來模擬劇本。
            決策內容：『${userDecision}』
            已通過邏輯檢核：${activeChecks || '基本檢核'}
            要求：1.包含具體感官細節(光線、聲音、氣味) 2.描述成功後的深層情感 3.語氣溫暖具啟發性。請直接輸出內容，不要有前言。`;

            // 嘗試兩個版本的端點
            const versions = ['v1', 'v1beta'];
            let lastErr = null;

            for (let v of versions) {
                const url = `https://generativelanguage.googleapis.com/${v}/models/${realId}:generateContent?key=${apiKey}`;
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });

                    const data = await response.json();
                    if (response.ok) {
                        const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                        if (text) return text;
                    } else {
                        lastErr = { status: response.status, msg: data.error?.message, url: url.split('?')[0] };
                    }
                } catch (e) {
                    lastErr = { status: "FetchError", msg: e.message };
                }
            }
            throw lastErr;
        }

        // --- 核心組件：圖標渲染 ---
        const Icon = ({ name, className = "w-6 h-6" }) => {
            const paths = {
                brain: <path d="M12 2a5 5 0 0 1 5 5c0 1.25-.46 2.39-1.21 3.26A5 5 0 0 1 12 19a5 5 0 0 1-3.79-8.74A5 5 0 0 1 7 7a5 5 0 0 1 5-5zM9 7.5a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3zM15 7.5a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3z" />,
                compass: <Fragment><circle cx="12" cy="12" r="10"/><path d="m16.24 7.76-1.42 4.24-4.24 1.42 1.42-4.24 4.24-1.42Z"/><line x1="12" x2="12" y1="2" y2="4"/><line x1="12" x2="12" y1="20" y2="22"/><line x1="2" x2="4" y1="12" y2="12"/><line x1="20" x2="22" y1="12" y2="12"/></Fragment>,
                check: <polyline points="20 6 9 17 4 12" />,
                alert: <Fragment><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></Fragment>,
                map: <path d="M14.12 3.88 16 2l4 4-1.88 1.88M19 11l-8 8M15 11l-8 8M11 11l-8 8" />,
                sparkles: <Fragment><path d="m12 3 1.912 5.813a2 2 0 0 0 1.275 1.275L21 12l-5.813 1.912a2 2 0 0 0-1.275 1.275L12 21l-1.912-5.813a2 2 0 0 0-1.275-1.275L3 12l5.813-1.912a2 2 0 0 0 1.275-1.275L12 3Z"/><path d="M5 3L4 4.5 5 6"/><path d="M19 3l1 1.5-1 1.5"/></Fragment>,
                chevronRight: <polyline points="9 18 15 12 9 6" />,
                chevronLeft: <polyline points="15 18 9 12 15 6" />,
                file: <Fragment><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></Fragment>,
                list: <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {paths[name] || <circle cx="12" cy="12" r="10" />}
                </svg>
            );
        };

        // --- 實施路徑圖組件 ---
        const RoadmapView = () => (
            <div className="fade-in space-y-8 max-w-2xl mx-auto">
                <h2 className="text-3xl font-extrabold text-indigo-900 text-center mb-10 tracking-tight">產品開發路徑圖</h2>
                <div className="relative border-l-2 border-slate-200 ml-4 space-y-12">
                    {[
                        { stage: "階段一：MVP 基礎", focus: "直覺捕捉與邏輯檢核", desc: "建立決策捕捉介面，串接啟發法與偏誤提醒。已完成核心 UI。", icon: "brain", status: "Done" },
                        { stage: "階段二：AI 模擬核心", focus: "系統三模擬艙 (Gemini)", desc: "整合多版本相容性 API。解決 404 模型路徑問題，提供感官渲染劇本。", icon: "sparkles", status: "Running" },
                        { stage: "階段三：環境助推", focus: "執行力 Nudge 引擎", desc: "開發環境設置建議，整合手機提醒，確保決策能持久執行。", icon: "check", status: "Next" }
                    ].map((item, i) => (
                        <div key={i} className="relative pl-10">
                            <div className="absolute -left-[13px] top-0 bg-white border-2 border-indigo-600 rounded-full p-1 shadow-sm">
                                <div className="w-4 h-4 bg-indigo-600 rounded-full"></div>
                            </div>
                            <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm hover:shadow-md transition-shadow">
                                <div className="flex justify-between items-center mb-2">
                                    <h3 className="font-bold text-xl text-slate-800">{item.stage}</h3>
                                    <span className={`text-[10px] font-bold px-2 py-1 rounded-md uppercase tracking-widest ${item.status === 'Done' ? 'bg-emerald-100 text-emerald-600' : 'bg-indigo-100 text-indigo-600'}`}>
                                        {item.status}
                                    </span>
                                </div>
                                <p className="text-indigo-600 font-bold mb-2 text-sm">關鍵任務：{item.focus}</p>
                                <p className="text-slate-500 text-sm leading-relaxed">{item.desc}</p>
                            </div>
                        </div>
                    ))}
                </div>
            </div>
        );

        // --- 列印報告樣板 ---
        const PrintableReport = ({ data }) => (
            <div className="print-only p-12 bg-white text-slate-900 border border-slate-200 rounded-lg max-w-4xl mx-auto report-card">
                <div className="flex justify-between items-start border-b-4 border-indigo-600 pb-6 mb-8 text-slate-800">
                    <div>
                        <h1 className="text-3xl font-bold text-indigo-900 mb-1 font-inter uppercase">Cognitive Audit Report</h1>
                        <p className="text-slate-500 text-sm italic">COGNAV 三系統決策導航分析報告</p>
                    </div>
                    <div className="text-right text-xs font-bold text-slate-400">
                        <p>生成日期：{new Date().toLocaleDateString()}</p>
                    </div>
                </div>
                <div className="space-y-8 text-slate-800">
                    <section>
                        <h2 className="bg-slate-50 p-2 text-lg font-bold border-l-4 border-orange-500 mb-3 uppercase tracking-widest text-xs">Step 1: Intuition</h2>
                        <p className="text-xl font-medium leading-relaxed pl-4">{data.decision || "未提供詳細資訊"}</p>
                    </section>
                    <section>
                        <h2 className="bg-slate-50 p-2 text-lg font-bold border-l-4 border-blue-500 mb-3 uppercase tracking-widest text-xs">Step 2: Logical Audit</h2>
                        <div className="pl-4 space-y-2">
                            {data.system2Checks.map((item, i) => (
                                <div key={i} className="flex items-center gap-3">
                                    <span className={item.checked ? "text-emerald-600 font-bold" : "text-slate-300"}>{item.checked ? "✓" : "✗"}</span>
                                    <span className={item.checked ? "text-slate-900 font-bold" : "text-slate-400"}>{item.text}</span>
                                </div>
                            ))}
                        </div>
                    </section>
                    <section>
                        <h2 className="bg-slate-50 p-2 text-lg font-bold border-l-4 border-indigo-600 mb-3 uppercase tracking-widest text-xs">Step 3: Future Simulation</h2>
                        <div className="italic bg-indigo-50 p-6 rounded-2xl text-indigo-900 leading-relaxed whitespace-pre-wrap text-sm shadow-inner min-h-[100px] pl-4">
                            {data.futureScript || "⚠️ 您尚未在原型中啟動 AI 模擬。"}
                        </div>
                    </section>
                </div>
                <div className="mt-20 pt-8 border-t border-slate-100 text-center text-slate-400 text-[10px] tracking-widest uppercase">
                    <p>Powered by COGNAV Decision Architecture • Based on Dual Process Theory</p>
                </div>
            </div>
        );

        // --- 主應用組件 ---
        function App() {
            const [view, setView] = useState('flow'); 
            const [step, setStep] = useState(1);
            const [isAiLoading, setIsAiLoading] = useState(false);
            const [aiError, setAiError] = useState(null);
            const [availableModels, setAvailableModels] = useState([]);
            const [selectedAlias, setSelectedAlias] = useState('gemini-flash');
            const [data, setData] = useState({
                decision: '',
                system2Checks: [
                    { text: "我已經檢查過過去五年的數據基準。", checked: false },
                    { text: "我徵詢過三位反對者的真實意見。", checked: false },
                    { text: "我能承受失敗後產生的具體後果。", checked: false }
                ],
                futureScript: ''
            });

            const toggleCheck = (index) => {
                const newChecks = [...data.system2Checks];
                newChecks[index].checked = !newChecks[index].checked;
                setData({...data, system2Checks: newChecks});
            };

            const handleAiGeneration = async () => {
                if (!data.decision) return;
                setIsAiLoading(true); setAiError(null);
                try {
                    const script = await fetchGeminiAI(data.decision, data.system2Checks, selectedAlias);
                    setData(prev => ({...prev, futureScript: script}));
                } catch (e) {
                    setAiError(e);
                } finally {
                    setIsAiLoading(false);
                }
            };

            const listMyModels = async () => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`;
                try {
                    const res = await fetch(url);
                    const list = await res.json();
                    setAvailableModels(list.models?.map(m => m.name.split('/').pop()) || ["無法獲取清單"]);
                } catch (e) {
                    setAvailableModels(["請求失敗，請檢查 API Key"]);
                }
            };

            return (
                <div className="min-h-screen bg-slate-50 text-slate-800">
                    <div className="min-h-screen flex flex-col items-center py-12 px-4 no-print">
                        <div className="w-full max-w-2xl">
                            {/* 分頁切換 */}
                            <div className="flex bg-slate-200 p-1 rounded-2xl mb-12 w-fit mx-auto shadow-inner">
                                <button onClick={() => setView('flow')} className={`px-8 py-2 rounded-xl font-bold transition-all flex items-center gap-2 ${view === 'flow' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500 hover:text-slate-800'}`}>
                                    <Icon name="brain" className="w-4 h-4" /> 互動原型
                                </button>
                                <button onClick={() => setView('roadmap')} className={`px-8 py-2 rounded-xl font-bold transition-all flex items-center gap-2 ${view === 'roadmap' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500 hover:text-slate-800'}`}>
                                    <Icon name="map" className="w-4 h-4" /> 實施路徑
                                </button>
                            </div>

                            <div className="bg-white rounded-[3rem] shadow-2xl shadow-slate-200 border border-slate-100 p-10 md:p-14 min-h-[550px] flex flex-col justify-between relative overflow-hidden">
                                {view === 'flow' ? (
                                    <Fragment>
                                        {step === 1 && (
                                            <div className="fade-in">
                                                <h2 className="text-3xl font-extrabold mb-6 leading-tight tracking-tight">Step 1：捕捉<span className="text-indigo-600">直覺</span></h2>
                                                <textarea className="w-full p-6 bg-slate-50 border-2 rounded-3xl h-44 outline-none focus:border-indigo-500 transition-all text-lg shadow-inner" placeholder="我想立刻立刻辭職去環遊世界..." value={data.decision} onChange={(e) => setData({...data, decision: e.target.value})} />
                                            </div>
                                        )}
                                        {step === 2 && (
                                            <div className="fade-in">
                                                <h2 className="text-3xl font-extrabold mb-6 tracking-tight font-inter uppercase text-xs opacity-40">Logical Audit</h2>
                                                <h2 className="text-3xl font-extrabold mb-6 tracking-tight">Step 2：<span className="text-indigo-600">理智</span>檢核</h2>
                                                <div className="space-y-4">
                                                    {data.system2Checks.map((item, i) => (
                                                        <div key={i} onClick={() => toggleCheck(i)} className={`p-5 rounded-2xl border-2 flex items-center gap-4 cursor-pointer transition-all ${item.checked ? 'bg-indigo-50 border-indigo-200' : 'bg-white border-slate-100 hover:border-slate-300'}`}>
                                                            <div className={`w-7 h-7 rounded-lg border-2 flex items-center justify-center transition-all ${item.checked ? 'bg-indigo-600 border-indigo-600 text-white' : 'border-slate-300'}`}>
                                                                {item.checked && <Icon name="check" className="w-4 h-4" />}
                                                            </div>
                                                            <span className={`font-semibold ${item.checked ? 'text-indigo-900 line-through opacity-60' : 'text-slate-700'}`}>{item.text}</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                        {step === 3 && (
                                            <div className="fade-in">
                                                <h2 className="text-3xl font-extrabold mb-6 tracking-tight"><span className="text-indigo-600">未來模擬艙</span></h2>
                                                {!data.futureScript ? (
                                                    <Fragment>
                                                        <button onClick={handleAiGeneration} disabled={isAiLoading} className="w-full py-10 bg-indigo-50 border-2 border-dashed border-indigo-200 rounded-[2.5rem] flex flex-col items-center justify-center gap-4 hover:bg-indigo-100 transition-all text-indigo-600 font-bold group">
                                                            {isAiLoading ? (
                                                                <div className="flex flex-col items-center gap-3"><div className="loading-spinner"></div><span className="animate-pulse">正在嘗試相容性路徑...</span></div>
                                                            ) : (
                                                                <Fragment><Icon name="sparkles" className="w-10 h-10 group-hover:scale-110 transition-transform" /><span>啟動 AI 感官劇本生成</span></Fragment>
                                                            )}
                                                        </button>
                                                        
                                                        <div className="mt-4 flex justify-center gap-2">
                                                            <button onClick={() => setSelectedAlias('gemini-flash')} className={`px-3 py-1 rounded-full text-[10px] font-bold border transition-all ${selectedAlias === 'gemini-flash' ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-white text-indigo-400 border-indigo-100'}`}>Gemini Flash</button>
                                                            <button onClick={() => setSelectedAlias('gemini-pro')} className={`px-3 py-1 rounded-full text-[10px] font-bold border transition-all ${selectedAlias === 'gemini-pro' ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-white text-indigo-400 border-indigo-100'}`}>Gemini Pro</button>
                                                        </div>

                                                        {aiError && (
                                                            <div className="mt-6 p-6 bg-red-50 border border-red-100 rounded-3xl text-red-600 text-xs">
                                                                <p className="font-bold mb-2 flex items-center gap-2 uppercase tracking-widest text-sm font-inter"><Icon name="alert" className="w-4 h-4"/> API Error: {aiError.status}</p>
                                                                <p className="mb-4 bg-white/50 p-3 rounded-xl border border-red-100 leading-relaxed font-mono">{aiError.msg}</p>
                                                                <div className="pt-4 border-t border-red-100 space-y-3">
                                                                    <p className="font-bold text-red-700 underline">終極排除工具：</p>
                                                                    <button onClick={listMyModels} className="w-full py-2 bg-red-600 text-white rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-red-700">
                                                                        <Icon name="list" className="w-4 h-4" /> 點此列出我金鑰可用的模型清單
                                                                    </button>
                                                                    {availableModels.length > 0 && (
                                                                        <div className="bg-white p-3 rounded-xl border border-red-100">
                                                                            <p className="mb-2 font-bold opacity-50">可用模型 ID：</p>
                                                                            <div className="flex flex-wrap gap-1">
                                                                                {availableModels.map(m => <span key={m} className="px-2 py-0.5 bg-slate-100 rounded text-[9px] font-mono">{m}</span>)}
                                                                            </div>
                                                                        </div>
                                                                    )}
                                                                </div>
                                                            </div>
                                                        )}
                                                    </Fragment>
                                                ) : (
                                                    <div className="p-8 bg-slate-900 text-white rounded-[2.5rem] shadow-2xl relative">
                                                        <div className="flex justify-between items-center mb-4 border-b border-white/10 pb-2">
                                                            <span className="text-[10px] font-bold uppercase tracking-[0.3em] text-indigo-400">Simulation</span>
                                                            <button onClick={() => setData({...data, futureScript: ''})} className="text-[10px] text-slate-400 hover:text-white uppercase">重置</button>
                                                        </div>
                                                        <p className="text-slate-200 italic leading-relaxed text-base whitespace-pre-wrap font-light">{data.futureScript}</p>
                                                    </div>
                                                )}
                                            </div>
                                        )}
                                        {step === 4 && (
                                            <div className="fade-in text-center py-10">
                                                <div className="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg"><Icon name="check" className="w-10 h-10" /></div>
                                                <h2 className="text-4xl font-extrabold mb-4 tracking-tight">分析報告已就緒</h2>
                                                <button onClick={() => window.print()} className="bg-indigo-600 text-white px-10 py-4 rounded-full font-bold shadow-xl hover:bg-indigo-700 transition-all flex items-center gap-3 mx-auto active:scale-95">
                                                    <Icon name="file" className="w-5 h-5" /> 下載 PDF 報告書
                                                </button>
                                            </div>
                                        )}
                                        
                                        {step < 4 && (
                                            <div className="mt-12 flex justify-between items-center pt-8 border-t border-slate-50">
                                                <button onClick={() => setStep(s => s - 1)} disabled={step === 1} className={`font-bold flex items-center gap-1 ${step === 1 ? 'text-slate-200' : 'text-slate-400 hover:text-slate-600 transition-colors'}`}>
                                                    <Icon name="chevronLeft" className="w-5 h-5" /> 上一步
                                                </button>
                                                <button onClick={() => setStep(s => s + 1)} className="bg-slate-900 text-white px-10 py-3.5 rounded-full font-bold flex items-center gap-2 hover:bg-black shadow-lg transition-all active:scale-95">
                                                    下一步 <Icon name="chevronRight" className="w-5 h-5" />
                                                </button>
                                            </div>
                                        )}
                                    </Fragment>
                                ) : <RoadmapView />}
                            </div>
                        </div>
                    </div>
                    <PrintableReport data={data} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
