<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COGNAV - 三系統 AI 決策導航器</title>
    <!-- 引入開發所需的 CDN 資源 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background: white !important; padding: 0 !important; }
            .report-card { border: none !important; box-shadow: none !important; width: 100% !important; max-width: 100% !important; }
        }
        .print-only { display: none; }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #4f46e5; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, Fragment } = React;

        // --- Gemini API 終極配置 ---
        // 1. 請在此填入您的 API Key (重要：若在 GitHub Pages 執行請務必填寫)
        const apiKey = "AIzaSyD-0UEeZYRsesGJz9FuNJn4hL9TQqK_9Ok"; 

        // 模型別名對應 (目前推薦使用含 1.5 的名稱，純 gemini-pro 常報 404)
        const MODEL_MAP = {
            'gemini-flash': 'gemini-1.5-flash',
            'gemini-pro': 'gemini-1.5-pro'
        };
        
        async function fetchGeminiAI(userDecision, checks, alias) {
            const cleanKey = apiKey.trim();
            if (!cleanKey) throw { status: "Config", msg: "API Key 尚未填寫，請檢查 index.html 第 28 行。" };
            
            const realId = MODEL_MAP[alias] || alias;
            const activeChecks = checks.filter(c => c.checked).map(c => c.text).join('、');
            const prompt = `你是認知科學專家。請針對以下決策生成約300字的『系統三』感官模擬劇本。要求包含具體細節(光線、氣味、聲音)與達成後的深層情感滿足。
            決策內容：『${userDecision}』。已通過檢核：${activeChecks || '無'}。請直接輸出內容。`;

            // 去除可能誤填的 models/ 前綴
            const modelName = realId.replace('models/', '');
            
            // 嘗試多個端點與版本組合
            const versions = ['v1', 'v1beta'];
            let lastErr = null;

            for (let v of versions) {
                const url = `https://generativelanguage.googleapis.com/${v}/models/${modelName}:generateContent?key=${cleanKey}`;
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    const data = await response.json();
                    if (response.ok) {
                        return data.candidates?.[0]?.content?.parts?.[0]?.text;
                    } else {
                        lastErr = { status: response.status, msg: data.error?.message || "伺服器無回應", url: url.split('?')[0] };
                    }
                } catch (e) {
                    lastErr = { status: "Network", msg: e.message };
                }
            }
            throw lastErr;
        }

        // --- 核心組件：圖標渲染 ---
        const Icon = ({ name, className = "w-6 h-6" }) => {
            const getIconContent = () => {
                switch(name) {
                    case 'brain': return <path d="M12 2a5 5 0 0 1 5 5c0 1.25-.46 2.39-1.21 3.26A5 5 0 0 1 12 19a5 5 0 0 1-3.79-8.74A5 5 0 0 1 7 7a5 5 0 0 1 5-5zM9 7.5a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3zM15 7.5a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3z" />;
                    case 'compass': return <g><circle cx="12" cy="12" r="10"/><path d="m16.24 7.76-1.42 4.24-4.24 1.42 1.42-4.24 4.24-1.42Z"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2"/></g>;
                    case 'check': return <polyline points="20 6 9 17 4 12" />;
                    case 'alert': return <g><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y1="16"/></g>;
                    case 'map': return <path d="M1 6v16l7-4 8 4 7-4V2l-7 4-8-4-7 4zm7-2v16m8-12v16" />;
                    case 'sparkles': return <path d="m12 3 1.912 5.813a2 2 0 0 0 1.275 1.275L21 12l-5.813 1.912a2 2 0 0 0-1.275 1.275L12 21l-1.912-5.813a2 2 0 0 0-1.275-1.275L3 12l5.813-1.912a2 2 0 0 0 1.275-1.275L12 3Z" />;
                    case 'chevronRight': return <polyline points="9 18 15 12 9 6" />;
                    case 'chevronLeft': return <polyline points="15 18 9 12 15 6" />;
                    case 'file': return <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z" />;
                    case 'list': return <g><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/></g>;
                    case 'search': return <g><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></g>;
                    default: return <circle cx="12" cy="12" r="10" />;
                }
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {getIconContent()}
                </svg>
            );
        };

        // --- 實施路徑圖 ---
        const RoadmapView = () => (
            <div className="fade-in space-y-8 max-w-2xl mx-auto text-slate-800">
                <h2 className="text-3xl font-extrabold text-indigo-900 text-center mb-10 tracking-tighter">產品開發路徑圖</h2>
                <div className="relative border-l-2 border-slate-200 ml-4 space-y-12">
                    {[
                        { stage: "階段一：MVP 基礎建設", focus: "決策框架與直覺審計", desc: "完成核心 UI、系統一/二檢查清單與 PDF 報告功能。", status: "Done" },
                        { stage: "階段二：AI 核心整合", focus: "系統三模擬艙 (Gemini)", desc: "整合自動偵錯 API，解決金鑰與模型 ID 適配問題，提供感官劇本。", status: "Running" },
                        { stage: "階段三：智慧助推", focus: "Nudge 自動生成器", desc: "根據決策內容自動提供環境設置建議與持續執行機制。", status: "Next" }
                    ].map((item, i) => (
                        <div key={i} className="relative pl-10">
                            <div className="absolute -left-[13px] top-0 bg-white border-2 border-indigo-600 rounded-full p-1 shadow-sm">
                                <div className="w-4 h-4 bg-indigo-600 rounded-full"></div>
                            </div>
                            <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm hover:shadow-md transition-shadow">
                                <div className="flex justify-between items-center mb-2">
                                    <h3 className="font-bold text-xl text-slate-800">{item.stage}</h3>
                                    <span className={`text-[10px] font-bold px-2 py-1 rounded-md uppercase tracking-widest ${item.status === 'Done' ? 'bg-emerald-100 text-emerald-600' : 'bg-indigo-100 text-indigo-600'}`}>
                                        {item.status}
                                    </span>
                                </div>
                                <p className="text-indigo-600 font-bold mb-2 text-sm">{item.focus}</p>
                                <p className="text-slate-500 text-sm leading-relaxed">{item.desc}</p>
                            </div>
                        </div>
                    ))}
                </div>
            </div>
        );

        // --- 列印樣板 ---
        const PrintableReport = ({ data }) => (
            <div className="print-only p-12 bg-white text-slate-900 border border-slate-200 rounded-lg max-w-4xl mx-auto report-card">
                <div className="flex justify-between items-start border-b-4 border-indigo-600 pb-6 mb-8 text-slate-800">
                    <div>
                        <h1 className="text-3xl font-bold text-indigo-900 mb-1 font-inter uppercase">Cognitive Audit Report</h1>
                        <p className="text-slate-500 text-sm italic">COGNAV 決策審計分析報告 v1.5</p>
                    </div>
                    <div className="text-right text-xs font-bold text-slate-400">
                        <p>生成日期：{new Date().toLocaleDateString()}</p>
                    </div>
                </div>
                <div className="space-y-8 text-slate-800 text-left">
                    <section>
                        <h2 className="bg-slate-50 p-2 text-lg font-bold border-l-4 border-orange-500 mb-3 uppercase tracking-widest text-xs">Step 1: Intuition</h2>
                        <p className="text-xl font-medium leading-relaxed pl-4">{data.decision || "未輸入內容"}</p>
                    </section>
                    <section>
                        <h2 className="bg-slate-50 p-2 text-lg font-bold border-l-4 border-blue-500 mb-3 uppercase tracking-widest text-xs">Step 2: Logical Audit</h2>
                        <div className="pl-4 space-y-2 font-medium">
                            {data.system2Checks.map((item, i) => (
                                <div key={i} className="flex items-center gap-3">
                                    <span className={item.checked ? "text-emerald-600 font-bold" : "text-slate-300"}>{item.checked ? "✓" : "✗"}</span>
                                    <span className={item.checked ? "text-slate-900" : "text-slate-400"}>{item.text}</span>
                                </div>
                            ))}
                        </div>
                    </section>
                    <section>
                        <h2 className="bg-slate-50 p-2 text-lg font-bold border-l-4 border-indigo-600 mb-3 uppercase tracking-widest text-xs">Step 3: Future Simulation</h2>
                        <div className="italic bg-indigo-50 p-6 rounded-2xl text-indigo-900 leading-relaxed whitespace-pre-wrap text-sm shadow-inner min-h-[100px] pl-4 font-medium">
                            {data.futureScript || "⚠️ 尚未生成 AI 模擬。"}
                        </div>
                    </section>
                </div>
                <div className="mt-20 pt-8 border-t border-slate-100 text-center text-slate-400 text-[10px] tracking-widest uppercase font-bold">
                    <p>Powered by COGNAV Decision Support Engine</p>
                </div>
            </div>
        );

        // --- 主應用 ---
        function App() {
            const [view, setView] = useState('flow'); 
            const [step, setStep] = useState(1);
            const [isAiLoading, setIsAiLoading] = useState(false);
            const [aiError, setAiError] = useState(null);
            const [selectedAlias, setSelectedAlias] = useState('gemini-flash');
            const [myAllowedModels, setMyAllowedModels] = useState([]);
            const [data, setData] = useState({
                decision: '',
                system2Checks: [
                    { text: "我已經檢查過過去五年的數據基準。", checked: false },
                    { text: "我徵詢過三位反對者的真實意見。", checked: false },
                    { text: "我能承受失敗後產生的具體後果。", checked: false }
                ],
                futureScript: ''
            });

            const toggleCheck = (index) => {
                const newChecks = [...data.system2Checks];
                newChecks[index].checked = !newChecks[index].checked;
                setData({...data, system2Checks: newChecks});
            };

            const handleAiGeneration = async () => {
                if (!data.decision) return;
                setIsAiLoading(true); setAiError(null);
                try {
                    const text = await fetchGeminiAI(data.decision, data.system2Checks, selectedAlias);
                    setData(prev => ({...prev, futureScript: text}));
                } catch (e) { 
                    setAiError(e); 
                } finally { 
                    setIsAiLoading(false); 
                }
            };

            const checkMyAllowedModels = async () => {
                const cleanKey = apiKey.trim();
                if (!cleanKey) { setMyAllowedModels(["請先填寫金鑰"]); return; }
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1/models?key=${cleanKey}`);
                    const list = await res.json();
                    if (list.error) {
                        setMyAllowedModels([`錯誤：${list.error.message}`]);
                    } else {
                        const names = list.models?.map(m => m.name.split('/').pop()) || ["成功連線但無模型權限"];
                        setMyAllowedModels(names);
                    }
                } catch (e) { setMyAllowedModels(["連線超時，請檢查 VPN 或網路"]); }
            };

            return (
                <div className="min-h-screen bg-slate-50 text-slate-800 font-sans tracking-tight">
                    <div className="min-h-screen flex flex-col items-center py-12 px-4 no-print">
                        <div className="w-full max-w-2xl text-center">
                            {/* 分頁控制 */}
                            <div className="flex bg-slate-200 p-1.5 rounded-2xl mb-12 w-fit mx-auto shadow-inner">
                                <button onClick={() => setView('flow')} className={`px-8 py-2 rounded-xl font-bold transition-all flex items-center gap-2 ${view === 'flow' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500 hover:text-slate-800'}`}>
                                    <Icon name="brain" className="w-5 h-5" /> 互動原型
                                </button>
                                <button onClick={() => setView('roadmap')} className={`px-8 py-2 rounded-xl font-bold transition-all flex items-center gap-2 ${view === 'roadmap' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500 hover:text-slate-800'}`}>
                                    <Icon name="map" className="w-5 h-5" /> 實施路徑
                                </button>
                            </div>

                            <div className="bg-white rounded-[3rem] shadow-2xl shadow-slate-200 border border-slate-100 p-10 md:p-14 min-h-[550px] flex flex-col justify-between relative overflow-hidden text-left">
                                {view === 'flow' ? (
                                    <Fragment>
                                        {step === 1 && (
                                            <div className="fade-in">
                                                <h2 className="text-3xl font-extrabold mb-6 tracking-tighter tracking-tight text-indigo-900">捕捉直覺</h2>
                                                <p className="text-slate-500 mb-4 text-sm font-medium">在理智介入前，寫下你大腦最初的聲音。</p>
                                                <textarea className="w-full p-6 bg-slate-50 border-2 rounded-3xl h-44 outline-none focus:border-indigo-500 transition-all text-lg shadow-inner font-medium" placeholder="例如：我想立刻辭職，把所有存款投入比特幣..." value={data.decision} onChange={(e) => setData({...data, decision: e.target.value})} />
                                            </div>
                                        )}
                                        {step === 2 && (
                                            <div className="fade-in">
                                                <h2 className="text-3xl font-extrabold mb-6 tracking-tighter">理智檢核</h2>
                                                <div className="space-y-4 font-medium">
                                                    {data.system2Checks.map((item, i) => (
                                                        <div key={i} onClick={() => toggleCheck(i)} className={`p-5 rounded-2xl border-2 flex items-center gap-4 cursor-pointer transition-all ${item.checked ? 'bg-indigo-50 border-indigo-200' : 'bg-white border-slate-100 hover:border-slate-300'}`}>
                                                            <div className={`w-7 h-7 rounded-lg border-2 flex items-center justify-center transition-all ${item.checked ? 'bg-indigo-600 border-indigo-600 text-white' : 'border-slate-300'}`}>
                                                                {item.checked && <Icon name="check" className="w-4 h-4" />}
                                                            </div>
                                                            <span className={item.checked ? 'text-indigo-900 line-through opacity-60' : 'text-slate-700'}>{item.text}</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                        {step === 3 && (
                                            <div className="fade-in text-center">
                                                <h2 className="text-3xl font-extrabold mb-6 tracking-tighter">未來模擬艙</h2>
                                                {!data.futureScript ? (
                                                    <Fragment>
                                                        <button onClick={handleAiGeneration} disabled={isAiLoading} className="w-full py-10 bg-indigo-50 border-2 border-dashed border-indigo-200 rounded-[2.5rem] flex flex-col items-center justify-center gap-4 hover:bg-indigo-100 transition-all text-indigo-600 font-bold group">
                                                            {isAiLoading ? (
                                                                <div className="flex flex-col items-center gap-3"><div className="loading-spinner"></div><span>正在連線偵測金鑰權限...</span></div>
                                                            ) : (
                                                                <Fragment><Icon name="sparkles" className="w-10 h-10 group-hover:scale-110 transition-transform" /><span>啟動 AI 感官劇本生成</span></Fragment>
                                                            )}
                                                        </button>
                                                        <div className="mt-4 flex justify-center gap-2">
                                                            {['gemini-flash', 'gemini-pro'].map(a => (
                                                                <button key={a} onClick={() => setSelectedAlias(a)} className={`px-4 py-1.5 rounded-full text-xs font-bold border transition-all ${selectedAlias === a ? 'bg-indigo-600 text-white border-indigo-600 font-extrabold' : 'bg-white text-indigo-400 border-indigo-100'}`}>{a}</button>
                                                            ))}
                                                        </div>
                                                        {aiError && (
                                                            <div className="mt-6 p-6 bg-red-50 border border-red-100 rounded-3xl text-red-600 text-xs text-left">
                                                                <p className="font-bold mb-2 flex items-center gap-2 uppercase tracking-widest text-sm"><Icon name="alert" className="w-4 h-4"/> 伺服器錯誤診斷 (Status: {aiError.status})</p>
                                                                <p className="mb-4 bg-white/50 p-3 rounded-xl border border-red-100 leading-relaxed font-mono whitespace-pre-wrap">{aiError.msg}</p>
                                                                <button onClick={checkMyAllowedModels} className="w-full py-2.5 bg-red-600 text-white rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-red-700 shadow-md">
                                                                    <Icon name="search" className="w-4 h-4" /> 一鍵診斷：列出我的金鑰可用模型
                                                                </button>
                                                                {myAllowedModels.length > 0 && (
                                                                    <div className="mt-3 bg-white p-3 rounded-xl border border-red-100 text-left shadow-inner">
                                                                        <p className="mb-1 font-bold opacity-60">偵測結果：</p>
                                                                        <div className="flex flex-wrap gap-1">
                                                                            {myAllowedModels.map(m => <span key={m} className="px-1.5 py-0.5 bg-slate-100 rounded font-mono text-[9px] font-bold">{m}</span>)}
                                                                        </div>
                                                                    </div>
                                                                )}
                                                            </div>
                                                        )}
                                                    </Fragment>
                                                ) : (
                                                    <div className="p-8 bg-slate-900 text-white rounded-[2.5rem] shadow-2xl relative text-left">
                                                        <div className="flex justify-between items-center mb-4 border-b border-white/10 pb-2">
                                                            <span className="text-[10px] font-bold uppercase tracking-[0.3em] text-indigo-400">System 3 Future Script</span>
                                                            <button onClick={() => setData({...data, futureScript: ''})} className="text-[10px] text-slate-400 hover:text-white uppercase flex items-center gap-1 font-bold">重新生成</button>
                                                        </div>
                                                        <p className="text-slate-200 italic leading-relaxed text-base whitespace-pre-wrap font-medium">{data.futureScript}</p>
                                                    </div>
                                                )}
                                            </div>
                                        )}
                                        {step === 4 && (
                                            <div className="fade-in text-center py-10">
                                                <div className="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg shadow-emerald-50"><Icon name="check" className="w-10 h-10" /></div>
                                                <h2 className="text-4xl font-extrabold mb-4 tracking-tighter text-indigo-900">審計完成</h2>
                                                <p className="text-slate-500 mb-8 max-w-xs mx-auto font-medium">您現在可以下載這份整合了直覺、理智與情感的決策報告。</p>
                                                <button onClick={() => window.print()} className="bg-indigo-600 text-white px-10 py-4 rounded-full font-bold shadow-xl hover:bg-indigo-700 transition-all flex items-center gap-3 mx-auto active:scale-95 shadow-indigo-100">
                                                    <Icon name="file" className="w-5 h-5" /> 下載 PDF 報告書
                                                </button>
                                            </div>
                                        )}
                                        {step < 4 && (
                                            <div className="mt-12 flex justify-between items-center pt-8 border-t border-slate-50">
                                                <button onClick={() => setStep(s => s - 1)} disabled={step === 1} className={`font-bold flex items-center gap-1 ${step === 1 ? 'text-slate-200' : 'text-slate-400 hover:text-slate-600 transition-colors'}`}>
                                                    <Icon name="chevronLeft" className="w-5 h-5" /> 上一步
                                                </button>
                                                <button onClick={() => setStep(s => s + 1)} className="bg-slate-900 text-white px-10 py-3.5 rounded-full font-bold flex items-center gap-2 hover:bg-black shadow-lg transition-all active:scale-95 shadow-slate-100">
                                                    下一步 <Icon name="chevronRight" className="w-5 h-5" />
                                                </button>
                                            </div>
                                        )}
                                    </Fragment>
                                ) : <RoadmapView />}
                            </div>
                            <footer className="mt-8 text-center text-slate-300 text-[10px] font-bold tracking-[0.3em] uppercase">COGNAV Decision support Tool</footer>
                        </div>
                    </div>
                    <PrintableReport data={data} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
