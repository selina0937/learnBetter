<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COGNAV Pro - 專業三系統決策審計系統</title>
    <!-- 載入外部資源 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Noto+Sans+TC:wght@400;700&display=swap');
        
        :root {
            --brand-primary: #4f46e5;
            --brand-secondary: #10b981;
        }

        body { 
            font-family: 'Plus Jakarta Sans', 'Noto Sans TC', sans-serif; 
            background: #f8fafc;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 列印優化 */
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background: white !important; padding: 0 !important; }
            .report-card { border: 1px solid #eee !important; width: 100% !important; margin: 0 !important; box-shadow: none !important; }
        }
        .print-only { display: none; }

        /* 加載動畫 */
        .loader {
            width: 28px;
            height: 28px;
            border: 3px solid #e2e8f0;
            border-bottom-color: var(--brand-primary);
            border-radius: 50%;
            display: inline-block;
            animation: rotation 1s linear infinite;
        }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, Fragment } = React;

        // --- 子組件：圖標渲染 (修正 JSX 相鄰元素問題) ---
        function Icon({ name, className = "w-6 h-6" }) {
            const paths = {
                brain: <path d="M12 2a5 5 0 0 1 5 5c0 1.25-.46 2.39-1.21 3.26A5 5 0 0 1 12 19a5 5 0 0 1-3.79-8.74A5 5 0 0 1 7 7a5 5 0 0 1 5-5zM9 7.5a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3zM15 7.5a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3z" />,
                compass: <g><circle cx="12" cy="12" r="10"/><path d="m16.24 7.76-1.42 4.24-4.24 1.42 1.42-4.24 4.24-1.42Z"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2"/></g>,
                zap: <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />,
                check: <polyline points="20 6 9 17 4 12" />,
                alert: <g><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></g>,
                file: <g><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></g>,
                crown: <path d="m2 4 3 12h14l3-12-6 7-4-7-4 7-6-7zm3 16h14" />,
                chevronRight: <polyline points="9 18 15 12 9 6" />,
                chevronLeft: <polyline points="15 18 9 12 15 6" />,
                coins: <g><circle cx="8" cy="8" r="6"/><circle cx="16" cy="16" r="6"/><path d="M12 8v8M8 12h8"/></g>,
                shield: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {paths[name] || <circle cx="12" cy="12" r="10" />}
                </svg>
            );
        }

        // --- 子組件：專業列印報告 ---
        function PrintableReport({ data }) {
            return (
                <div className="p-16 bg-white text-slate-900 report-card min-h-screen border-t-8 border-indigo-600 text-left">
                    <div className="flex justify-between items-start mb-12 border-b pb-8">
                        <div>
                            <h1 className="text-4xl font-extrabold text-indigo-950 mb-2 tracking-tight uppercase">Cognitive Audit Executive Summary</h1>
                            <p className="text-slate-500 font-bold uppercase tracking-widest text-sm font-inter">COGNAV Pro Decision Engine • Secure Proxy v4.5</p>
                        </div>
                        <div className="text-right text-xs text-slate-400 font-bold uppercase">
                            <p>Serial: {Math.random().toString(36).substr(2, 9).toUpperCase()}</p>
                            <p>Date: {new Date().toLocaleDateString()}</p>
                        </div>
                    </div>
                    <div className="space-y-12">
                        <section>
                            <h3 className="text-xs font-black text-orange-500 uppercase tracking-[0.2em] mb-4">Phase 1: Intuition Baseline</h3>
                            <div className="bg-slate-50 p-6 rounded-2xl text-xl font-medium border-l-4 border-orange-500 italic">"{data.decision || "N/A"}"</div>
                        </section>
                        <section>
                            <h3 className="text-xs font-black text-blue-500 uppercase tracking-[0.2em] mb-4">Phase 2: Logical Matrix Audit</h3>
                            <div className="grid grid-cols-2 gap-6 pl-2">
                                {Object.entries(data.matrix).map(([key, val]) => (
                                    <div key={key} className="p-4 bg-slate-50 rounded-xl border border-slate-100">
                                        <p className="text-[10px] font-black uppercase text-slate-400 mb-2">{key}</p>
                                        <p className="text-sm font-bold text-slate-700">{val || "未填寫"}</p>
                                    </div>
                                ))}
                            </div>
                        </section>
                        <section>
                            <h3 className="text-xs font-black text-indigo-500 uppercase tracking-[0.2em] mb-4">Phase 3: Visual & Sensory Simulation</h3>
                            <div className="bg-indigo-50 p-8 rounded-3xl text-indigo-950 leading-relaxed whitespace-pre-wrap font-medium border border-indigo-100 italic shadow-inner">
                                {data.futureScript || "Simulation not executed."}
                            </div>
                        </section>
                        <section>
                            <h3 className="text-xs font-black text-emerald-500 uppercase tracking-[0.2em] mb-4">Phase 4: Implementation Nudges</h3>
                            <div className="bg-emerald-50/50 p-8 rounded-3xl text-emerald-950 leading-relaxed whitespace-pre-wrap font-bold border border-emerald-100">
                                {data.nudges || "Action plan pending."}
                            </div>
                        </section>
                    </div>
                    <div className="mt-20 pt-10 border-t flex justify-between items-end opacity-40">
                        <div className="text-[10px] text-slate-400 font-bold uppercase">© 2024 COGNAV LABS. ALL AUDITS ARE CONFIDENTIAL AND SECURED.</div>
                    </div>
                </div>
            );
        }

        // --- 核心通訊函數 ---
        async function fetchAI(prompt, type) {
            try {
                const response = await fetch('/api/cognav', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt, type })
                });

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({ error: "伺服器通訊異常" }));
                    throw new Error(errData.error || "點數不足或系統錯誤");
                }

                const data = await response.json();
                return data.text;
            } catch (e) {
                throw { status: "Error", msg: e.message };
            }
        }

        // --- 主應用組件 ---
        function App() {
            const [view, setView] = useState('audit'); 
            const [step, setStep] = useState(1);
            const [isAiLoading, setIsAiLoading] = useState(false);
            const [aiError, setAiError] = useState(null);
            
            const [data, setData] = useState({
                decision: '',
                matrix: {
                    preMortem: '',
                    baseRate: '',
                    externalView: '',
                    secondOrder: ''
                },
                futureScript: '',
                nudges: ''
            });

            // 進入 Step 4 自動生成助推建議
            useEffect(() => {
                if (step === 4 && !data.nudges && data.futureScript) {
                    generateNudges();
                }
            }, [step]);

            const generateFutureScript = async () => {
                if (!data.decision) return;
                setIsAiLoading(true); setAiError(null);
                try {
                    // 強化 Prompt 解決字數太短問題
                    const prompt = `你是認知科學專家。針對決策：『${data.decision}』。
                    請寫一段約 500 字感官豐富的未來成功模擬劇本。要求：
                    1. 描述一年後成功的具體環境細節(光線、聲音、氣味)。
                    2. 描述達成目標後，與家人/團隊的對話與強烈的情感滿足感。
                    3. 描述你現在的身分認同(Identity)如何與理想對齊。
                    直接輸出劇本內容，不要有任何前言。`;
                    const text = await fetchAI(prompt, "script");
                    setData(prev => ({...prev, futureScript: text}));
                } catch (e) { setAiError(e.msg); } 
                finally { setIsAiLoading(false); }
            };

            const generateNudges = async () => {
                setIsAiLoading(true);
                try {
                    const prompt = `你是行為經濟學家。根據決策：『${data.decision}』與審計矩陣：${JSON.stringify(data.matrix)}。設計 3 個環境助推(Nudge)方案，減少執行阻礙。請條列輸出具體做法。`;
                    const text = await fetchAI(prompt, "nudge");
                    setData(prev => ({...prev, nudges: text}));
                } catch (e) { console.error(e); }
                finally { setIsAiLoading(false); }
            };

            return (
                <div className="min-h-screen pb-20 selection:bg-indigo-100">
                    {/* Navbar */}
                    <nav className="no-print w-full px-8 py-4 flex justify-between items-center glass-card sticky top-0 z-50">
                        <div className="flex items-center gap-3 cursor-pointer group" onClick={()=>setView('audit')}>
                            <div className="bg-indigo-600 p-2.5 rounded-2xl text-white shadow-lg shadow-indigo-200 group-hover:scale-110 transition-all">
                                <Icon name="compass" className="w-5 h-5" />
                            </div>
                            <span className="font-extrabold text-2xl tracking-tighter">COGNAV <span className="text-indigo-600 text-sm uppercase">Pro</span></span>
                        </div>
                        <div className="flex items-center gap-2 md:gap-10">
                            <button onClick={()=>setView('audit')} className={`text-xs font-black uppercase tracking-widest transition-all ${view === 'audit' ? 'text-indigo-600 border-b-2 border-indigo-600 pb-1' : 'text-slate-400 hover:text-slate-600'}`}>決策審計</button>
                            <button onClick={()=>setView('pricing')} className="px-5 py-2.5 bg-slate-900 text-white rounded-2xl text-[10px] font-black uppercase tracking-[0.2em] hover:bg-indigo-600 transition-all flex items-center gap-2 shadow-xl shadow-slate-200">
                                <Icon name="coins" className="w-3.5 h-3.5" /> Credits：10
                            </button>
                        </div>
                    </nav>

                    <main className="no-print max-w-5xl mx-auto py-12 px-6">
                        {view === 'audit' && (
                            <div className="bg-white rounded-[3.5rem] shadow-2xl shadow-slate-200/60 border border-white p-8 md:p-16 min-h-[650px] flex flex-col justify-between fade-in relative overflow-hidden text-left">
                                <div className="relative z-10">
                                    {step === 1 && (
                                        <div className="fade-in">
                                            <div className="flex items-center gap-3 text-orange-500 mb-8 font-black uppercase tracking-widest text-xs"><Icon name="brain" className="w-4 h-4" /> System 1 Baseline</div>
                                            <h2 className="text-4xl font-extrabold mb-4 tracking-tighter text-slate-900 leading-tight">捕捉原始直覺</h2>
                                            <p className="text-slate-500 mb-10 font-medium text-lg">在理智介入前，寫下大腦最初始的想法。不必過濾，真實就好。</p>
                                            <textarea className="w-full p-8 bg-slate-50 border-2 border-slate-100 rounded-[2.5rem] h-56 outline-none focus:border-indigo-500 font-medium text-xl shadow-inner transition-all focus:bg-white" placeholder="例如：我想在現在買入這間預售屋..." value={data.decision} onChange={(e)=>setData({...data, decision: e.target.value})} />
                                        </div>
                                    )}

                                    {step === 2 && (
                                        <div className="fade-in">
                                            <div className="flex items-center gap-3 text-blue-500 mb-8 font-black uppercase tracking-widest text-xs"><Icon name="check" className="w-4 h-4" /> System 2 Verification</div>
                                            <h2 className="text-4xl font-extrabold mb-10 tracking-tighter text-slate-900 font-inter leading-tight">深度邏輯審計矩陣</h2>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                                <div className="space-y-3">
                                                    <label className="text-[10px] font-black uppercase text-indigo-500 tracking-widest">事前驗屍法 (Pre-mortem)</label>
                                                    <textarea className="w-full p-5 bg-slate-50 border-2 rounded-3xl h-32 text-sm font-medium focus:border-indigo-500 outline-none transition-all" placeholder="想像一年後失敗了，死因可能是什麼？" value={data.matrix.preMortem} onChange={(e)=>setData({...data, matrix:{...data.matrix, preMortem: e.target.value}})} />
                                                </div>
                                                <div className="space-y-3">
                                                    <label className="text-[10px] font-black uppercase text-blue-500 tracking-widest">基礎比率 (Base Rate)</label>
                                                    <textarea className="w-full p-5 bg-slate-50 border-2 rounded-3xl h-32 text-sm font-medium focus:border-indigo-500 outline-none transition-all" placeholder="類似決策在市場上的統計成功率是多少？" value={data.matrix.baseRate} onChange={(e)=>setData({...data, matrix:{...data.matrix, baseRate: e.target.value}})} />
                                                </div>
                                                <div className="space-y-3">
                                                    <label className="text-[10px] font-black uppercase text-orange-500 tracking-widest">外部視角 (External View)</label>
                                                    <textarea className="w-full p-5 bg-slate-50 border-2 rounded-3xl h-32 text-sm font-medium focus:border-indigo-500 outline-none transition-all" placeholder="如果不考慮我個人的情感，客觀專家會怎麼建議？" value={data.matrix.externalView} onChange={(e)=>setData({...data, matrix:{...data.matrix, externalView: e.target.value}})} />
                                                </div>
                                                <div className="space-y-3">
                                                    <label className="text-[10px] font-black uppercase text-emerald-500 tracking-widest">二階效應 (Second-order)</label>
                                                    <textarea className="w-full p-5 bg-slate-50 border-2 rounded-3xl h-32 text-sm font-medium focus:border-indigo-500 outline-none transition-all" placeholder="這個決定在三個月、一年後產生的連鎖反應？" value={data.matrix.secondOrder} onChange={(e)=>setData({...data, matrix:{...data.matrix, secondOrder: e.target.value}})} />
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {step === 3 && (
                                        <div className="fade-in">
                                            <div className="flex items-center gap-3 text-indigo-500 mb-8 font-black uppercase tracking-widest text-xs"><Icon name="compass" className="w-4 h-4" /> System 3 Simulation</div>
                                            <h2 className="text-4xl font-extrabold mb-10 tracking-tighter">未來模擬艙</h2>
                                            {!data.futureScript ? (
                                                <button onClick={generateFutureScript} disabled={isAiLoading} className="w-full py-24 bg-indigo-50 border-2 border-dashed border-indigo-200 rounded-[3.5rem] flex flex-col items-center gap-6 group hover:bg-indigo-100 transition-all shadow-inner">
                                                    {isAiLoading ? <div className="loader"></div> : <Fragment><Icon name="zap" className="w-16 h-16 text-indigo-600 mb-2 group-hover:scale-110 transition-transform" /><span className="text-indigo-600 font-black uppercase tracking-[0.2em] text-sm">消耗 1 點啟動深度情感模擬</span></Fragment>}
                                                </button>
                                            ) : (
                                                <div className="bg-slate-900 p-12 rounded-[3.5rem] shadow-2xl relative border border-slate-800">
                                                    <div className="flex justify-between items-center mb-8 border-b border-white/10 pb-4 text-left">
                                                        <span className="text-[10px] font-black text-indigo-400 uppercase tracking-[0.3em]">Simulation Result (Professional Quality)</span>
                                                        <button onClick={()=>setData({...data, futureScript: ''})} className="text-[10px] text-white/40 hover:text-white uppercase font-bold tracking-widest transition-colors">Retry</button>
                                                    </div>
                                                    <p className="text-indigo-50 italic text-xl leading-relaxed whitespace-pre-wrap font-medium">{data.futureScript}</p>
                                                </div>
                                            )}
                                        </div>
                                    )}

                                    {step === 4 && (
                                        <div className="fade-in">
                                            <div className="flex items-center gap-3 text-emerald-500 mb-8 font-black uppercase tracking-widest text-xs"><Icon name="zap" className="w-4 h-4" /> Action Nudges</div>
                                            <h2 className="text-4xl font-extrabold mb-10 tracking-tighter text-slate-900 font-inter">智慧行動助推建議</h2>
                                            {isAiLoading ? (
                                                <div className="p-20 flex flex-col items-center gap-6 text-center">
                                                    <div className="loader border-t-emerald-500 border-r-transparent border-b-transparent border-
