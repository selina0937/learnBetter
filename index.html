<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COGNAV - 三系統 AI 決策導航器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 列印專用樣式 */
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background: white; padding: 0; }
            .report-card { border: none !important; box-shadow: none !important; width: 100%; max-width: 100%; }
        }
        .print-only { display: none; }
        
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #4f46e5; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- Gemini API 串接邏輯 ---
        const apiKey = ""; // 執行環境將自動注入金鑰
        
        async function generateFutureScript(userDecision, checks) {
            const systemPrompt = `你是一位認知科學專家，擅長『系統三』模擬推理。
            使用者的決策是：『${userDecision}』。
            使用者的邏輯檢核點：${checks.filter(c => c.checked).map(c => c.text).join(', ')}。
            請生成一段『感官豐富』的未來模擬劇本（約 300 字）。
            要求：
            1. 包含具體的感官細節（光線、聲音、氣味）。
            2. 描述成功後的深層情感。
            3. 強調這如何與使用者的理想身分認同對齊。
            4. 語氣要溫暖且具啟發性，像是引導冥想一般。
            請直接輸出劇本內容，不要包含任何開場白。`;

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            let delay = 1000;
            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `請幫我生成未來劇本。` }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });
                    
                    if (!response.ok) throw new Error('API Error');
                    const result = await response.json();
                    return result.candidates?.[0]?.content?.parts?.[0]?.text;
                } catch (error) {
                    if (i === 4) throw error;
                    await new Promise(resolve => setTimeout(resolve, delay));
                    delay *= 2;
                }
            }
        }

        // --- 圖標組件 ---
        const Icon = ({ name, className = "w-6 h-6" }) => {
            const icons = {
                brain: <path d="M12 2a5 5 0 0 1 5 5c0 1.25-.46 2.39-1.21 3.26A5 5 0 0 1 12 19a5 5 0 0 1-3.79-8.74A5 5 0 0 1 7 7a5 5 0 0 1 5-5zM9 7.5a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3zM15 7.5a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3z" />,
                compass: <React.Fragment><circle cx="12" cy="12" r="10"/><path d="m16.24 7.76-1.42 4.24-4.24 1.42 1.42-4.24 4.24-1.42Z"/><line x1="12" x2="12" y1="2" y2="4"/><line x1="12" x2="12" y1="20" y2="22"/><line x1="2" x2="4" y1="12" y2="12"/><line x1="20" x2="22" y1="12" y2="12"/></React.Fragment>,
                check: <polyline points="20 6 9 17 4 12" />,
                alert: <React.Fragment><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></React.Fragment>,
                map: <React.Fragment><path d="M14.12 3.88 16 2l4 4-1.88 1.88M19 11l-8 8M15 11l-8 8M11 11l-8 8" /></React.Fragment>,
                sparkles: <React.Fragment><path d="m12 3 1.912 5.813a2 2 0 0 0 1.275 1.275L21 12l-5.813 1.912a2 2 0 0 0-1.275 1.275L12 21l-1.912-5.813a2 2 0 0 0-1.275-1.275L3 12l5.813-1.912a2 2 0 0 0 1.275-1.275L12 3Z"/><path d="M5 3L4 4.5 5 6"/><path d="M19 3l1 1.5-1 1.5"/></React.Fragment>,
                chevronRight: <polyline points="9 18 15 12 9 6" />,
                chevronLeft: <polyline points="15 18 9 12 15 6" />,
                file: <React.Fragment><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></React.Fragment>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || <circle cx="12" cy="12" r="10" />}
                </svg>
            );
        };

        // --- 列印報告樣板組件 ---
        const PrintableReport = ({ data }) => (
            <div className="print-only p-12 bg-white text-slate-900 border border-slate-200 rounded-lg max-w-4xl mx-auto report-card">
                <div className="flex justify-between items-start border-b-4 border-indigo-600 pb-6 mb-8">
                    <div>
                        <h1 className="text-3xl font-bold text-indigo-900 mb-1">大腦決策審計報告</h1>
                        <p className="text-slate-500 text-sm italic">Cognitive Decision Audit Report • 三系統決策導航器</p>
                    </div>
                    <div className="text-right">
                        <p className="font-bold text-sm">報告生成日期：{new Date().toLocaleDateString()}</p>
                    </div>
                </div>

                <section className="mb-10">
                    <h2 className="bg-slate-100 p-2 text-lg font-bold border-l-4 border-orange-500 mb-4">第一階段：系統一 (直覺捕捉)</h2>
                    <div className="pl-4">
                        <p className="font-bold text-slate-500 mb-1 text-xs uppercase">原始決策意圖</p>
                        <p className="text-xl font-medium leading-relaxed">{data.decision || "未提供詳細資訊"}</p>
                    </div>
                </section>

                <section className="mb-10">
                    <h2 className="bg-slate-100 p-2 text-lg font-bold border-l-4 border-blue-500 mb-4">第二階段：系統二 (邏輯審計)</h2>
                    <div className="pl-4 space-y-2">
                        {data.system2Checks.map((item, i) => (
                            <div key={i} className="flex items-center gap-3">
                                <span className={item.checked ? "text-emerald-600 font-bold" : "text-slate-300"}>
                                    {item.checked ? "✓ [已通過]" : "✗ [未完成]"}
                                </span>
                                <span className={item.checked ? "text-slate-900" : "text-slate-400"}>{item.text}</span>
                            </div>
                        ))}
                    </div>
                </section>

                <section className="mb-10">
                    <h2 className="bg-slate-100 p-2 text-lg font-bold border-l-4 border-indigo-600 mb-4">第三階段：系統三 (AI 未來模擬)</h2>
                    <div className="pl-4">
                        <p className="font-bold text-slate-500 mb-2 text-xs uppercase">系統三感官模擬劇本</p>
                        <div className="italic bg-indigo-50 p-6 rounded-2xl text-indigo-900 leading-relaxed whitespace-pre-wrap">
                            {data.futureScript || "尚未生成 AI 模擬劇本。"}
                        </div>
                    </div>
                </section>

                <div className="mt-20 pt-8 border-t border-slate-100 text-center text-slate-400 text-[10px] tracking-widest uppercase">
                    <p>依據丹尼爾·卡尼曼 (Daniel Kahneman) 之雙系統理論擴展開發</p>
                </div>
            </div>
        );

        // --- 頁面內容：實施路徑圖 ---
        const RoadmapView = () => (
            <div className="fade-in space-y-8 max-w-2xl mx-auto">
                <h2 className="text-3xl font-extrabold text-indigo-900 text-center mb-10">產品開發路徑圖</h2>
                <div className="relative border-l-2 border-slate-200 ml-4 space-y-12">
                    {[
                        { stage: "階段一：MVP 基礎", focus: "直覺陷阱監測", desc: "建立第一套決策捕捉介面，串接簡單的 NLP 偏誤提醒。", icon: "brain", status: "Done" },
                        { stage: "階段二：AI 模擬核心", focus: "系統三模擬艙 (Gemini 整合)", desc: "串接 Gemini 2.5 模型，自動生成高品質未來劇本，強化使用者動機。", icon: "sparkles", status: "Running" },
                        { stage: "階段三：環境助推", focus: "執行力 Nudge 引擎", desc: "開發環境設置建議，整合手機提醒，確保持續執行決策。", icon: "check", status: "Next" }
                    ].map((item, i) => (
                        <div key={i} className="relative pl-10">
                            <div className="absolute -left-[13px] top-0 bg-white border-2 border-indigo-600 rounded-full p-1 shadow-sm">
                                <div className="w-4 h-4 bg-indigo-600 rounded-full"></div>
                            </div>
                            <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm hover:shadow-md transition-shadow">
                                <div className="flex justify-between items-center mb-2">
                                    <h3 className="font-bold text-xl text-slate-800">{item.stage}</h3>
                                    <span className={`text-[10px] font-bold px-2 py-1 rounded-md uppercase tracking-widest ${item.status === 'Done' ? 'bg-emerald-100 text-emerald-600' : 'bg-indigo-100 text-indigo-600'}`}>
                                        {item.status}
                                    </span>
                                </div>
                                <p className="text-indigo-600 font-bold mb-2 text-sm">關鍵任務：{item.focus}</p>
                                <p className="text-slate-500 text-sm leading-relaxed">{item.desc}</p>
                            </div>
                        </div>
                    ))}
                </div>
            </div>
        );

        // --- 主應用組件 ---
        function App() {
            const [view, setView] = useState('flow'); 
            const [step, setStep] = useState(1);
            const [isAiLoading, setIsAiLoading] = useState(false);
            const [data, setData] = useState({
                decision: '',
                system2Checks: [
                    { text: "我已經檢查過過去五年的數據基準。", checked: false },
                    { text: "我徵詢過三位反對者的真實意見。", checked: false },
                    { text: "我能承受失敗後產生的具體後果。", checked: false }
                ],
                futureScript: ''
            });

            const toggleCheck = (index) => {
                const newChecks = [...data.system2Checks];
                newChecks[index].checked = !newChecks[index].checked;
                setData({...data, system2Checks: newChecks});
            };

            const handleAiGeneration = async () => {
                if (!data.decision) return;
                setIsAiLoading(true);
                try {
                    const script = await generateFutureScript(data.decision, data.system2Checks);
                    setData({...data, futureScript: script});
                } catch (e) {
                    console.error(e);
                } finally {
                    setIsAiLoading(false);
                }
            };

            const renderFlow = () => {
                switch(step) {
                    case 1: return (
                        <div className="fade-in">
                            <div className="flex items-center gap-2 text-orange-500 mb-2 font-
