<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三系統認知決策導航器 - 專業 PDF 導出版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* 列印專用樣式 */
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background: white; padding: 0; }
            .report-card { border: none; shadow: none; width: 100%; }
        }
        .print-only { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- 小圖標組件 ---
        const Icon = ({ name, className = "w-6 h-6" }) => {
            const icons = {
                brain: <path d="M12 2a5 5 0 0 1 5 5c0 1.25-.46 2.39-1.21 3.26A5 5 0 0 1 12 19a5 5 0 0 1-3.79-8.74A5 5 0 0 1 7 7a5 5 0 0 1 5-5zM9 7.5a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3zM15 7.5a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3z" />,
                compass: (
                    <React.Fragment>
                        <circle cx="12" cy="12" r="10"/><path d="m16.24 7.76-1.42 4.24-4.24 1.42 1.42-4.24 4.24-1.42Z"/><line x1="12" x2="12" y1="2" y2="4"/><line x1="12" x2="12" y1="20" y2="22"/><line x1="2" x2="4" y1="12" y2="12"/><line x1="20" x2="22" y1="12" y2="12"/>
                    </React.Fragment>
                ),
                check: <polyline points="20 6 9 17 4 12" />,
                alert: (
                    <React.Fragment>
                        <circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/>
                    </React.Fragment>
                ),
                chevronRight: <polyline points="9 18 15 12 9 6" />,
                chevronLeft: <polyline points="15 18 9 12 15 6" />,
                file: (
                    <React.Fragment>
                        <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
                        <polyline points="14 2 14 8 20 8"/>
                    </React.Fragment>
                )
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || <circle cx="12" cy="12" r="10" />}
                </svg>
            );
        };

        // --- 列印報告樣板 ---
        const PrintableReport = ({ data }) => (
            <div className="print-only p-12 bg-white text-slate-900 border border-slate-200 rounded-lg max-w-4xl mx-auto shadow-sm report-card">
                <div className="flex justify-between items-start border-b-4 border-indigo-600 pb-6 mb-8">
                    <div>
                        <h1 className="text-3xl font-bold text-indigo-900 mb-1">大腦決策審計報告</h1>
                        <p className="text-slate-500 text-sm">Cognitive Decision Audit Report • 三系統決策導航器 v1.2</p>
                    </div>
                    <div className="text-right">
                        <p className="font-bold text-sm">生成日期：{new Date().toLocaleDateString()}</p>
                        <p className="text-slate-400 text-xs tracking-widest uppercase">ID: {Math.random().toString(36).substr(2, 9).toUpperCase()}</p>
                    </div>
                </div>

                <section className="mb-10">
                    <h2 className="bg-slate-100 p-2 text-lg font-bold border-l-4 border-orange-500 mb-4">第一階段：系統一 (直覺捕捉)</h2>
                    <div className="pl-4">
                        <p className="font-bold text-slate-500 mb-1 text-sm">原始決策意圖：</p>
                        <p className="text-xl font-medium leading-relaxed">{data.decision || "未提供詳細資訊"}</p>
                    </div>
                </section>

                <section className="mb-10">
                    <h2 className="bg-slate-100 p-2 text-lg font-bold border-l-4 border-blue-500 mb-4">第二階段：系統二 (邏輯審計)</h2>
                    <div className="pl-4 space-y-2">
                        {[
                            "數據完整性檢查",
                            "外部反對意見諮詢",
                            "風險緩釋與 B 計畫"
                        ].map((text, i) => (
                            <div key={i} className="flex items-center gap-3">
                                <span className={data.system2Checks[i] ? "text-emerald-600 font-bold" : "text-slate-300"}>
                                    {data.system2Checks[i] ? "✓ [已通過]" : "✗ [未勾選]"}
                                </span>
                                <span className={data.system2Checks[i] ? "text-slate-900" : "text-slate-400"}>{text}</span>
                            </div>
                        ))}
                    </div>
                </section>

                <section className="mb-10">
                    <h2 className="bg-slate-100 p-2 text-lg font-bold border-l-4 border-indigo-600 mb-4">第三階段：系統三 (未來模擬)</h2>
                    <div className="pl-4 space-y-6">
                        <div>
                            <p className="font-bold text-slate-500 mb-2 text-sm">一年後的成功情境預測：</p>
                            <p className="italic bg-indigo-50 p-4 rounded-xl text-indigo-900">{data.system3Feeling || "未輸入模擬內容"}</p>
                        </div>
                        <div>
                            <p className="font-bold text-slate-500 mb-2 text-sm">身分認同與價值觀對齊：</p>
                            <p className="text-slate-700 leading-relaxed">{data.system3Identity || "未進行價值觀綁定"}</p>
                        </div>
                    </div>
                </section>

                <div className="mt-20 pt-8 border-t border-slate-100 text-center text-slate-400 text-xs">
                    <p>本報告由認知科學「三系統接力」模型生成。決策品質取決於輸入資訊的真實性與反思深度。</p>
                </div>
            </div>
        );

        // --- 主應用組件 ---
        function App() {
            const [step, setStep] = useState(1);
            const [data, setData] = useState({
                decision: '',
                system2Checks: [false, false, false],
                system3Feeling: '',
                system3Identity: ''
            });

            const toggleCheck = (index) => {
                const newChecks = [...data.system2Checks];
                newChecks[index] = !newChecks[index];
                setData({...data, system2Checks: newChecks});
            };

            const handleDownload = () => {
                window.print(); // 觸發瀏覽器列印功能，列印時 CSS 會自動切換版面
            };

            const renderContent = () => {
                switch(step) {
                    case 1: return (
                        <div className="fade-in">
                            <h3 className="text-orange-500 font-bold text-sm mb-2 uppercase tracking-widest">STEP 1: 直覺捕捉</h3>
                            <h2 className="text-3xl font-extrabold mb-6 leading-tight">先別急著分析，你的<span className="text-indigo-600">第一反應</span>是？</h2>
                            <textarea 
                                className="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-[2rem] h-40 outline-none focus:border-indigo-500 transition-all text-lg"
                                placeholder="在這裡寫下你的初步點子..."
                                value={data.decision}
                                onChange={(e) => setData({...data, decision: e.target.value})}
                            />
                        </div>
                    );
                    case 2: return (
                        <div className="fade-in">
                            <h3 className="text-blue-500 font-bold text-sm mb-2 uppercase tracking-widest">STEP 2: 邏輯審計</h3>
                            <h2 className="text-3xl font-extrabold mb-6 leading-tight">啟動你的<span className="text-indigo-600">理智清單</span></h2>
                            <div className="space-y-4">
                                {[
                                    "我已經檢查過過去五年的平均數據。",
                                    "我詢問過三位持反對意見的朋友。",
                                    "如果明天失敗，我已經準備好 B 計畫。"
                                ].map((text, i) => (
                                    <div 
                                        key={i} 
                                        onClick={() => toggleCheck(i)}
                                        className={`p-5 rounded-[1.5rem] border-2 flex items-center gap-4 cursor-pointer transition-all ${data.system2Checks[i] ? 'bg-indigo-50 border-indigo-200 shadow-inner' : 'bg-white border-slate-100 hover:border-slate-300'}`}
                                    >
                                        <div className={`w-7 h-7 rounded-lg border-2 flex items-center justify-center transition-all ${data.system2Checks[i] ? 'bg-indigo-600 border-indigo-600 text-white' : 'border-slate-300'}`}>
                                            {data.system2Checks[i] && <Icon name="check" className="w-4 h-4" />}
                                        </div>
                                        <span className={`font-semibold ${data.system2Checks[i] ? 'text-indigo-900 line-through' : 'text-slate-700'}`}>{text}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    );
                    case 3: return (
                        <div className="fade-in">
                            <h3 className="text-indigo-500 font-bold text-sm mb-2 uppercase tracking-widest">STEP 3: 未來模擬</h3>
                            <h2 className="text-3xl font-extrabold mb-6 leading-tight">進入<span className="text-indigo-600">模擬艙</span>預習生活</h2>
                            <div className="space-y-6">
                                <textarea 
                                    className="w-full p-4 bg-indigo-50 border border-indigo-100 rounded-2xl h-24 outline-none focus:ring-2 focus:ring-indigo-500 text-indigo-900"
                                    placeholder="一年後成功後的某個週三下午，你在哪裡？感覺如何？"
                                    value={data.system3Feeling}
                                    onChange={(e) => setData({...data, system3Feeling: e.target.value})}
                                />
                                <textarea 
                                    className="w-full p-4 bg-white border border-slate-200 rounded-2xl h-24 outline-none focus:ring-2 focus:ring-indigo-500"
                                    placeholder="這與你理想中的身分對齊嗎？"
                                    value={data.system3Identity}
                                    onChange={(e) => setData({...data, system3Identity: e.target.value})}
                                />
                            </div>
                        </div>
                    );
                    case 4: return (
                        <div className="fade-in text-center py-6">
                            <div className="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-6">
                                <Icon name="check" className="w-10 h-10" />
                            </div>
                            <h2 className="text-4xl font-extrabold mb-4">分析報告已生成</h2>
                            <p className="text-slate-500 mb-10 max-w-sm mx-auto">點擊下方按鈕將生成一份專屬的決策審計報告。請選擇「另存為 PDF」以保存。</p>
                            
                            <button 
                                onClick={handleDownload}
                                className="w-full py-5 bg-indigo-600 text-white rounded-full font-bold shadow-xl hover:bg-indigo-700 active:scale-95 transition-all flex items-center justify-center gap-3 text-lg"
                            >
                                <Icon name="file" /> 生成 PDF 決策報告
                            </button>
                        </div>
                    );
                }
            };

            return (
                <div className="min-h-screen bg-slate-50">
                    {/* 一般瀏覽模式 */}
                    <div className="no-print flex flex-col items-center py-10 px-4">
                        <div className="w-full max-w-xl">
                            <header className="mb-10 flex justify-between items-center">
                                <div className="flex items-center gap-2">
                                    <div className="bg-indigo-600 text-white p-2 rounded-lg"><Icon name="compass" className="w-5 h-5" /></div>
                                    <span className="font-extrabold text-xl tracking-tight uppercase">Cognav</span>
                                </div>
                                <div className="flex gap-1.5">
                                    {[1,2,3,4].map(i => (
                                        <div key={i} className={`h-1.5 w-6 rounded-full transition-all ${step === i ? 'bg-indigo-600 w-10' : 'bg-slate-200'}`} />
                                    ))}
                                </div>
                            </header>

                            <div className="bg-white rounded-[3rem] shadow-2xl shadow-slate-200 border border-slate-100 p-8 md:p-12 min-h-[500px] flex flex-col justify-between">
                                {renderContent()}
                                {step < 4 && (
                                    <div className="mt-12 flex justify-between items-center pt-8 border-t border-slate-50">
                                        <button onClick={() => setStep(s => s - 1)} disabled={step === 1} className={`font-bold flex items-center gap-1 ${step === 1 ? 'text-slate-200' : 'text-slate-400 hover:text-slate-600 transition-colors'}`}>
                                            <Icon name="chevronLeft" className="w-5 h-5" /> 上一步
                                        </button>
                                        <button onClick={() => setStep(s => s + 1)} className="bg-slate-900 text-white px-10 py-3.5 rounded-full font-bold flex items-center gap-2 hover:bg-black shadow-lg active:scale-95 transition-all">
                                            下一步 <Icon name="chevronRight" className="w-5 h-5" />
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* 列印專用隱藏區域 */}
                    <PrintableReport data={data} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
