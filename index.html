<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COGNAV Pro - 專業三系統決策審計系統</title>
    <!-- 引入 CDN 資源 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Noto+Sans+TC:wght@400;700&display=swap');
        
        :root {
            --brand-primary: #4f46e5;
            --brand-secondary: #10b981;
        }

        body { 
            font-family: 'Plus Jakarta Sans', 'Noto Sans TC', sans-serif; 
            background: radial-gradient(circle at top left, #f8fafc, #eff6ff);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .fade-in { animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 列印優化 */
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background: white !important; }
            .report-card { box-shadow: none !important; border: 1px solid #eee !important; width: 100% !important; margin: 0 !important; }
        }
        .print-only { display: none; }

        /* 加載動畫 */
        .loader {
            width: 24px;
            height: 24px;
            border: 3px solid #e2e8f0;
            border-bottom-color: var(--brand-primary);
            border-radius: 50%;
            display: inline-block;
            animation: rotation 1s linear infinite;
        }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen text-slate-900 overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, Fragment } = React;

        // --- 核心後端呼叫邏輯 ---
        async function fetchAI(prompt, type) {
            try {
                // 這是你 Vercel 上的後端路徑
                const response = await fetch('/api/cognav', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt, type })
                });

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({ error: "伺服器通訊異常" }));
                    throw new Error(errData.error || "伺服器通訊異常");
                }

                const data = await response.json();
                return data.text;
            } catch (e) {
                throw { status: "Error", msg: e.message };
            }
        }

        // --- 核心組件：圖標渲染 ---
        function Icon({ name, className = "w-6 h-6" }) {
            const paths = {
                brain: <path d="M12 2a5 5 0 0 1 5 5c0 1.25-.46 2.39-1.21 3.26A5 5 0 0 1 12 19a5 5 0 0 1-3.79-8.74A5 5 0 0 1 7 7a5 5 0 0 1 5-5zM9 7.5a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3zM15 7.5a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3z" />,
                compass: <g><circle cx="12" cy="12" r="10"/><path d="m16.24 7.76-1.42 4.24-4.24 1.42 1.42-4.24 4.24-1.42Z"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2"/></g>,
                zap: <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />,
                check: <polyline points="20 6 9 17 4 12" />,
                alert: <g><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y1="16"/></g>,
                file: <g><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></g>,
                crown: <path d="m2 4 3 12h14l3-12-6 7-4-7-4 7-6-7zm3 16h14" />,
                chevronRight: <polyline points="9 18 15 12 9 6" />,
                chevronLeft: <polyline points="15 18 9 12 15 6" />
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {paths[name] || <circle cx="12" cy="12" r="10" />}
                </svg>
            );
        }

        // --- 組件：列印報告 (正式商業風格) ---
        function PrintableReport({ data }) {
            return (
                <div className="p-16 bg-white text-slate-900 report-card min-h-screen border-t-8 border-indigo-600">
                    <div className="flex justify-between items-start mb-12 border-b pb-8">
                        <div>
                            <h1 className="text-4xl font-extrabold text-indigo-950 mb-2">Cognitive Audit Executive Summary</h1>
                            <p className="text-slate-500 font-bold uppercase tracking-widest text-sm">COGNAV Pro - 三系統決策審計報告</p>
                        </div>
                        <div className="text-right text-xs text-slate-400 font-bold uppercase">
                            <p>Serial: {Math.random().toString(36).substr(2, 9).toUpperCase()}</p>
                            <p>Generated: {new Date().toLocaleDateString()}</p>
                        </div>
                    </div>

                    <div className="space-y-12">
                        <section>
                            <h3 className="text-xs font-black text-orange-500 uppercase tracking-[0.2em] mb-4">Phase 1: Intuitive Baseline</h3>
                            <div className="bg-slate-50 p-6 rounded-2xl text-xl font-medium border-l-4 border-orange-500 italic">
                                "{data.decision || "N/A"}"
                            </div>
                        </section>

                        <section>
                            <h3 className="text-xs font-black text-blue-500 uppercase tracking-[0.2em] mb-4">Phase 2: Logical Verification</h3>
                            <div className="grid grid-cols-1 gap-3 pl-2">
                                {data.system2Checks.map((item, i) => (
                                    <div key={i} className="flex items-center gap-3 text-sm font-bold text-slate-700">
                                        <span className={item.checked ? "text-emerald-500" : "text-slate-300"}>{item.checked ? "✓ [Verified]" : "✗ [Pending]"}</span>
                                        <span>{item.text}</span>
                                    </div>
                                ))}
                            </div>
                        </section>

                        <section>
                            <h3 className="text-xs font-black text-indigo-500 uppercase tracking-[0.2em] mb-4">Phase 3: Visual & Identity Simulation</h3>
                            <div className="bg-indigo-50 p-8 rounded-3xl text-indigo-950 leading-relaxed whitespace-pre-wrap font-medium border border-indigo-100 italic shadow-inner">
                                {data.futureScript || "Simulation not executed."}
                            </div>
                        </section>

                        <section>
                            <h3 className="text-xs font-black text-emerald-500 uppercase tracking-[0.2em] mb-4">Phase 4: Behavioral Nudge Architecture</h3>
                            <div className="bg-emerald-50/50 p-8 rounded-3xl text-emerald-950 leading-relaxed whitespace-pre-wrap font-bold border border-emerald-100">
                                {data.nudges || "Action plan not generated."}
                            </div>
                        </section>
                    </div>

                    <div className="mt-20 pt-10 border-t flex justify-between items-end">
                        <div className="text-[10px] text-slate-300 font-bold uppercase">
                            © 2024 COGNAV Labs. All rights reserved. Professional Edition.
                        </div>
                        <div className="flex gap-2">
                            <div className="w-8 h-8 bg-indigo-600 rounded-lg"></div>
                            <div className="w-8 h-8 bg-emerald-500 rounded-lg"></div>
                        </div>
                    </div>
                </div>
            );
        }

        // --- 主應用組件 ---
        function App() {
            const [step, setStep] = useState(1);
            const [isAiLoading, setIsAiLoading] = useState(false);
            const [aiError, setAiError] = useState(null);
            const [data, setData] = useState({
                decision: '',
                system2Checks: [
                    { text: "我已經檢查過過去五年的數據基準。", checked: false },
                    { text: "我徵詢過三位反對者的真實意見。", checked: false },
                    { text: "我能承受失敗後產生的具體後果。", checked: false }
                ],
                futureScript: '',
                nudges: ''
            });

            const nextStep = () => setStep(s => Math.min(s + 1, 5));
            const prevStep = () => setStep(s => Math.max(s - 1, 1));

            // 自動觸發助推生成 (Step 4)
            useEffect(() => {
                if (step === 4 && !data.nudges && data.futureScript) {
                    generateNudges();
                }
            }, [step]);

            const generateFutureScript = async () => {
                if (!data.decision) return;
                setIsAiLoading(true); setAiError(null);
                try {
                    const prompt = `你是認知科學專家。針對決策：『${data.decision}』，生成 300 字感官豐富的未來成功模擬劇本。`;
                    const text = await fetchAI(prompt, "script");
                    setData(prev => ({...prev, futureScript: text}));
                } catch (e) { setAiError(e); } 
                finally { setIsAiLoading(false); }
            };

            const generateNudges = async () => {
                setIsAiLoading(true);
                try {
                    const prompt = `你是行為經濟學家。根據決策：『${data.decision}』與願景：『${data.futureScript}』，提供 3 個具體的環境助推 (Nudge) 方案：1. 負向摩擦力 2. 正向助推 3. 視覺錨點。`;
                    const text = await fetchAI(prompt, "nudge");
                    setData(prev => ({...prev, nudges: text}));
                } catch (e) { console.error(e); }
                finally { setIsAiLoading(false); }
            };

            return (
                <div className="min-h-screen selection:bg-indigo-100">
                    {/* Header */}
                    <nav className="no-print w-full px-6 py-4 flex justify-between items-center glass-card sticky top-0 z-40">
                        <div className="flex items-center gap-2">
                            <div className="bg-indigo-600 p-2 rounded-xl text-white shadow-lg shadow-indigo-200">
                                <Icon name="compass" className="w-5 h-5" />
                            </div>
                            <span className="font-extrabold text-xl tracking-tighter">COGNAV <span className="text-indigo-600">PRO</span></span>
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="hidden md:flex bg-slate-100 rounded-full px-4 py-1 gap-2">
                                {[1, 2, 3, 4].map(i => (
                                    <div key={i} className={`w-2 h-2 rounded-full transition-all ${step >= i ? 'bg-indigo-600 w-6' : 'bg-slate-300'}`} />
                                ))}
                            </div>
                            <div className="flex items-center gap-1 px-3 py-1 bg-indigo-50 text-indigo-600 rounded-full text-[10px] font-black border border-indigo-100 uppercase tracking-widest">
                                <Icon name="shield" className="w-3 h-3" /> Secure Proxy Active
                            </div>
                        </div>
                    </nav>

                    <main className="no-print max-w-4xl mx-auto py-12 px-6">
                        <div className="bg-white rounded-[3.5rem] shadow-2xl shadow-slate-200/60 border border-white p-8 md:p-16 min-h-[600px] flex flex-col justify-between fade-in relative overflow-hidden">
                            {/* 背景裝飾 */}
                            <div className="absolute top-0 right-0 w-64 h-64 bg-indigo-50 rounded-full blur-3xl opacity-50 -mr-32 -mt-32"></div>
                            
                            <div className="relative z-10">
                                {step === 1 && (
                                    <Fragment>
                                        <div className="flex items-center gap-3 text-orange-500 mb-6 font-black uppercase tracking-widest text-xs">
                                            <Icon name="brain" className="w-4 h-4" /> System 1 Baseline
                                        </div>
                                        <h2 className="text-4xl font-extrabold mb-6 tracking-tighter leading-tight">捕捉原始直覺</h2>
                                        <p className="text-slate-500 mb-8 font-medium max-w-lg">在數據與邏輯干擾之前，寫下你最本能的決定。</p>
                                        <textarea 
                                            className="w-full p-8 bg-slate-50 border-2 border-slate-100 rounded-[2.5rem] h-56 outline-none focus:border-indigo-500 focus:bg-white transition-all text-xl font-medium shadow-inner" 
                                            placeholder="例如：我考慮辭去穩定工作，全心投入我的副業計畫..."
                                            value={data.decision}
                                            onChange={(e)=>setData({...data, decision: e.target.value})}
                                        />
                                    </Fragment>
                                )}

                                {step === 2 && (
                                    <Fragment>
                                        <div className="flex items-center gap-3 text-blue-500 mb-6 font-black uppercase tracking-widest text-xs">
                                            <Icon name="check" className="w-4 h-4" /> System 2 Verification
                                        </div>
                                        <h2 className="text-4xl font-extrabold mb-6 tracking-tighter">邏輯風險審計</h2>
                                        <div className="space-y-4">
                                            {data.system2Checks.map((item, i) => (
                                                <div key={i} onClick={() => {
                                                    const n = [...data.system2Checks];
                                                    n[i].checked = !n[i].checked;
                                                    setData({...data, system2Checks: n});
                                                }} className={`p-6 rounded-3xl border-2 flex items-center gap-5 cursor-pointer transition-all ${item.checked ? 'bg-indigo-50 border-indigo-200' : 'bg-white border-slate-100 hover:border-slate-300'}`}>
                                                    <div className={`w-8 h-8 rounded-xl flex items-center justify-center transition-all ${item.checked ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-300'}`}>
                                                        <Icon name="check" className="w-5 h-5" />
                                                    </div>
                                                    <span className={`text-lg font-bold ${item.checked ? 'text-indigo-900 opacity-60 line-through' : 'text-slate-700'}`}>{item.text}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </Fragment>
                                )}

                                {step === 3 && (
                                    <Fragment>
                                        <div className="flex items-center gap-3 text-indigo-500 mb-6 font-black uppercase tracking-widest text-xs">
                                            <Icon name="compass" className="w-4 h-4" /> System 3 Simulation
                                        </div>
                                        <h2 className="text-4xl font-extrabold mb-8 tracking-tighter">未來感官模擬艙</h2>
                                        {!data.futureScript ? (
                                            <button onClick={generateFutureScript} disabled={isAiLoading} className="w-full py-16 bg-indigo-50 border-2 border-dashed border-indigo-200 rounded-[3rem] flex flex-col items-center gap-4 group hover:bg-indigo-100 transition-all">
                                                {isAiLoading ? <div className="loader"></div> : <Fragment><Icon name="sparkles" className="w-12 h-12 text-indigo-600 group-hover:scale-110 transition-all" /><span className="text-indigo-600 font-black uppercase tracking-widest text-sm">啟動 AI 情感模擬</span></Fragment>}
                                            </button>
                                        ) : (
                                            <div className="bg-slate-900 p-10 rounded-[3rem] shadow-2xl relative text-left">
                                                <div className="flex justify-between items-center mb-6 border-b border-white/10 pb-4">
                                                    <span className="text-[10px] font-black text-indigo-400 uppercase tracking-widest">Simulation Result</span>
                                                    <button onClick={()=>setData({...data, futureScript: ''})} className="text-[10px] text-white/40 hover:text-white uppercase font-bold">重新生成</button>
                                                </div>
                                                <p className="text-indigo-50 italic text-xl leading-relaxed whitespace-pre-wrap font-medium">{data.futureScript}</p>
                                            </div>
                                        )}
                                    </Fragment>
                                )}

                                {step === 4 && (
                                    <Fragment>
                                        <div className="flex items-center gap-3 text-emerald-500 mb-6 font-black uppercase tracking-widest text-xs">
                                            <Icon name="zap" className="w-4 h-4" /> Action Nudge Plan
                                        </div>
                                        <h2 className="text-4xl font-extrabold mb-8 tracking-tighter">智慧行動助推建議</h2>
                                        <div className="space-y-6">
                                            {isAiLoading ? (
                                                <div className="p-16 flex flex-col items-center gap-4">
                                                    <div className="loader border-t-emerald-500 border-b-transparent border-l-transparent border-r-transparent"></div>
                                                    <p className="text-slate-400 font-bold animate-pulse">正在設計個人化環境方案...</p>
                                                </div>
                                            ) : (
                                                <div className="bg-emerald-50 p-10 rounded-[3rem] border border-emerald-100 text-emerald-950 font-bold leading-relaxed whitespace-pre-wrap text-lg text-left">
                                                    {data.nudges || "Nudges not found."}
                                                </div>
                                            )}
                                        </div>
                                    </Fragment>
                                )}

                                {step === 5 && (
                                    <div className="text-center py-10">
                                        <div className="w-24 h-24 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-8 shadow-xl">
                                            <Icon name="crown" className="w-12 h-12" />
                                        </div>
                                        <h2 className="text-5xl font-extrabold mb-4 tracking-tighter">審計報告已就緒</h2>
                                        <p className="text-slate-500 text-lg font-medium mb-12 max-w-md mx-auto">
                                            我們已經為您的決策完成了 360 度的認知掃描。這份報告將引導您度過接下來的執行期。
                                        </p>
                                        <button onClick={()=>window.print()} className="bg-indigo-600 text-white px-12 py-5 rounded-full font-black text-lg shadow-2xl hover:bg-indigo-700 active:scale-95 transition-all flex items-center gap-3 mx-auto">
                                            <Icon name="file" className="w-6 h-6" /> 下載 PDF 專業報告
                                        </button>
                                    </div>
                                )}
                            </div>

                            {/* 控制鈕 */}
                            {step < 5 && (
                                <div className="mt-12 flex justify-between items-center pt-10 border-t border-slate-50">
                                    <button onClick={prevStep} disabled={step === 1} className={`flex items-center gap-2 font-bold px-6 py-2 rounded-2xl transition-all ${step === 1 ? 'text-slate-200' : 'text-slate-400 hover:bg-slate-50 hover:text-slate-900'}`}>
                                        <Icon name="chevronLeft" className="w-5 h-5" /> Back
                                    </button>
                                    <button onClick={nextStep} className="bg-slate-900 text-white px-10 py-4 rounded-full font-black flex items-center gap-3 hover:bg-black shadow-xl active:scale-95 transition-all">
                                        {step === 4 ? '產生總結報告' : '繼續下一步'} <Icon name="chevronRight" className="w-5 h-5" />
                                    </button>
                                </div>
                            )}

                            {aiError && (
                                <div className="mt-6 p-4 bg-red-50 border border-red-100 rounded-2xl text-red-600 text-xs font-mono flex items-center gap-2">
                                    <Icon name="alert" className="w-4 h-4 shrink-0" />
                                    <span>{aiError.msg}</span>
                                </div>
                            )}
                        </div>
                    </main>

                    {/* PDF 隱藏層 */}
                    <div className="print-only">
                        <PrintableReport data={data} />
                    </div>

                    <footer className="no-print mt-8 text-center pb-12">
                        <p className="text-slate-300 text-[10px] font-bold uppercase tracking-[0.4em]">COGNAV Labs • Secure SaaS Edition v4.0</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
