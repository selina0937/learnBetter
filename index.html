<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COGNAV - 三系統 AI 決策導航器</title>
    <!-- 引入開發所需的 CDN 資源 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 列印專用樣式 */
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background: white !important; padding: 0 !important; }
            .report-card { border: none !important; box-shadow: none !important; width: 100% !important; max-width: 100% !important; }
        }
        .print-only { display: none; }
        
        /* 加載動畫樣式 */
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #4f46e5; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, Fragment } = React;

        // --- Gemini API 串接邏輯 ---
        // 請在此填入您在 Google AI Studio 申請的 API Key
        const apiKey = "AIzaSyD-0UEeZYRsesGJz9FuNJn4hL9TQqK_9Ok"; 
        
        async function generateFutureScript(userDecision, checks) {
            const activeChecks = checks.filter(c => c.checked).map(c => c.text).join('、');
            const systemPrompt = `你是一位認知科學專家，擅長『系統三』模擬推理（Simulated Reasoning）。
            你的任務是協助使用者將其決策轉化為感官豐富的未來模擬劇本。
            要求：
            1. 包含具體的感官細節（光線、聲音、氣味）。
            2. 描述成功後的深層情感（如：如釋重負、自豪）。
            3. 強調這如何與理想身分認同對齊。
            4. 請直接輸出劇本內容（約 300 字），不要包含任何引言。`;

            const userQuery = `我的決策是：『${userDecision}』。我已通過的檢核：${activeChecks || '基本檢核'}。請生成模擬劇本。`;

            // 注意：對於標準 API Key，請使用 gemini-1.5-flash 以避免 404
            const modelName = "gemini-1.5-flash"; 
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;
            
            let delay = 1000;
            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: userQuery }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });
                    
                    if (!response.ok) {
                        const errorData = await response.text();
                        console.error(`API 錯誤詳情:`, errorData);
                        throw new Error(`${response.status}`);
                    }
                    
                    const result = await response.json();
                    const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (!text) throw new Error('AI 返回內容為空');
                    return text;
                } catch (error) {
                    if (i === 4) throw error;
                    await new Promise(resolve => setTimeout(resolve, delay));
                    delay *= 2;
                }
            }
        }

        // --- 核心組件：圖標渲染 (解決 Babel 編譯問題) ---
        const Icon = ({ name, className = "w-6 h-6" }) => {
            const renderIconPaths = () => {
                switch(name) {
                    case 'brain': return <path d="M12 2a5 5 0 0 1 5 5c0 1.25-.46 2.39-1.21 3.26A5 5 0 0 1 12 19a5 5 0 0 1-3.79-8.74A5 5 0 0 1 7 7a5 5 0 0 1 5-5zM9 7.5a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3zM15 7.5a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3z" />;
                    case 'compass': return <Fragment><circle cx="12" cy="12" r="10"/><path d="m16.24 7.76-1.42 4.24-4.24 1.42 1.42-4.24 4.24-1.42Z"/><line x1="12" x2="12" y1="2" y2="4"/><line x1="12" x2="12" y1="20" y2="22"/><line x1="2" x2="4" y1="12" y2="12"/><line x1="20" x2="22" y1="12" y2="12"/></Fragment>;
                    case 'check': return <polyline points="20 6 9 17 4 12" />;
                    case 'alert': return <Fragment><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></Fragment>;
                    case 'map': return <path d="M14.12 3.88 16 2l4 4-1.88 1.88M19 11l-8 8M15 11l-8 8M11 11l-8 8" />;
                    case 'sparkles': return <Fragment><path d="m12 3 1.912 5.813a2 2 0 0 0 1.275 1.275L21 12l-5.813 1.912a2 2 0 0 0-1.275 1.275L12 21l-1.912-5.813a2 2 0 0 0-1.275-1.275L3 12l5.813-1.912a2 2 0 0 0 1.275-1.275L12 3Z"/><path d="M5 3L4 4.5 5 6"/><path d="M19 3l1 1.5-1 1.5"/></Fragment>;
                    case 'file': return <Fragment><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></Fragment>;
                    case 'chevronRight': return <polyline points="9 18 15 12 9 6" />;
                    case 'chevronLeft': return <polyline points="15 18 9 12 15 6" />;
                    default: return <circle cx="12" cy="12" r="10" />;
                }
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {renderIconPaths()}
                </svg>
            );
        };

        // --- 頁面內容：實施路徑圖 ---
        const RoadmapView = () => (
            <div className="fade-in space-y-8 max-w-2xl mx-auto">
                <h2 className="text-3xl font-extrabold text-indigo-900 text-center mb-10">產品開發路徑圖</h2>
                <div className="relative border-l-2 border-slate-200 ml-4 space-y-12">
                    {[
                        { stage: "階段一：MVP 基礎", focus: "直覺捕捉與邏輯檢核", desc: "建立第一套決策捕捉介面，串接雙系統偏誤提醒。已完成核心 UI。", icon: "brain", status: "Done" },
                        { stage: "階段二：AI 模擬核心", focus: "系統三模擬艙 (Gemini)", desc: "串接 Gemini 1.5 模型，自動生成高品質未來感官劇本。正在測試中。", icon: "sparkles", status: "Running" },
                        { stage: "階段三：環境助推", focus: "助推 (Nudge) 引擎", desc: "開發環境設置建議，確保決策能透過『微型阻力』持續執行。", icon: "check", status: "Next" }
                    ].map((item, i) => (
                        <div key={i} className="relative pl-10">
                            <div className="absolute -left-[13px] top-0 bg-white border-2 border-indigo-600 rounded-full p-1 shadow-sm">
                                <div className="w-4 h-4 bg-indigo-600 rounded-full"></div>
                            </div>
                            <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm hover:shadow-md transition-shadow">
                                <div className="flex justify-between items-center mb-2">
                                    <h3 className="font-bold text-xl text-slate-800">{item.stage}</h3>
                                    <span className={`text-[10px] font-bold px-2 py-1 rounded-md uppercase tracking-widest ${item.status === 'Done' ? 'bg-emerald-100 text-emerald-600' : 'bg-indigo-100 text-indigo-600'}`}>
                                        {item.status}
                                    </span>
                                </div>
                                <p className="text-indigo-600 font-bold mb-2 text-sm">關鍵任務：{item.focus}</p>
                                <p className="text-slate-500 text-sm leading-relaxed">{item.desc}</p>
                            </div>
                        </div>
                    ))}
                </div>
            </div>
        );

        // --- 頁面內容：列印報告樣板 ---
        const PrintableReport = ({ data }) => (
            <div className="print-only p-12 bg-white text-slate-900 border border-slate-200 rounded-lg max-w-4xl mx-auto report-card">
                <div className="flex justify-between items-start border-b-4 border-indigo-600 pb-6 mb-8">
                    <div>
                        <h1 className="text-3xl font-bold text-indigo-900 mb-1 font-inter">Cognitive Audit Report</h1>
                        <p className="text-slate-500 text-sm italic">三系統決策導航報告 • COGNAV v1.5</p>
                    </div>
                    <div className="text-right text-xs font-bold text-slate-400">
                        <p>生成日期：{new Date().toLocaleDateString()}</p>
                    </div>
                </div>
                <div className="space-y-8">
                    <section>
                        <h2 className="bg-slate-50 p-2 text-lg font-bold border-l-4 border-orange-500 mb-3 uppercase tracking-widest text-xs">Step 1: Raw Intuition</h2>
                        <p className="text-xl font-medium leading-relaxed pl-4">{data.decision || "未輸入內容"}</p>
                    </section>
                    <section>
                        <h2 className="bg-slate-50 p-2 text-lg font-bold border-l-4 border-blue-500 mb-3 uppercase tracking-widest text-xs">Step 2: Logical Audit</h2>
                        <div className="pl-4 space-y-2">
                            {data.system2Checks.map((item, i) => (
                                <div key={i} className="flex items-center gap-3">
                                    <span className={item.checked ? "text-emerald-600" : "text-slate-300"}>{item.checked ? "☑" : "☐"}</span>
                                    <span className={item.checked ? "text-slate-900 font-bold" : "text-slate-400"}>{item.text}</span>
                                </div>
                            ))}
                        </div>
                    </section>
                    <section>
                        <h2 className="bg-slate-50 p-2 text-lg font-bold border-l-4 border-indigo-600 mb-3 uppercase tracking-widest text-xs">Step 3: AI Future Script</h2>
                        <div className="italic bg-indigo-50 p-6 rounded-2xl text-indigo-900 leading-relaxed whitespace-pre-wrap pl-4">
                            {data.futureScript || "⚠️ 您尚未啟動 AI 未來模擬，此處內容為空。"}
                        </div>
                    </section>
                </div>
            </div>
        );

        // --- 主應用組件 ---
        function App() {
            const [view, setView] = useState('flow'); 
            const [step, setStep] = useState(1);
            const [isAiLoading, setIsAiLoading] = useState(false);
            const [aiError, setAiError] = useState(null);
            const [data, setData] = useState({
                decision: '',
                system2Checks: [
                    { text: "我已經檢查過過去五年的數據基準。", checked: false },
                    { text: "我徵詢過三位反對者的真實意見。", checked: false },
                    { text: "我能承受失敗後產生的具體後果。", checked: false }
                ],
                futureScript: ''
            });

            const toggleCheck = (index) => {
                const newChecks = [...data.system2Checks];
                newChecks[index].checked = !newChecks[index].checked;
                setData({...data, system2Checks: newChecks});
            };

            const handleAiGeneration = async () => {
                if (!data.decision) return;
                setIsAiLoading(true);
                setAiError(null);
                try {
                    const script = await generateFutureScript(data.decision, data.system2Checks);
                    setData(prev => ({...prev, futureScript: script}));
                } catch (e) {
                    setAiError(e.message);
                } finally {
                    setIsAiLoading(false);
                }
            };

            return (
                <div className="min-h-screen bg-slate-50">
                    <div className="min-h-screen flex flex-col items-center py-12 px-4 no-print">
                        <div className="w-full max-w-2xl">
                            {/* 分頁切換 */}
                            <div className="flex bg-slate-200 p-1 rounded-2xl mb-10 w-fit mx-auto shadow-inner">
                                <button onClick={() => setView('flow')} className={`px-6 py-2 rounded-xl font-bold transition-all flex items-center gap-2 ${view === 'flow' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500 hover:text-slate-800'}`}>
                                    <Icon name="brain" className="w-4 h-4" /> 互動原型
                                </button>
                                <button onClick={() => setView('roadmap')} className={`px-6 py-2 rounded-xl font-bold transition-all flex items-center gap-2 ${view === 'roadmap' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500 hover:text-slate-800'}`}>
                                    <Icon name="map" className="w-4 h-4" /> 實施路徑
                                </button>
                            </div>

                            <div className="bg-white rounded-[2.5rem] shadow-2xl shadow-slate-200 border border-slate-100 p-10 md:p-14 min-h-[500px] flex flex-col justify-between">
                                {view === 'flow' ? (
                                    <Fragment>
                                        {step === 1 && (
                                            <div className="fade-in">
                                                <h2 className="text-3xl font-extrabold mb-6 leading-tight">第一步：捕捉<span className="text-indigo-600">直覺</span></h2>
                                                <textarea className="w-full p-6 bg-slate-50 border-2 rounded-3xl h-44 outline-none focus:border-indigo-500" placeholder="例如：我想在現在這個時機點辭職..." value={data.decision} onChange={(e) => setData({...data, decision: e.target.value})} />
                                            </div>
                                        )}
                                        {step === 2 && (
                                            <div className="fade-in">
                                                <h2 className="text-3xl font-extrabold mb-6">第二步：<span className="text-indigo-600">理智</span>檢核</h2>
                                                <div className="space-y-4">
                                                    {data.system2Checks.map((item, i) => (
                                                        <div key={i} onClick={() => toggleCheck(i)} className={`p-5 rounded-2xl border-2 flex items-center gap-4 cursor-pointer ${item.checked ? 'bg-indigo-50 border-indigo-200' : 'bg-white border-slate-100 hover:border-slate-300'}`}>
                                                            <div className={`w-6 h-6 rounded-lg border-2 flex items-center justify-center ${item.checked ? 'bg-indigo-600 border-indigo-600 text-white' : 'border-slate-300'}`}>
                                                                {item.checked && <Icon name="check" className="w-4 h-4" />}
                                                            </div>
                                                            <span className={item.checked ? 'text-indigo-900 line-through' : 'text-slate-700'}>{item.text}</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                        {step === 3 && (
                                            <div className="fade-in">
                                                <h2 className="text-3xl font-extrabold mb-6"><span className="text-indigo-600">未來模擬艙</span></h2>
                                                {!data.futureScript ? (
                                                    <button onClick={handleAiGeneration} disabled={isAiLoading} className="w-full py-10 bg-indigo-50 border-2 border-dashed border-indigo-200 rounded-3xl text-indigo-600 font-bold">
                                                        {isAiLoading ? <div className="loading-spinner mx-auto"></div> : "啟動 AI 感官劇本生成"}
                                                    </button>
                                                ) : (
                                                    <div className="p-8 bg-slate-900 text-white rounded-3xl relative">
                                                        <p className="text-slate-200 italic whitespace-pre-wrap">{data.futureScript}</p>
                                                        <button onClick={() => setData({...data, futureScript: ''})} className="text-[10px] text-indigo-400 underline absolute top-4 right-6">重置劇本</button>
                                                    </div>
                                                )}
                                                {aiError && <p className="text-red-500 text-xs mt-4">錯誤代碼: {aiError}。請檢查 API Key 並確認模型名稱為 gemini-1.5-flash。</p>}
                                            </div>
                                        )}
                                        {step === 4 && (
                                            <div className="fade-in text-center py-10">
                                                <div className="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-6"><Icon name="check" className="w-10 h-10" /></div>
                                                <h2 className="text-4xl font-extrabold mb-4">分析報告已就緒</h2>
                                                <button onClick={() => window.print()} className="bg-indigo-600 text-white px-10 py-4 rounded-full font-bold shadow-xl hover:bg-indigo-700 flex items-center gap-3 mx-auto">
                                                    <Icon name="file" className="w-5 h-5" /> 下載 PDF 報告書
                                                </button>
                                            </div>
                                        )}
                                        
                                        {step < 4 && (
                                            <div className="mt-12 flex justify-between items-center pt-8 border-t border-slate-50">
                                                <button onClick={() => setStep(s => s - 1)} disabled={step === 1} className={`font-bold flex items-center gap-1 ${step === 1 ? 'text-slate-200' : 'text-slate-400'}`}>
                                                    <Icon name="chevronLeft" className="w-5 h-5" /> 上一步
                                                </button>
                                                <button onClick={() => setStep(s => s + 1)} className="bg-slate-900 text-white px-10 py-3 rounded-full font-bold flex items-center gap-2 hover:bg-black">
                                                    下一步 <Icon name="chevronRight" className="w-5 h-5" />
                                                </button>
                                            </div>
                                        )}
                                    </Fragment>
                                ) : <RoadmapView />}
                            </div>
                        </div>
                    </div>
                    <PrintableReport data={data} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
