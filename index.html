<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COGNAV Pro - 專業三系統決策審計</title>
    <!-- 引入外部 CDN 資源 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Noto+Sans+TC:wght@400;700&display=swap');
        :root { --brand: #4f46e5; }
        body { 
            font-family: 'Plus Jakarta Sans', 'Noto Sans TC', sans-serif; 
            background: #f8fafc;
            color: #0f172a;
        }
        .glass-card { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); border: 1px solid #e2e8f0; }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @media print { .no-print { display: none !important; } .print-only { display: block !important; } .report-card { border: 1px solid #eee !important; box-shadow: none !important; width: 100% !important; margin: 0 !important; } }
        .print-only { display: none; }
        .loader { width: 28px; height: 28px; border: 3px solid #f3f4f6; border-top-color: var(--brand); border-radius: 50%; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, Fragment } = React;

        // --- 子組件：圖標渲染 ---
        function Icon({ name, className = "w-6 h-6" }) {
            const paths = {
                brain: <path d="M12 2a5 5 0 0 1 5 5c0 1.25-.46 2.39-1.21 3.26A5 5 0 0 1 12 19a5 5 0 0 1-3.79-8.74A5 5 0 0 1 7 7a5 5 0 0 1 5-5z" />,
                compass: <g><circle cx="12" cy="12" r="10"/><path d="m16.24 7.76-1.42 4.24-4.24 1.42 1.42-4.24 4.24-1.42Z"/></g>,
                zap: <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />,
                check: <polyline points="20 6 9 17 4 12" />,
                alert: <g><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></g>,
                file: <g><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></g>,
                crown: <path d="m2 4 3 12h14l3-12-6 7-4-7-4 7-6-7zm3 16h14" />,
                chevronRight: <polyline points="9 18 15 12 9 6" />,
                chevronLeft: <polyline points="15 18 9 12 15 6" />,
                coins: <g><circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8"/></g>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {paths[name] || <circle cx="12" cy="12" r="10" />}
                </svg>
            );
        }

        // --- 子組件：專業報告 ---
        function PrintableReport({ data }) {
            return (
                <div className="p-16 bg-white text-slate-900 report-card min-h-screen border-t-8 border-indigo-600 text-left">
                    <div className="flex justify-between items-start mb-12 border-b pb-8 text-left">
                        <div>
                            <h1 className="text-4xl font-extrabold text-indigo-950 mb-2 uppercase tracking-tight">Decision Audit Executive Summary</h1>
                            <p className="text-slate-500 font-bold uppercase tracking-widest text-sm">COGNAV Pro - 三系統決策審計報告</p>
                        </div>
                        <div className="text-right text-xs text-slate-400 font-bold uppercase">
                            <p>Serial: {Math.random().toString(36).substr(2, 9).toUpperCase()}</p>
                            <p>Date: {new Date().toLocaleDateString()}</p>
                        </div>
                    </div>
                    <div className="space-y-12 text-left">
                        <section>
                            <h3 className="text-xs font-black text-orange-500 uppercase tracking-[0.2em] mb-4">Phase 1: Intuition Baseline</h3>
                            <div className="bg-slate-50 p-6 rounded-2xl text-xl font-medium border-l-4 border-orange-500 italic">"{data.decision || "N/A"}"</div>
                        </section>
                        <section>
                            <h3 className="text-xs font-black text-blue-500 uppercase tracking-[0.2em] mb-4 text-left">Phase 2: Logical Audit Matrix</h3>
                            <div className="grid grid-cols-2 gap-6">
                                {Object.entries(data.matrix).map(([key, val]) => (
                                    <div key={key} className="p-4 bg-slate-50 rounded-xl border border-slate-100">
                                        <p className="text-[10px] font-black uppercase text-indigo-400 mb-1">{key}</p>
                                        <p className="text-sm font-bold">{val || "未填寫"}</p>
                                    </div>
                                ))}
                            </div>
                        </section>
                        <section>
                            <h3 className="text-xs font-black text-indigo-500 uppercase tracking-[0.2em] mb-4">Phase 3: Visual Identity Simulation</h3>
                            <div className="bg-indigo-50 p-8 rounded-3xl text-indigo-950 leading-relaxed whitespace-pre-wrap font-medium italic">
                                {data.futureScript || "Simulation not executed."}
                            </div>
                        </section>
                        <section>
                            <h3 className="text-xs font-black text-emerald-500 uppercase tracking-[0.2em] mb-4">Phase 4: Behavioral Nudge Plan</h3>
                            <div className="bg-emerald-50/50 p-8 rounded-3xl text-emerald-950 leading-relaxed whitespace-pre-wrap font-bold border border-emerald-100">
                                {data.nudges || "Action plan pending."}
                            </div>
                        </section>
                    </div>
                </div>
            );
        }

        // --- 主應用 ---
        function App() {
            const [view, setView] = useState('audit'); 
            const [step, setStep] = useState(1);
            const [credits, setCredits] = useState(10);
            const [isAiLoading, setIsAiLoading] = useState(false);
            const [aiError, setAiError] = useState(null);
            
            const [data, setData] = useState({
                decision: '',
                matrix: { preMortem: '', baseRate: '', externalView: '', secondOrder: '' },
                futureScript: '',
                nudges: ''
            });

            const callAiService = async (prompt, type) => {
                if (credits <= 0) throw new Error("點數不足，請前往儲值頁面。");
                const response = await fetch('/api/cognav', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt, type, currentCredits: credits })
                });
                const resData = await response.json();
                if (!response.ok) throw new Error(resData.error || "系統異常");
                setCredits(resData.newBalance); // 同步扣點
                return resData.text;
            };

            const generateFutureScript = async () => {
                if (!data.decision) return;
                setIsAiLoading(true); setAiError(null);
                try {
                    const prompt = `你是認知心理學專家。針對我的決策：『${data.decision}』。
                    請寫一段約 600 字、具備極高感官細節的「未來成功模擬劇本」。
                    要求：
                    1. 禁止任何前言與客套話，直接從細節開始。
                    2. 描述一年後成功的具體週二下午。空氣中的味道、陽光落下的角度、周遭細微的聲音。
                    3. 描述你對這個決定的情感認同，以及它如何讓你成為了理想中的自己。
                    4. 字數務必充足，語氣要深刻深刻再深刻。`;
                    const text = await callAiService(prompt, "script");
                    setData(prev => ({...prev, futureScript: text}));
                } catch (e) { setAiError(e.message); } 
                finally { setIsAiLoading(false); }
            };

            const generateNudges = async () => {
                setIsAiLoading(true);
                try {
                    const prompt = `你是行為經濟學家。根據決策：『${data.decision}』及其審計矩陣：${JSON.stringify(data.matrix)}。
                    請提供 3 個極其具體的「環境助推（Nudge）」方案。
                    要求：禁止廢話，直接條列。方案 1 關於環境摩擦力；方案 2 關於視覺提醒；方案 3 關於預設執行路徑。`;
                    const text = await callAiService(prompt, "nudge");
                    setData(prev => ({...prev, nudges: text}));
                } catch (e) { setAiError(e.message); }
                finally { setIsAiLoading(false); }
            };

            useEffect(() => {
                if (step === 4 && !data.nudges && data.futureScript) generateNudges();
            }, [step]);

            return (
                <div className="min-h-screen pb-12">
                    <nav className="no-print w-full px-8 py-4 flex justify-between items-center glass-card sticky top-0 z-50">
                        <div className="flex items-center gap-3 cursor-pointer group" onClick={()=>{setView('audit'); setStep(1);}}>
                            <div className="bg-indigo-600 p-2.5 rounded-2xl text-white shadow-lg"><Icon name="compass" className="w-5 h-5" /></div>
                            <span className="font-extrabold text-2xl tracking-tighter uppercase">COGNAV <span className="text-indigo-600 text-sm">PRO</span></span>
                        </div>
                        <div className="flex items-center gap-2 md:gap-10">
                            <button onClick={()=>setView('audit')} className={`text-xs font-black uppercase tracking-widest ${view === 'audit' ? 'text-indigo-600 border-b-2 border-indigo-600 pb-1' : 'text-slate-400'}`}>決策審計</button>
                            <button onClick={()=>setView('pricing')} className="px-5 py-2.5 bg-slate-900 text-white rounded-2xl text-[10px] font-black uppercase tracking-widest flex items-center gap-2 shadow-xl">
                                <Icon name="coins" className="w-3.5 h-3.5" /> Credits：{credits}
                            </button>
                        </div>
                    </nav>

                    <main className="no-print max-w-5xl mx-auto py-12 px-6">
                        {view === 'audit' && (
                            <div className="bg-white rounded-[3rem] shadow-2xl border border-white p-8 md:p-14 min-h-[600px] flex flex-col justify-between fade-in text-left">
                                <div className="relative z-10">
                                    {step === 1 && (
                                        <div className="fade-in">
                                            <div className="flex items-center gap-3 text-orange-500 mb-8 font-black uppercase tracking-widest text-xs"><Icon name="brain" className="w-4 h-4" /> System 1 Baseline</div>
                                            <h2 className="text-4xl font-extrabold mb-4 tracking-tighter text-slate-900 leading-tight italic">捕捉原始直覺</h2>
                                            <textarea className="w-full p-8 bg-slate-50 border-2 border-slate-100 rounded-[2.5rem] h-56 outline-none focus:border-indigo-500 font-medium text-xl shadow-inner transition-all" placeholder="例如：我想全職創業賣倉鼠周邊商品..." value={data.decision} onChange={(e)=>setData({...data, decision: e.target.value})} />
                                        </div>
                                    )}

                                    {step === 2 && (
                                        <div className="fade-in">
                                            <div className="flex items-center gap-3 text-blue-500 mb-8 font-black uppercase tracking-widest text-xs"><Icon name="check" className="w-4 h-4" /> System 2 Matrix Audit</div>
                                            <h2 className="text-4xl font-extrabold mb-10 tracking-tighter text-slate-900 font-inter leading-tight">深度決策審計矩陣</h2>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                                <div className="p-6 bg-slate-50 rounded-[2.5rem] border-2 border-slate-100 focus-within:border-indigo-500 transition-all">
                                                    <label className="text-[10px] font-black uppercase text-indigo-500 tracking-widest mb-3 block italic">事前驗屍法 (Pre-mortem)</label>
                                                    <textarea className="w-full bg-transparent border-none outline-none text-sm h-24 font-bold" placeholder="想像一年後失敗了，死因可能是什麼？" value={data.matrix.preMortem} onChange={(e)=>setData({...data, matrix:{...data.matrix, preMortem: e.target.value}})} />
                                                </div>
                                                <div className="p-6 bg-slate-50 rounded-[2.5rem] border-2 border-slate-100 focus-within:border-blue-500 transition-all">
                                                    <label className="text-[10px] font-black uppercase text-blue-500 tracking-widest mb-3 block italic">基礎比率 (Base Rate)</label>
                                                    <textarea className="w-full bg-transparent border-none outline-none text-sm h-24 font-bold" placeholder="類似決策在市場上的統計成功率是多少？" value={data.matrix.baseRate} onChange={(e)=>setData({...data, matrix:{...data.matrix, baseRate: e.target.value}})} />
                                                </div>
                                                <div className="p-6 bg-slate-50 rounded-[2.5rem] border-2 border-slate-100 focus-within:border-orange-500 transition-all">
                                                    <label className="text-[10px] font-black uppercase text-orange-500 tracking-widest mb-3 block italic">外部視角 (External View)</label>
                                                    <textarea className="w-full bg-transparent border-none outline-none text-sm h-24 font-bold" placeholder="如果不考慮我個人的情感，客觀專家會怎麼建議？" value={data.matrix.externalView} onChange={(e)=>setData({...data, matrix:{...data.matrix, externalView: e.target.value}})} />
                                                </div>
                                                <div className="p-6 bg-slate-50 rounded-[2.5rem] border-2 border-slate-100 focus-within:border-emerald-500 transition-all">
                                                    <label className="text-[10px] font-black uppercase text-emerald-500 tracking-widest mb-3 block italic">二階效應 (Second-order)</label>
                                                    <textarea className="w-full bg-transparent border-none outline-none text-sm h-24 font-bold" placeholder="這在一年後產生的連鎖反應？" value={data.matrix.secondOrder} onChange={(e)=>setData({...data, matrix:{...data.matrix, secondOrder: e.target.value}})} />
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {step === 3 && (
                                        <div className="fade-in text-center">
                                            <div className="flex justify-center items-center gap-3 text-indigo-500 mb-8 font-black uppercase tracking-widest text-xs"><Icon name="compass" className="w-4 h-4" /> System 3 Simulation</div>
                                            <h2 className="text-4xl font-extrabold mb-10 tracking-tighter text-slate-900">未來模擬艙</h2>
                                            {!data.futureScript ? (
                                                <button onClick={generateFutureScript} disabled={isAiLoading} className="w-full py-24 bg-indigo-50 border-2 border-dashed border-indigo-200 rounded-[3.5rem] flex flex-col items-center gap-6 group hover:bg-indigo-100 transition-all shadow-inner">
                                                    {isAiLoading ? <div className="loader"></div> : <Fragment><Icon name="zap" className="w-16 h-16 text-indigo-600 mb-2 group-hover:scale-110 transition-transform" /><span className="text-indigo-600 font-black uppercase tracking-widest text-sm">消耗 1 Credit 啟動深度渲染</span></Fragment>}
                                                </button>
                                            ) : (
                                                <div className="bg-slate-900 p-12 rounded-[3.5rem] shadow-2xl relative border border-slate-800 text-left">
                                                    <div className="flex justify-between items-center mb-8 border-b border-white/10 pb-4">
                                                        <span className="text-[10px] font-black text-indigo-400 uppercase tracking-widest">Vision Simulation v4.6</span>
                                                        <button onClick={()=>setData({...data, futureScript: ''})} className="text-[10px] text-white/40 hover:text-white uppercase font-bold tracking-widest transition-colors">再次模擬 (-1 Credit)</button>
                                                    </div>
                                                    <p className="text-indigo-50 italic text-xl leading-relaxed whitespace-pre-wrap font-medium">{data.futureScript}</p>
                                                </div>
                                            )}
                                        </div>
                                    )}

                                    {step === 4 && (
                                        <div className="fade-in">
                                            <div className="flex items-center gap-3 text-emerald-500 mb-8 font-black uppercase tracking-widest text-xs"><Icon name="zap" className="w-4 h-4" /> Implementation Nudges</div>
                                            <h2 className="text-4xl font-extrabold mb-10 tracking-tighter text-slate-900">智慧行動助推建議</h2>
                                            {isAiLoading ? (
                                                <div className="p-20 flex flex-col items-center gap-6 text-center">
                                                    <div className="loader border-t-emerald-500 border-r-transparent border-b-transparent border-l-transparent"></div>
                                                    <p className="text-slate-400 font-bold animate-pulse tracking-widest text-xs uppercase">正在根據矩陣優化環境方案...</p>
                                                </div>
                                            ) : (
                                                <div className="bg-emerald-50 p-12 rounded-[3.5rem] border border-emerald-100 text-emerald-950 font-bold leading-relaxed whitespace-pre-wrap text-xl text-left">
                                                    {data.nudges || "內容生成中，請稍候。"}
                                                </div>
                                            )}
                                        </div>
                                    )}

                                    {step === 5 && (
                                        <div className="text-center py-10 fade-in">
                                            <div className="w-24 h-24 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-10 shadow-2xl"><Icon name="crown" className="w-12 h-12" /></div>
                                            <h2 className="text-5xl font-extrabold mb-6 tracking-tighter text-slate-900 leading-tight">審計已完成</h2>
                                            <p className="text-slate-500 text-xl font-medium mb-12 max-w-lg mx-auto leading-relaxed italic text-center">我們已經為您的決策建立了完整的認知保護網。請下載報告以進行後續執行追蹤。</p>
                                            <button onClick={()=>window.print()} className="bg-indigo-600 text-white px-12 py-5 rounded-full font-black text-lg shadow-2xl hover:bg-black active:scale-95 transition-all flex items-center gap-4 mx-auto uppercase tracking-widest">
                                                <Icon name="file" className="w-6 h-6" /> 下載 PDF 專業報告
                                            </button>
                                        </div>
                                    )}
                                </div>

                                {step < 5 && (
                                    <div className="mt-16 flex justify-between items-center pt-10 border-t border-slate-50 font-black text-xs">
                                        <button onClick={()=>setStep(s=>Math.max(1, s-1))} disabled={step===1} className={`flex items-center gap-2 px-8 py-3 rounded-2xl transition-all ${step===1 ? 'text-slate-200' : 'text-slate-400 hover:bg-slate-100'}`}><Icon name="chevronLeft" className="w-5 h-5" /> BACK</button>
                                        <button onClick={()=>setStep(s=>Math.min(5, s+1))} className="bg-slate-900 text-white px-12 py-4 rounded-full flex items-center gap-3 hover:bg-indigo-600 shadow-2xl transition-all active:scale-95 uppercase tracking-widest">
                                            {step === 4 ? 'Finish Audit' : 'Next System'} <Icon name="chevronRight" className="w-5 h-5" />
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'pricing' && (
                            <div className="fade-in space-y-16">
                                <h2 className="text-5xl font-extrabold tracking-tighter text-slate-900 text-center uppercase">點數儲值與方案</h2>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-10">
                                    <div className="p-10 bg-white rounded-[4rem] border-2 border-slate-100 text-left hover:border-indigo-500 transition-all shadow-sm">
                                        <h4 className="text-xl font-black mb-1 text-slate-800 tracking-tight uppercase tracking-tighter">單次決策包</h4>
                                        <div className="text-5xl font-black mb-10 tracking-tighter text-indigo-600">NT$10<span className="text-sm text-slate-300 ml-1 font-bold">/次</span></div>
                                        <button onClick={()=>setCredits(c=>c+1)} className="w-full py-5 bg-slate-100 text-indigo-600 rounded-3xl font-black uppercase tracking-widest text-[10px] hover:bg-indigo-600 hover:text-white transition-all shadow-lg">立即儲值</button>
                                    </div>
                                    <div className="p-10 bg-slate-950 rounded-[4rem] text-left text-white transform md:scale-110 border-4 border-indigo-600 relative overflow-hidden shadow-2xl">
                                        <h4 className="text-xl font-black mb-1 tracking-tight uppercase tracking-tighter">專家儲值卡</h4>
                                        <div className="text-5xl font-black mb-10 tracking-tighter">NT$199<span className="text-sm text-slate-600 ml-1 font-bold">/25點</span></div>
                                        <button onClick={()=>setCredits(c=>c+25)} className="w-full py-5 bg-indigo-600 text-white rounded-3xl font-black uppercase tracking-widest text-[10px] hover:bg-white hover:text-black transition-all shadow-xl shadow-indigo-900">立即購買</button>
                                    </div>
                                    <div className="p-10 bg-white rounded-[4rem] border-2 border-slate-100 text-left opacity-70">
                                        <h4 className="text-xl font-black mb-1 text-slate-800 tracking-tight uppercase tracking-tighter">企業無限方案</h4>
                                        <div className="text-5xl font-black mb-10 tracking-tighter">NT$9,900<span className="text-sm text-slate-300 ml-1 font-inter">/年</span></div>
                                        <button className="w-full py-4 bg-slate-100 text-slate-400 rounded-3xl font-black uppercase tracking-widest text-[10px] cursor-not-allowed">聯繫業務開通</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {aiError && (
                            <div className="mt-12 p-8 bg-red-600 text-white rounded-[2.5rem] shadow-xl fade-in flex items-center gap-6 font-bold text-left">
                                <Icon name="alert" className="w-8 h-8 shrink-0" />
                                <div><p className="text-[10px] uppercase tracking-widest opacity-60 mb-1 font-inter">System Error</p><p>{aiError}</p></div>
                            </div>
                        )}
                    </main>

                    <footer className="no-print mt-20 text-center pb-20 opacity-20"><p className="text-slate-400 text-[10px] font-black uppercase tracking-[0.5em] font-inter">COGNAV LABS • SECURE SaaS INFRASTRUCTURE v4.6</p></footer>
                    <div className="print-only"><PrintableReport data={data} /></div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
