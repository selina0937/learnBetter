<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COGNAV - 三系統 AI 決策導航器</title>
    <!-- 引入開發所需的 CDN 資源 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 列印專用樣式：優化 PDF 生成版面 */
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background: white; padding: 0; }
            .report-card { border: none !important; box-shadow: none !important; width: 100%; max-width: 100%; }
        }
        .print-only { display: none; }
        
        /* 加載動畫樣式 */
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #4f46e5; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, Fragment } = React;

        // --- Gemini API 串接邏輯 (整合系統三理論) ---
        const apiKey = ""; // 執行環境將自動注入金鑰
        
        async function generateFutureScript(userDecision, checks) {
            const systemPrompt = `你是一位認知科學專家，擅長『系統三』模擬推理。
            使用者的決策是：『${userDecision}』。
            使用者的邏輯檢核點：${checks.filter(c => c.checked).map(c => c.text).join(', ')}。
            請生成一段『感官豐富』的未來模擬劇本（約 300 字）。
            要求：
            1. 包含具體的感官細節（光線、聲音、氣味）。
            2. 描述成功後的深層情感與滿足感。
            3. 強調這如何與使用者的理想身分認同對齊。
            4. 語氣要溫暖且具啟發性，像是引導冥想一般。
            請直接輸出劇本內容，不要包含任何開場白或結尾。`;

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            let delay = 1000;
            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `請為我生成決策對應的系統三模擬劇本。` }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });
                    
                    if (!response.ok) throw new Error('API Error');
                    const result = await response.json();
                    return result.candidates?.[0]?.content?.parts?.[0]?.text;
                } catch (error) {
                    if (i === 4) throw error;
                    await new Promise(resolve => setTimeout(resolve, delay));
                    delay *= 2;
                }
            }
        }

        // --- 核心組件：圖標渲染 ---
        const Icon = ({ name, className = "w-6 h-6" }) => {
            const getIconContent = (n) => {
                switch(n) {
                    case 'brain': return <path d="M12 2a5 5 0 0 1 5 5c0 1.25-.46 2.39-1.21 3.26A5 5 0 0 1 12 19a5 5 0 0 1-3.79-8.74A5 5 0 0 1 7 7a5 5 0 0 1 5-5zM9 7.5a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3zM15 7.5a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3z" />;
                    case 'compass': return <Fragment><circle cx="12" cy="12" r="10"/><path d="m16.24 7.76-1.42 4.24-4.24 1.42 1.42-4.24 4.24-1.42Z"/><line x1="12" x2="12" y1="2" y2="4"/><line x1="12" x2="12" y1="20" y2="22"/><line x1="2" x2="4" y1="12" y2="12"/><line x1="20" x2="22" y1="12" y2="12"/></Fragment>;
                    case 'check': return <polyline points="20 6 9 17 4 12" />;
                    case 'alert': return <Fragment><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></Fragment>;
                    case 'map': return <path d="M14.12 3.88 16 2l4 4-1.88 1.88M19 11l-8 8M15 11l-8 8M11 11l-8 8" />;
                    case 'sparkles': return <Fragment><path d="m12 3 1.912 5.813a2 2 0 0 0 1.275 1.275L21 12l-5.813 1.912a2 2 0 0 0-1.275 1.275L12 21l-1.912-5.813a2 2 0 0 0-1.275-1.275L3 12l5.813-1.912a2 2 0 0 0 1.275-1.275L12 3Z"/><path d="M5 3L4 4.5 5 6"/><path d="M19 3l1 1.5-1 1.5"/></Fragment>;
                    case 'chevronRight': return <polyline points="9 18 15 12 9 6" />;
                    case 'chevronLeft': return <polyline points="15 18 9 12 15 6" />;
                    case 'file': return <Fragment><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></Fragment>;
                    default: return <circle cx="12" cy="12" r="10" />;
                }
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {getIconContent(name)}
                </svg>
            );
        };

        // --- 頁面內容：實施路徑圖 ---
        const RoadmapView = () => (
            <div className="fade-in space-y-8 max-w-2xl mx-auto">
                <h2 className="text-3xl font-extrabold text-indigo-900 text-center mb-10">產品開發路徑圖</h2>
                <div className="relative border-l-2 border-slate-200 ml-4 space-y-12">
                    {[
                        { stage: "階段一：MVP 基礎", focus: "直覺陷阱監測", desc: "建立決策捕捉介面，串接啟發法與偏誤提醒。", icon: "brain", status: "Done" },
                        { stage: "階段二：AI 模擬核心", focus: "系統三模擬艙 (Gemini)", desc: "整合 Gemini 2.5 模型，自動生成高品質未來劇本，強化使用者動機。", icon: "sparkles", status: "Running" },
                        { stage: "階段三：環境助推", focus: "執行力 Nudge 引擎", desc: "開發環境設置建議，整合手機提醒，確保持續執行決策。", icon: "check", status: "Next" }
                    ].map((item, i) => (
                        <div key={i} className="relative pl-10">
                            <div className="absolute -left-[13px] top-0 bg-white border-2 border-indigo-600 rounded-full p-1 shadow-sm">
                                <div className="w-4 h-4 bg-indigo-600 rounded-full"></div>
                            </div>
                            <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm hover:shadow-md transition-shadow">
                                <div className="flex justify-between items-center mb-2">
                                    <h3 className="font-bold text-xl text-slate-800">{item.stage}</h3>
                                    <span className={`text-[10px] font-bold px-2 py-1 rounded-md uppercase tracking-widest ${item.status === 'Done' ? 'bg-emerald-100 text-emerald-600' : 'bg-indigo-100 text-indigo-600'}`}>
                                        {item.status}
                                    </span>
                                </div>
                                <p className="text-indigo-600 font-bold mb-2 text-sm">關鍵任務：{item.focus}</p>
                                <p className="text-slate-500 text-sm leading-relaxed">{item.desc}</p>
                            </div>
                        </div>
                    ))}
                </div>
            </div>
        );

        // --- 頁面內容：列印報告樣板 ---
        const PrintableReport = ({ data }) => (
            <div className="print-only p-12 bg-white text-slate-900 border border-slate-200 rounded-lg max-w-4xl mx-auto report-card">
                <div className="flex justify-between items-start border-b-4 border-indigo-600 pb-6 mb-8">
                    <div>
                        <h1 className="text-3xl font-bold text-indigo-900 mb-1">大腦決策審計報告</h1>
                        <p className="text-slate-500 text-sm italic">Cognitive Decision Audit Report • 三系統決策導航器</p>
                    </div>
                    <div className="text-right text-xs font-bold text-slate-400">
                        <p>報告生成日期：{new Date().toLocaleDateString()}</p>
                    </div>
                </div>

                <section className="mb-10">
                    <h2 className="bg-slate-100 p-2 text-lg font-bold border-l-4 border-orange-500 mb-4">第一階段：系統一 (直覺捕捉)</h2>
                    <div className="pl-4">
                        <p className="font-bold text-slate-500 mb-1 text-xs uppercase tracking-widest">原始決策意圖</p>
                        <p className="text-xl font-medium leading-relaxed">{data.decision || "未提供詳細資訊"}</p>
                    </div>
                </section>

                <section className="mb-10">
                    <h2 className="bg-slate-100 p-2 text-lg font-bold border-l-4 border-blue-500 mb-4">第二階段：系統二 (邏輯審計)</h2>
                    <div className="pl-4 space-y-2">
                        {data.system2Checks.map((item, i) => (
                            <div key={i} className="flex items-center gap-3">
                                <span className={item.checked ? "text-emerald-600 font-bold" : "text-slate-300"}>
                                    {item.checked ? "✓ [已通過]" : "✗ [未完成]"}
                                </span>
                                <span className={item.checked ? "text-slate-900" : "text-slate-400"}>{item.text}</span>
                            </div>
                        ))}
                    </div>
                </section>

                <section className="mb-10">
                    <h2 className="bg-slate-100 p-2 text-lg font-bold border-l-4 border-indigo-600 mb-4">第三階段：系統三 (AI 未來模擬)</h2>
                    <div className="pl-4">
                        <p className="font-bold text-slate-500 mb-2 text-xs uppercase tracking-widest">系統三感官模擬劇本</p>
                        <div className="italic bg-indigo-50 p-6 rounded-2xl text-indigo-900 leading-relaxed whitespace-pre-wrap text-sm shadow-inner">
                            {data.futureScript || "尚未生成 AI 模擬劇本。"}
                        </div>
                    </div>
                </section>

                <div className="mt-20 pt-8 border-t border-slate-100 text-center text-slate-400 text-[10px] tracking-widest uppercase">
                    <p>依據丹尼爾·卡尼曼 (Daniel Kahneman) 之雙系統理論擴展開發 • 驅動力由系統三奠定</p>
                </div>
            </div>
        );

        // --- 主應用組件 ---
        function App() {
            const [view, setView] = useState('flow'); 
            const [step, setStep] = useState(1);
            const [isAiLoading, setIsAiLoading] = useState(false);
            const [data, setData] = useState({
                decision: '',
                system2Checks: [
                    { text: "我已經檢查過過去五年的數據基準。", checked: false },
                    { text: "我徵詢過三位反對者的真實意見。", checked: false },
                    { text: "我能承受失敗後產生的具體後果。", checked: false }
                ],
                futureScript: ''
            });

            const toggleCheck = (index) => {
                const newChecks = [...data.system2Checks];
                newChecks[index].checked = !newChecks[index].checked;
                setData({...data, system2Checks: newChecks});
            };

            const handleAiGeneration = async () => {
                if (!data.decision) return;
                setIsAiLoading(true);
                try {
                    const script = await generateFutureScript(data.decision, data.system2Checks);
                    setData({...data, futureScript: script});
                } catch (e) {
                    console.error("AI Generation Error:", e);
                } finally {
                    setIsAiLoading(false);
                }
            };

            const renderFlow = () => {
                switch(step) {
                    case 1: return (
                        <div className="fade-in">
                            <div className="flex items-center gap-2 text-orange-500 mb-2 font-bold uppercase tracking-widest text-xs">
                                <Icon name="brain" className="w-4 h-4" /> Step 1: System 1 Audit
                            </div>
                            <h2 className="text-3xl font-extrabold mb-6 leading-tight">先別分析，<br/>你的<span className="text-indigo-600">第一直覺</span>是？</h2>
                            <textarea 
                                className="w-full p-6 bg-slate-50 border-2 border-slate-100 rounded-[2.5rem] h-44 outline-none focus:border-indigo-500 transition-all text-lg shadow-inner"
                                placeholder="例如：我想把所有存款投入這項新技術..."
                                value={data.decision}
                                onChange={(e) => setData({...data, decision: e.target.value})}
                            />
                        </div>
                    );
                    case 2: return (
                        <div className="fade-in">
                            <div className="flex items-center gap-2 text-blue-500 mb-2 font-bold uppercase tracking-widest text-xs">
                                <Icon name="check" className="w-4 h-4" /> Step 2: System 2 Logical Audit
                            </div>
                            <h2 className="text-3xl font-extrabold mb-6">啟動你的<span className="text-indigo-600">理智清單</span></h2>
                            <div className="space-y-4">
                                {data.system2Checks.map((item, i) => (
                                    <div 
                                        key={i} 
                                        onClick={() => toggleCheck(i)}
                                        className={`p-5 rounded-[1.5rem] border-2 flex items-center gap-4 cursor-pointer transition-all ${item.checked ? 'bg-indigo-50 border-indigo-200' : 'bg-white border-slate-100 hover:border-slate-300'}`}
                                    >
                                        <div className={`w-7 h-7 rounded-lg border-2 flex items-center justify-center ${item.checked ? 'bg-indigo-600 border-indigo-600 text-white' : 'border-slate-300'}`}>
                                            {item.checked && <Icon name="check" className="w-4 h-4" />}
                                        </div>
                                        <span className={`font-semibold ${item.checked ? 'text-indigo-900 line-through opacity-60' : 'text-slate-700'}`}>{item.text}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    );
                    case 3: return (
                        <div className="fade-in">
                            <div className="flex items-center gap-2 text-indigo-500 mb-2 font-bold uppercase tracking-widest text-xs">
                                <Icon name="sparkles" className="w-4 h-4" /> Step 3: System 3 Simulation
                            </div>
                            <h2 className="text-3xl font-extrabold mb-6">進入<span className="text-indigo-600">未來模擬艙</span></h2>
                            
                            <div className="space-y-6">
                                {!data.futureScript && (
                                    <button 
                                        onClick={handleAiGeneration}
                                        disabled={isAiLoading}
                                        className="w-full py-10 bg-indigo-50 border-2 border-dashed border-indigo-200 rounded-[2.5rem] flex flex-col items-center justify-center gap-4 hover:bg-indigo-100 transition-all text-indigo-600 font-bold group"
                                    >
                                        {isAiLoading ? (
                                            <div className="loading-spinner"></div>
                                        ) : (
                                            <Fragment>
                                                <Icon name="sparkles" className="w-10 h-10 group-hover:scale-110 transition-transform" />
                                                <span>AI 自動生成未來感官劇本</span>
                                            </Fragment>
                                        )}
                                    </button>
                                )}

                                {data.futureScript && (
                                    <div className="p-8 bg-slate-900 text-white rounded-[2.5rem] relative overflow-hidden shadow-2xl">
                                        <div className="relative z-10">
                                            <div className="flex justify-between items-center mb-4">
                                                <span className="text-[10px] font-bold uppercase tracking-[0.3em] text-indigo-400">System 3 Future Simulation</span>
                                                <button onClick={() => setData({...data, futureScript: ''})} className="text-xs text-slate-500 hover:text-white underline">重新生成</button>
                                            </div>
                                            <p className="text-slate-200 italic leading-relaxed text-sm whitespace-pre-wrap">{data.futureScript}</p>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    );
                    case 4: return (
                        <div className="fade-in text-center py-10">
                            <div className="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg shadow-emerald-50"><Icon name="check" className="w-10 h-10" /></div>
                            <h2 className="text-4xl font-extrabold mb-4">決策審計完成！</h2>
                            <p className="text-slate-500 mb-10 max-w-sm mx-auto font-medium">您的分析報告已包含 AI 模擬劇本。點擊下方按鈕可下載完整的 PDF 報告。</p>
                            <button onClick={() => window.print()} className="bg-indigo-600 text-white px-10 py-4 rounded-full font-bold shadow-xl hover:bg-indigo-700 transition-all flex items-center gap-3 mx-auto active:scale-95">
                                <Icon name="file" className="w-5 h-5" /> 下載 PDF 報告書
                            </button>
                        </div>
                    );
                }
            };

            return (
                <div className="min-h-screen">
                    {/* 一般瀏覽模式 (列印時隱藏) */}
                    <div className="min-h-screen flex flex-col items-center py-12 px-4 no-print">
                        <div className="w-full max-w-2xl">
                            {/* 導覽切換 */}
                            <div className="flex bg-slate-200 p-1.5 rounded-2xl mb-12 w-fit mx-auto shadow-inner">
                                <button onClick={() => setView('flow')} className={`px-6 py-2 rounded-xl font-bold transition-all flex items-center gap-2 ${view === 'flow' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500 hover:text-slate-800'}`}>
                                    <Icon name="brain" className="w-5 h-5" /> 互動原型
                                </button>
                                <button onClick={() => setView('roadmap')} className={`px-6 py-2 rounded-xl font-bold transition-all flex items-center gap-2 ${view === 'roadmap' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500 hover:text-slate-800'}`}>
                                    <Icon name="map" className="w-5 h-5" /> 實施路徑
                                </button>
                            </div>

                            {/* 主要卡片內容 */}
                            <div className="bg-white rounded-[3rem] shadow-2xl shadow-slate-200 border border-slate-100 p-10 md:p-14 min-h-[550px] flex flex-col justify-between">
                                {view === 'flow' ? (
                                    <Fragment>
                                        {renderFlow()}
                                        {step < 4 && (
                                            <div className="mt-12 flex justify-between items-center pt-8 border-t border-slate-50">
                                                <button onClick={() => setStep(s => s - 1)} disabled={step === 1} className={`font-bold flex items-center gap-1 ${step === 1 ? 'text-slate-200' : 'text-slate-400'}`}>
                                                    <Icon name="chevronLeft" className="w-5 h-5" /> 上一步
                                                </button>
                                                <button onClick={() => setStep(s => s + 1)} className="bg-slate-900 text-white px-10 py-3.5 rounded-full font-bold flex items-center gap-2 hover:bg-black transition-all">
                                                    下一步 <Icon name="chevronRight" className="w-5 h-5" />
                                                </button>
                                            </div>
                                        )}
                                    </Fragment>
                                ) : (
                                    <RoadmapView />
                                )}
                            </div>
                        </div>
                    </div>

                    {/* 列印專用隱藏介面 (點擊生成 PDF 時會顯示) */}
                    <PrintableReport data={data} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
