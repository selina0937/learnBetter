<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COGNAV Pro - 專業三系統決策審計系統</title>
    <!-- 引入外部 CDN 資源 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Noto+Sans+TC:wght@400;700&display=swap');
        
        :root {
            --brand-primary: #4f46e5;
            --brand-secondary: #10b981;
        }

        body { 
            font-family: 'Plus Jakarta Sans', 'Noto Sans TC', sans-serif; 
            background: #f8fafc;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 列印專用樣式 */
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background: white !important; padding: 0 !important; }
            .report-card { border: 1px solid #eee !important; width: 100% !important; margin: 0 !important; box-shadow: none !important; }
        }
        .print-only { display: none; }

        .loader {
            width: 24px;
            height: 24px;
            border: 3px solid #e2e8f0;
            border-bottom-color: var(--brand-primary);
            border-radius: 50%;
            display: inline-block;
            animation: rotation 1s linear infinite;
        }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, Fragment } = React;

        // --- 核心組件：圖標渲染 ---
        function Icon({ name, className = "w-6 h-6" }) {
            const paths = {
                brain: <path d="M12 2a5 5 0 0 1 5 5c0 1.25-.46 2.39-1.21 3.26A5 5 0 0 1 12 19a5 5 0 0 1-3.79-8.74A5 5 0 0 1 7 7a5 5 0 0 1 5-5zM9 7.5a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3zM15 7.5a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3z" />,
                compass: <g><circle cx="12" cy="12" r="10"/><path d="m16.24 7.76-1.42 4.24-4.24 1.42 1.42-4.24 4.24-1.42Z"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2"/></g>,
                zap: <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />,
                check: <polyline points="20 6 9 17 4 12" />,
                alert: <g><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></g>,
                file: <g><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></g>,
                crown: <path d="m2 4 3 12h14l3-12-6 7-4-7-4 7-6-7zm3 16h14" />,
                chevronRight: <polyline points="9 18 15 12 9 6" />,
                chevronLeft: <polyline points="15 18 9 12 15 6" />,
                shield: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />,
                tag: <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z" />
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {paths[name] || <circle cx="12" cy="12" r="10" />}
                </svg>
            );
        }

        // --- 核心後端呼叫邏輯 ---
        async function fetchAI(prompt, type) {
            try {
                const response = await fetch('/api/cognav', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt, type })
                });

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({ error: "伺服器通訊異常" }));
                    throw new Error(errData.error || "伺服器通訊異常");
                }

                const data = await response.json();
                return data.text;
            } catch (e) {
                throw { status: "Error", msg: e.message };
            }
        }

        // --- 組件：列印報告 ---
        function PrintableReport({ data }) {
            return (
                <div className="p-16 bg-white text-slate-900 report-card min-h-screen border-t-8 border-indigo-600 text-left">
                    <div className="flex justify-between items-start mb-12 border-b pb-8">
                        <div>
                            <h1 className="text-4xl font-extrabold text-indigo-950 mb-2 tracking-tight">Decision Audit Executive Summary</h1>
                            <p className="text-slate-500 font-bold uppercase tracking-widest text-sm">COGNAV Pro - 三系統決策審計報告</p>
                        </div>
                        <div className="text-right text-xs text-slate-400 font-bold uppercase">
                            <p>Serial: {Math.random().toString(36).substr(2, 9).toUpperCase()}</p>
                            <p>Generated: {new Date().toLocaleDateString()}</p>
                        </div>
                    </div>
                    <div className="space-y-12">
                        <section>
                            <h3 className="text-xs font-black text-orange-500 uppercase tracking-[0.2em] mb-4">Phase 1: Intuition Baseline</h3>
                            <div className="bg-slate-50 p-6 rounded-2xl text-xl font-medium border-l-4 border-orange-500 italic">"{data.decision || "N/A"}"</div>
                        </section>
                        <section>
                            <h3 className="text-xs font-black text-blue-500 uppercase tracking-[0.2em] mb-4">Phase 2: Logical Verification</h3>
                            <div className="grid grid-cols-1 gap-3 pl-2">
                                {data.system2Checks.map((item, i) => (
                                    <div key={i} className="flex items-center gap-3 text-sm font-bold text-slate-700">
                                        <span className={item.checked ? "text-emerald-500" : "text-slate-300"}>{item.checked ? "✓ [Verified]" : "✗ [Pending]"}</span>
                                        <span>{item.text}</span>
                                    </div>
                                ))}
                            </div>
                        </section>
                        <section>
                            <h3 className="text-xs font-black text-indigo-500 uppercase tracking-[0.2em] mb-4">Phase 3: Visual Simulation</h3>
                            <div className="bg-indigo-50 p-8 rounded-3xl text-indigo-950 leading-relaxed whitespace-pre-wrap font-medium border border-indigo-100 italic">
                                {data.futureScript || "Simulation not executed."}
                            </div>
                        </section>
                        <section>
                            <h3 className="text-xs font-black text-emerald-500 uppercase tracking-[0.2em] mb-4">Phase 4: Behavioral Nudges</h3>
                            <div className="bg-emerald-50/50 p-8 rounded-3xl text-emerald-950 leading-relaxed whitespace-pre-wrap font-bold border border-emerald-100">
                                {data.nudges || "Action plan not generated."}
                            </div>
                        </section>
                    </div>
                    <div className="mt-20 pt-10 border-t flex justify-between items-end">
                        <div className="text-[10px] text-slate-300 font-bold uppercase">© 2024 COGNAV Labs. Secure Commercial Edition.</div>
                        <div className="flex gap-2 opacity-30">
                            <Icon name="shield" className="w-5 h-5" />
                            <Icon name="compass" className="w-5 h-5" />
                        </div>
                    </div>
                </div>
            );
        }

        // --- 主應用組件 ---
        function App() {
            const [view, setView] = useState('audit'); 
            const [step, setStep] = useState(1);
            const [isAiLoading, setIsAiLoading] = useState(false);
            const [aiError, setAiError] = useState(null);
            const [data, setData] = useState({
                decision: '',
                system2Checks: [
                    { text: "我已經檢查過過去五年的數據基準。", checked: false },
                    { text: "我徵詢過三位反對者的真實意見。", checked: false },
                    { text: "我能承受失敗後產生的具體後果。", checked: false }
                ],
                futureScript: '',
                nudges: ''
            });

            useEffect(() => {
                if (step === 4 && !data.nudges && data.futureScript) {
                    generateNudges();
                }
            }, [step]);

            const generateFutureScript = async () => {
                if (!data.decision) return;
                setIsAiLoading(true); setAiError(null);
                try {
                    const prompt = `你是認知科學專家。針對決策：『${data.decision}』，生成一段 300 字、感官豐富的未來成功模擬劇本。不要引言，直接輸出內容。`;
                    const text = await fetchAI(prompt, "script");
                    setData(prev => ({...prev, futureScript: text}));
                } catch (e) { setAiError(e); } 
                finally { setIsAiLoading(false); }
            };

            const generateNudges = async () => {
                setIsAiLoading(true);
                try {
                    const prompt = `你是行為經濟學家。根據決策：『${data.decision}』與願景：『${data.futureScript}』，提供 3 個具體的環境助推方案：1. 負向摩擦 2. 正向助推 3. 視覺錨點。直接條列輸出。`;
                    const text = await fetchAI(prompt, "nudge");
                    setData(prev => ({...prev, nudges: text}));
                } catch (e) { console.error(e); }
                finally { setIsAiLoading(false); }
            };

            return (
                <div className="min-h-screen pb-12 selection:bg-indigo-100">
                    <nav className="no-print w-full px-6 py-4 flex justify-between items-center glass-card sticky top-0 z-40">
                        <div className="flex items-center gap-2 cursor-pointer" onClick={()=>setView('audit')}>
                            <div className="bg-indigo-600 p-2 rounded-xl text-white shadow-lg shadow-indigo-200">
                                <Icon name="compass" className="w-5 h-5" />
                            </div>
                            <span className="font-extrabold text-xl tracking-tighter">COGNAV <span className="text-indigo-600 text-sm uppercase">Pro</span></span>
                        </div>
                        <div className="flex items-center gap-4 md:gap-8">
                            <button onClick={()=>setView('audit')} className={`text-xs font-black uppercase tracking-widest transition-colors ${view === 'audit' ? 'text-indigo-600' : 'text-slate-400 hover:text-slate-600'}`}>審計核心</button>
                            <button onClick={()=>setView('roadmap')} className={`text-xs font-black uppercase tracking-widest transition-colors ${view === 'roadmap' ? 'text-indigo-600' : 'text-slate-400 hover:text-slate-600'}`}>產品路徑</button>
                            <button onClick={()=>setView('pricing')} className="px-4 py-2 bg-indigo-600 text-white rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-black transition-all shadow-lg shadow-indigo-100 flex items-center gap-2">
                                <Icon name="crown" className="w-3.5 h-3.5" /> Upgrade
                            </button>
                        </div>
                    </nav>

                    <main className="no-print max-w-4xl mx-auto py-12 px-6">
                        {view === 'audit' && (
                            <div className="bg-white rounded-[3.5rem] shadow-2xl shadow-slate-200/60 border border-white p-8 md:p-16 min-h-[600px] flex flex-col justify-between fade-in relative overflow-hidden text-left">
                                <div className="relative z-10">
                                    {step === 1 && (
                                        <div className="fade-in">
                                            <div className="flex items-center gap-3 text-orange-500 mb-6 font-black uppercase tracking-widest text-xs"><Icon name="brain" className="w-4 h-4" /> System 1 Baseline</div>
                                            <h2 className="text-4xl font-extrabold mb-4 tracking-tighter">捕捉直覺</h2>
                                            <p className="text-slate-500 mb-8 font-medium">寫下大腦最初始的想法。不要害怕偏誤，我們先把它抓出來。</p>
                                            <textarea className="w-full p-8 bg-slate-50 border-2 border-slate-100 rounded-[2.5rem] h-56 outline-none focus:border-indigo-500 font-medium text-xl shadow-inner transition-all" placeholder="例如：我想辭職創業，因為目前的環境太受限了..." value={data.decision} onChange={(e)=>setData({...data, decision: e.target.value})} />
                                        </div>
                                    )}
                                    {step === 2 && (
                                        <div className="fade-in">
                                            <div className="flex items-center gap-3 text-blue-500 mb-6 font-black uppercase tracking-widest text-xs"><Icon name="check" className="w-4 h-4" /> System 2 Verification</div>
                                            <h2 className="text-4xl font-extrabold mb-8 tracking-tighter text-indigo-950">邏輯風險審計</h2>
                                            <div className="space-y-4">
                                                {data.system2Checks.map((item, i) => (
                                                    <div key={i} onClick={() => {
                                                        const n = [...data.system2Checks];
                                                        n[i].checked = !n[i].checked;
                                                        setData({...data, system2Checks: n});
                                                    }} className={`p-6 rounded-3xl border-2 flex items-center gap-5 cursor-pointer transition-all ${item.checked ? 'bg-indigo-50 border-indigo-200' : 'bg-white border-slate-100 hover:border-slate-300'}`}>
                                                        <div className={`w-8 h-8 rounded-xl flex items-center justify-center transition-all ${item.checked ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-100' : 'bg-slate-50 text-slate-300'}`}><Icon name="check" className="w-5 h-5" /></div>
                                                        <span className={`text-lg font-bold ${item.checked ? 'text-indigo-950 opacity-40 line-through' : 'text-slate-700'}`}>{item.text}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                    {step === 3 && (
                                        <div className="fade-in">
                                            <div className="flex items-center gap-3 text-indigo-500 mb-6 font-black uppercase tracking-widest text-xs"><Icon name="compass" className="w-4 h-4" /> System 3 Simulation</div>
                                            <h2 className="text-4xl font-extrabold mb-8 tracking-tighter">未來模擬艙</h2>
                                            {!data.futureScript ? (
                                                <button onClick={generateFutureScript} disabled={isAiLoading} className="w-full py-16 bg-indigo-50 border-2 border-dashed border-indigo-200 rounded-[3rem] flex flex-col items-center gap-4 group hover:bg-indigo-100 transition-all">
                                                    {isAiLoading ? <div className="loader"></div> : <Fragment><Icon name="sparkles" className="w-12 h-12 text-indigo-600" /><span className="text-indigo-600 font-black uppercase tracking-widest text-sm">啟動 AI 情感渲染</span></Fragment>}
                                                </button>
                                            ) : (
                                                <div className="bg-slate-900 p-10 rounded-[3rem] shadow-2xl relative">
                                                    <div className="flex justify-between items-center mb-6 border-b border-white/10 pb-4 text-left">
                                                        <span className="text-[10px] font-black text-indigo-400 uppercase tracking-[0.2em]">Simulation Success</span>
                                                        <button onClick={()=>setData({...data, futureScript: ''})} className="text-[10px] text-white/40 hover:text-white uppercase font-bold tracking-widest">Retry</button>
                                                    </div>
                                                    <p className="text-indigo-50 italic text-xl leading-relaxed whitespace-pre-wrap font-medium">{data.futureScript}</p>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                    {step === 4 && (
                                        <div className="fade-in">
                                            <div className="flex items-center gap-3 text-emerald-500 mb-6 font-black uppercase tracking-widest text-xs"><Icon name="zap" className="w-4 h-4" /> Action Nudges</div>
                                            <h2 className="text-4xl font-extrabold mb-8 tracking-tighter">智慧行動助推</h2>
                                            {isAiLoading ? (
                                                <div className="p-16 flex flex-col items-center gap-4 text-center">
                                                    <div className="loader border-t-emerald-500 border-r-transparent border-b-transparent border-l-transparent"></div>
                                                    <p className="text-slate-400 font-bold animate-pulse">正在透過後端代理生成建議...</p>
                                                </div>
                                            ) : (
                                                <div className="bg-emerald-50 p-10 rounded-[3rem] border border-emerald-100 text-emerald-950 font-bold leading-relaxed whitespace-pre-wrap text-lg">
                                                    {data.nudges || "暫無助推建議。"}
                                                </div>
                                            )}
                                        </div>
                                    )}
                                    {step === 5 && (
                                        <div className="text-center py-10 fade-in">
                                            <div className="w-24 h-24 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-8 shadow-xl">
