<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三系統認知決策導航器 - 互動原型</title>
    <!-- 使用 Tailwind CSS 讓介面變漂亮 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React 核心，讓我們能在網頁跑組件 -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel 負責把 JSX 語法轉成瀏覽器看得懂的 JS -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- 小圖標組件 (簡單的 SVG) ---
        // 修復說明：JSX 要求多個相鄰元素必須包裹在父標籤或 Fragment (<>...</>) 中
        const Icon = ({ name, className = "w-6 h-6" }) => {
            const icons = {
                brain: <path d="M12 2a5 5 0 0 1 5 5c0 1.25-.46 2.39-1.21 3.26A5 5 0 0 1 12 19a5 5 0 0 1-3.79-8.74A5 5 0 0 1 7 7a5 5 0 0 1 5-5zM9 7.5a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3zM15 7.5a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3z" />,
                compass: (
                    <>
                        <circle cx="12" cy="12" r="10"/>
                        <path d="m16.24 7.76-1.42 4.24-4.24 1.42 1.42-4.24 4.24-1.42Z"/>
                        <line x1="12" x2="12" y1="2" y2="4"/>
                        <line x1="12" x2="12" y1="20" y2="22"/>
                        <line x1="2" x2="4" y1="12" y2="12"/>
                        <line x1="20" x2="22" y1="12" y2="12"/>
                    </>
                ),
                map: <path d="M14.12 3.88 16 2l4 4-1.88 1.88M19 11l-8 8M15 11l-8 8M11 11l-8 8" />,
                alert: (
                    <>
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" x2="12" y1="8" y2="12"/>
                        <line x1="12" x2="12.01" y1="16" y2="16"/>
                    </>
                ),
                check: <polyline points="20 6 9 17 4 12" />,
                chevronRight: <polyline points="9 18 15 12 9 6" />,
                chevronLeft: <polyline points="15 18 9 12 15 6" />
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || <circle cx="12" cy="12" r="10" />}
                </svg>
            );
        };

        // --- 頁面內容：實施路徑圖 ---
        const RoadmapView = () => (
            <div className="fade-in space-y-8">
                <h2 className="text-3xl font-extrabold text-indigo-900">產品實施路徑圖</h2>
                <div className="space-y-6">
                    {[
                        { stage: "階段一：基礎建設", time: "1-2 個月", focus: "直覺抓漏引擎", desc: "開發 NLP 偏誤檢測，識別使用者的直覺陷阱。", icon: "brain", color: "orange" },
                        { stage: "階段二：核心亮點", time: "3-4 個月", focus: "系統三模擬艙", desc: "利用 AI 生成感官豐富的未來劇本，強化動機。", icon: "compass", color: "indigo" },
                        { stage: "階段三：環境整合", time: "5 個月", focus: "助推自動化", desc: "與手機 Widget 聯動，修改使用者的選擇架構。", icon: "check", color: "emerald" }
                    ].map((item, i) => (
                        <div key={i} className="flex gap-6 p-6 bg-white rounded-3xl border border-slate-100 shadow-sm">
                            <div className={`bg-${item.color}-100 text-${item.color}-600 p-4 rounded-2xl h-fit`}>
                                <Icon name={item.icon} className="w-8 h-8" />
                            </div>
                            <div>
                                <div className="flex items-center gap-2 mb-1">
                                    <span className="text-xs font-bold uppercase tracking-tighter text-slate-400">{item.time}</span>
                                    <span className="w-1 h-1 bg-slate-300 rounded-full"></span>
                                    <h3 className="font-bold text-xl">{item.stage}</h3>
                                </div>
                                <p className="font-semibold text-indigo-600 mb-2">{item.focus}</p>
                                <p className="text-slate-500 text-sm leading-relaxed">{item.desc}</p>
                            </div>
                        </div>
                    ))}
                </div>
            </div>
        );

        // --- 頁面內容：決策流程 ---
        const DecisionFlow = ({ step, setStep }) => {
            const renderStepContent = () => {
                switch(step) {
                    case 1: return (
                        <div className="fade-in">
                            <h3 className="text-orange-500 font-bold text-sm mb-2">STEP 1: 直覺捕捉</h3>
                            <h2 className="text-3xl font-extrabold mb-6">先別分析，<br/>你的<span className="text-indigo-600">第一反應</span>是？</h2>
                            <textarea className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-3xl h-32 outline-none focus:border-indigo-500 transition-all" placeholder="例如：我現在想把所有的錢都拿去買這支股票..." />
                            <div className="mt-6 p-5 bg-orange-50 rounded-2xl border border-orange-100 flex gap-4">
                                <Icon name="alert" className="text-orange-500 shrink-0" />
                                <p className="text-sm text-orange-800">小心！這看起來像是「框架效應」。你是不是只看到了好處，卻沒看到背後的風險？</p>
                            </div>
                        </div>
                    );
                    case 2: return (
                        <div className="fade-in">
                            <h3 className="text-blue-500 font-bold text-sm mb-2">STEP 2: 邏輯審計</h3>
                            <h2 className="text-3xl font-extrabold mb-6">啟動你的<br/><span className="text-indigo-600">理智清單</span></h2>
                            <div className="space-y-3">
                                {["我檢查過數據了嗎？", "我有聽過反對意見嗎？", "我能承受最壞結果嗎？"].map((t, i) => (
                                    <div key={i} className="p-4 bg-white border border-slate-200 rounded-2xl flex items-center gap-4 hover:border-indigo-500 transition-all cursor-pointer">
                                        <div className="w-6 h-6 border-2 border-slate-200 rounded-md" />
                                        <span className="font-medium">{t}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    );
                    case 3: return (
                        <div className="fade-in">
                            <h3 className="text-indigo-500 font-bold text-sm mb-2">STEP 3: 未來模擬</h3>
                            <h2 className="text-3xl font-extrabold mb-6">進入<br/><span className="text-indigo-600">模擬艙</span>預習生活</h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div className="p-6 bg-indigo-50 rounded-3xl border border-indigo-100">
                                    <p className="font-bold text-indigo-900 mb-2">一年後的下午</p>
                                    <p className="text-sm text-indigo-700">模擬你成功後的樣子。你在哪裡？你在跟誰說話？那種感覺是什麼？</p>
                                </div>
                                <div className="p-6 bg-white border border-slate-100 rounded-3xl shadow-sm">
                                    <p className="font-bold text-slate-800 mb-2">身分對齊</p>
                                    <p className="text-sm text-slate-500">做這個決定的人，是你理想中的那個「自己」嗎？</p>
                                </div>
                            </div>
                        </div>
                    );
                    case 4: return (
                        <div className="fade-in text-center py-10">
                            <div className="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-6">
                                <Icon name="check" className="w-10 h-10" />
                            </div>
                            <h2 className="text-3xl font-extrabold mb-4">決策完成！</h2>
                            <p className="text-slate-500 mb-8">我們已經把你的直覺、邏輯與未來的願景都整合好了。</p>
                            <button className="bg-slate-900 text-white px-10 py-4 rounded-full font-bold shadow-2xl hover:bg-black transition-all">
                                下載我的決策報告
                            </button>
                        </div>
                    );
                }
            };

            return (
                <div>
                    {renderStepContent()}
                    {step < 4 && (
                        <div className="mt-12 pt-6 border-t flex justify-between items-center">
                            <button onClick={() => setStep(s => s - 1)} disabled={step === 1} className={`font-bold flex items-center gap-2 ${step === 1 ? 'text-slate-200' : 'text-slate-400 hover:text-slate-600'}`}>
                                <Icon name="chevronLeft" /> 上一步
                            </button>
                            <button onClick={() => setStep(s => s + 1)} className="bg-indigo-600 text-white px-8 py-3 rounded-full font-bold flex items-center gap-2 hover:bg-indigo-700 shadow-xl shadow-indigo-100">
                                下一步 <Icon name="chevronRight" />
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        // --- 主應用組件 ---
        function App() {
            const [view, setView] = useState('flow'); // 'flow' 或 'roadmap'
            const [step, setStep] = useState(1);

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col items-center py-12 px-4">
                    <div className="w-full max-w-2xl">
                        {/* 頂部切換 */}
                        <div className="flex bg-slate-200 p-1.5 rounded-2xl mb-12 w-fit mx-auto shadow-inner">
                            <button onClick={() => setView('flow')} className={`px-6 py-2 rounded-xl font-bold transition-all flex items-center gap-2 ${view === 'flow' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500'}`}>
                                <Icon name="brain" className="w-5 h-5" /> 互動原型
                            </button>
                            <button onClick={() => setView('roadmap')} className={`px-6 py-2 rounded-xl font-bold transition-all flex items-center gap-2 ${view === 'roadmap' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500'}`}>
                                <Icon name="map" className="w-5 h-5" /> 實施路徑
                            </button>
                        </div>

                        {/* 主要卡片容器 */}
                        <div className="bg-white rounded-[3rem] shadow-2xl shadow-slate-200 border border-slate-100 overflow-hidden min-h-[500px] flex flex-col p-8 md:p-12">
                            {view === 'flow' ? <DecisionFlow step={step} setStep={setStep} /> : <RoadmapView />}
                        </div>

                        <footer className="mt-12 text-center text-slate-300 text-xs font-bold uppercase tracking-widest">
                            Cognitive Decision Navigator v1.0
                        </footer>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
