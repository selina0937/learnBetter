<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COGNAV - 三系統 AI 決策導航器</title>
    <!-- 引入開發所需的 CDN 資源 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background: white !important; padding: 0 !important; }
            .report-card { border: none !important; box-shadow: none !important; width: 100% !important; max-width: 100% !important; }
        }
        .print-only { display: none; }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #4f46e5; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, Fragment } = React;

        // --- 安全機制：金鑰管理 ---
        const getStoredKey = () => sessionStorage.getItem('COGNAV_API_KEY') || "";
        const saveKeyToStorage = (key) => sessionStorage.setItem('COGNAV_API_KEY', key.trim().replace(/\s/g, ''));

        // --- 通用 AI 請求函數 ---
        async function callGemini(currentKey, prompt) {
            const trials = [
                { ver: 'v1beta', mod: 'gemini-2.5-flash-preview-09-2025' },
                { ver: 'v1beta', mod: 'gemini-2.5-flash' },
                { ver: 'v1', mod: 'gemini-2.5-flash' }
            ];

            let lastErr = null;
            for (let trial of trials) {
                const url = `https://generativelanguage.googleapis.com/${trial.ver}/models/${trial.mod}:generateContent?key=${currentKey}`;
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    const data = await response.json();
                    if (response.ok) return data.candidates?.[0]?.content?.parts?.[0]?.text;
                    lastErr = { status: response.status, msg: data.error?.message };
                } catch (e) {
                    lastErr = { status: "Network", msg: e.message };
                }
            }
            throw lastErr;
        }

        // --- 組件：圖標渲染 ---
        function Icon({ name, className = "w-6 h-6" }) {
            const getIconContent = () => {
                switch(name) {
                    case 'brain': return <path d="M12 2a5 5 0 0 1 5 5c0 1.25-.46 2.39-1.21 3.26A5 5 0 0 1 12 19a5 5 0 0 1-3.79-8.74A5 5 0 0 1 7 7a5 5 0 0 1 5-5zM9 7.5a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3zM15 7.5a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3z" />;
                    case 'compass': return <g><circle cx="12" cy="12" r="10"/><path d="m16.24 7.76-1.42 4.24-4.24 1.42 1.42-4.24 4.24-1.42Z"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2"/></g>;
                    case 'check': return <polyline points="20 6 9 17 4 12" />;
                    case 'alert': return <g><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y1="16"/></g>;
                    case 'map': return <path d="M1 6v16l7-4 8 4 7-4V2l-7 4-8-4-7 4zm7-2v16m8-12v16" />;
                    case 'sparkles': return <path d="m12 3 1.912 5.813a2 2 0 0 0 1.275 1.275L21 12l-5.813 1.912a2 2 0 0 0-1.275 1.275L12 21l-1.912-5.813a2 2 0 0 0-1.275-1.275L3 12l5.813-1.912a2 2 0 0 0 1.275-1.275L12 3Z" />;
                    case 'file': return <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z" />;
                    case 'settings': return <g><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></g>;
                    case 'key': return <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.778-7.778zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3L15.5 7.5z"/>;
                    case 'zap': return <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />;
                    case 'chevronRight': return <polyline points="9 18 15 12 9 6" />;
                    case 'chevronLeft': return <polyline points="15 18 9 12 15 6" />;
                    default: return <circle cx="12" cy="12" r="10" />;
                }
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {getIconContent()}
                </svg>
            );
        }

        // --- 組件：實施路徑圖 ---
        function RoadmapView() {
            return (
                <div className="fade-in space-y-8">
                    <h2 className="text-3xl font-extrabold text-indigo-900 text-center tracking-tighter">實施路徑圖</h2>
                    <div className="space-y-6 text-left">
                        {[
                            { title: "階段一：MVP 基礎建設", desc: "完成直覺捕捉與邏輯檢核基礎功能 (Done)." },
                            { title: "階段二：AI 2.5-Flash 整合", desc: "實現系統三未來感官模擬劇本 (Done)." },
                            { title: "階段三：智慧助推與環境", desc: "AI 自動根據決策生成 Nudge 環境助推方案 (當前)." },
                            { title: "階段四：商業化與安全隱藏", desc: "導入後端 Proxy 隱藏 API Key 並建立付費訂閱制。" }
                        ].map((stage, idx) => (
                            <div key={idx} className={`flex gap-4 p-5 rounded-2xl border ${idx === 2 ? 'bg-indigo-50 border-indigo-200 ring-2 ring-indigo-200 ring-opacity-50' : 'bg-slate-50 border-slate-100'}`}>
                                <div className={`w-10 h-10 rounded-full flex items-center justify-center shrink-0 font-bold ${idx === 2 ? 'bg-indigo-600 text-white' : 'bg-slate-300 text-white'}`}>{idx + 1}</div>
                                <div>
                                    <h4 className={`font-bold ${idx === 2 ? 'text-indigo-900' : 'text-slate-800'}`}>{stage.title}</h4>
                                    <p className="text-sm text-slate-500 font-medium">{stage.desc}</p>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        // --- 組件：列印報告 ---
        function PrintableReport({ data }) {
            return (
                <div className="p-12 bg-white text-slate-900 border border-slate-200 rounded-lg max-w-4xl mx-auto report-card text-left">
                    <div className="flex justify-between items-start border-b-4 border-indigo-600 pb-6 mb-8 text-left">
                        <div>
                            <h1 className="text-3xl font-bold text-indigo-900 mb-1 font-inter uppercase tracking-tight">Cognitive Audit Report</h1>
                            <p className="text-slate-500 text-sm italic font-medium tracking-wide">三系統決策導航分析報告 • Powered by Gemini 2.5-Flash</p>
                        </div>
                        <div className="text-right text-xs font-bold text-slate-400">
                            <p>生成日期：{new Date().toLocaleDateString()}</p>
                        </div>
                    </div>
                    <div className="space-y-10">
                        <section>
                            <h2 className="bg-slate-50 p-2 text-lg font-bold border-l-4 border-orange-500 mb-3 uppercase tracking-widest text-xs">Step 1: Intuition</h2>
                            <p className="text-xl font-medium leading-relaxed pl-4">{data.decision || "未輸入內容"}</p>
                        </section>
                        <section>
                            <h2 className="bg-slate-50 p-2 text-lg font-bold border-l-4 border-blue-500 mb-3 uppercase tracking-widest text-xs">Step 2: Logic</h2>
                            <div className="pl-4 space-y-2 font-medium text-slate-700">
                                {data.system2Checks.map((item, i) => (
                                    <div key={i} className="flex items-center gap-3">
                                        <span>{item.checked ? "✓" : "✗"}</span>
                                        <span>{item.text}</span>
                                    </div>
                                ))}
                            </div>
                        </section>
                        <section>
                            <h2 className="bg-slate-50 p-2 text-lg font-bold border-l-4 border-indigo-600 mb-3 uppercase tracking-widest text-xs">Step 3: Future Simulation</h2>
                            <div className="italic bg-indigo-50 p-6 rounded-2xl text-indigo-900 leading-relaxed whitespace-pre-wrap text-sm font-medium">
                                {data.futureScript || "⚠️ 未生成模擬劇本。"}
                            </div>
                        </section>
                        <section>
                            <h2 className="bg-slate-50 p-2 text-lg font-bold border-l-4 border-emerald-500 mb-3 uppercase tracking-widest text-xs">Step 4: Smart Nudges</h2>
                            <div className="pl-4 space-y-4 font-medium text-slate-700 leading-relaxed whitespace-pre-wrap">
                                {data.nudges || "⚠️ 未生成助推建議。"}
                            </div>
                        </section>
                    </div>
                    <div className="mt-20 pt-8 border-t border-slate-100 text-center text-slate-400 text-[10px] tracking-widest uppercase font-bold">
                        <p>Powered by COGNAV Decision Support Engine • Based on Dual Process Theory</p>
                    </div>
                </div>
            );
        }

        // --- 主應用組件 ---
        function App() {
            const [view, setView] = useState('flow'); 
            const [step, setStep] = useState(1);
            const [isAiLoading, setIsAiLoading] = useState(false);
            const [isNudgeLoading, setIsNudgeLoading] = useState(false);
            const [aiError, setAiError] = useState(null);
            const [showKeyModal, setShowKeyModal] = useState(false);
            const [tempKey, setTempKey] = useState(getStoredKey());
            const [data, setData] = useState({
                decision: '',
                system2Checks: [
                    { text: "我已經檢查過過去五年的數據基準。", checked: false },
                    { text: "我徵詢過三位反對者的真實意見。", checked: false },
                    { text: "我能承受失敗後產生的具體後果。", checked: false }
                ],
                futureScript: '',
                nudges: ''
            });

            useEffect(() => {
                if (!getStoredKey()) setShowKeyModal(true);
            }, []);

            const toggleCheck = (index) => {
                const newChecks = [...data.system2Checks];
                newChecks[index].checked = !newChecks[index].checked;
                setData({...data, system2Checks: newChecks});
            };

            const handleAiGeneration = async () => {
                const key = getStoredKey();
                if (!key) { setShowKeyModal(true); return; }
                setIsAiLoading(true); setAiError(null);
                try {
                    const text = await callGemini(key, `你是認知科學專家。針對決策：『${data.decision}』，生成一段 300 字、感官豐富的未來成功模擬劇本。包含視覺、聽覺、嗅覺。直接輸出內容。`);
                    setData(prev => ({...prev, futureScript: text}));
                } catch (e) { 
                    setAiError(e); 
                    if (e.status === 401) setShowKeyModal(true);
                } finally { setIsAiLoading(false); }
            };

            const handleNudgeGeneration = async () => {
                const key = getStoredKey();
                if (!key) return;
                setIsNudgeLoading(true);
                try {
                    const prompt = `你是行為經濟學家。根據使用者決策：『${data.decision}』及其未來模擬內容：『${data.futureScript}』，設計 3 個具體的「環境助推 (Nudge)」方案。
                    1. 增加負面行為摩擦力（例如：把手機關機放在客廳）。
                    2. 降低正面行為摩擦力（例如：睡前把書翻開放在枕頭旁）。
                    3. 視覺/物理提示（例如：Step 3 的劇本截圖設為桌面）。
                    請用列點方式具體描述，語氣專業且實務。直接輸出建議內容。`;
                    const text = await callGemini(key, prompt);
                    setData(prev => ({...prev, nudges: text}));
                } catch (e) { console.error(e); }
                finally { setIsNudgeLoading(false); }
            };

            // 自動觸發助推生成 (當進入第四步且內容為空時)
            useEffect(() => {
                if (step === 4 && !data.nudges && data.decision && !isNudgeLoading) {
                    handleNudgeGeneration();
                }
            }, [step]);

            return (
                <div className="min-h-screen bg-slate-50 text-slate-800 tracking-tight font-sans">
                    <div className="min-h-screen flex flex-col items-center py-12 px-4 no-print">
                        <div className="w-full max-w-2xl">
                            {/* 頂部導航 */}
                            <div className="flex justify-between items-center mb-8">
                                <div className="flex bg-slate-200 p-1.5 rounded-2xl shadow-inner">
                                    <button onClick={() => setView('flow')} className={`px-6 py-2 rounded-xl font-bold transition-all ${view === 'flow' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500 hover:text-slate-800'}`}>互動原型</button>
                                    <button onClick={() => setView('roadmap')} className={`px-6 py-2 rounded-xl font-bold transition-all ${view === 'roadmap' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500 hover:text-slate-800'}`}>實施路徑</button>
                                </div>
                                <button onClick={() => setShowKeyModal(true)} className="p-3 bg-white border border-slate-200 rounded-2xl text-slate-400 hover:text-indigo-600 shadow-sm transition-all">
                                    <Icon name="settings" className="w-5 h-5" />
                                </button>
                            </div>

                            {/* 主要內容卡片 */}
                            <div className="bg-white rounded-[3rem] shadow-2xl shadow-slate-200 border border-slate-100 p-10 md:p-14 min-h-[550px] flex flex-col justify-between overflow-hidden relative text-left">
                                {view === 'flow' ? (
                                    <Fragment>
                                        {step === 1 && (
                                            <div className="fade-in">
                                                <h2 className="text-3xl font-extrabold mb-6 text-indigo-900 tracking-tighter">捕捉<span className="text-indigo-600">直覺</span></h2>
                                                <p className="text-slate-500 mb-6 text-sm font-medium leading-relaxed italic">System 1 Audit：在理智介入前，寫下你最真實的聲音。</p>
                                                <textarea className="w-full p-6 bg-slate-50 border-2 border-slate-100 rounded-3xl h-44 outline-none focus:border-indigo-500 font-medium text-lg shadow-inner" placeholder="例如：我想把儲蓄投入這次的投資，因為看起來很有機會..." value={data.decision} onChange={(e)=>setData({...data, decision: e.target.value})} />
                                            </div>
                                        )}
                                        {step === 2 && (
                                            <div className="fade-in">
                                                <h2 className="text-3xl font-extrabold mb-6 tracking-tighter">理智檢核</h2>
                                                <p className="text-slate-500 mb-6 text-sm font-medium leading-relaxed italic text-left">System 2 Analysis：啟動冷靜的慢思考，檢測統計與機率偏誤。</p>
                                                <div className="space-y-4">
                                                    {data.system2Checks.map((item, i) => (
                                                        <div key={i} onClick={() => toggleCheck(i)} className={`p-5 rounded-2xl border-2 flex items-center gap-4 cursor-pointer transition-all ${item.checked ? 'bg-indigo-50 border-indigo-200' : 'bg-white border-slate-100 hover:border-slate-300'}`}>
                                                            <div className={`w-7 h-7 rounded-lg border-2 flex items-center justify-center ${item.checked ? 'bg-indigo-600 border-indigo-600 text-white' : 'border-slate-300'}`}>{item.checked && <Icon name="check" className="w-4 h-4" />}</div>
                                                            <span className={item.checked ? "text-indigo-900 line-through opacity-60 font-medium" : "text-slate-700 font-medium"}>{item.text}</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                        {step === 3 && (
                                            <div className="fade-in text-center">
                                                <h2 className="text-3xl font-extrabold mb-6 tracking-tighter">未來模擬艙</h2>
                                                <p className="text-slate-500 mb-8 text-sm font-medium leading-relaxed italic text-left">System 3 Simulation：將邏輯與感官連結，建立持久的行為動力。</p>
                                                {!data.futureScript ? (
                                                    <Fragment>
                                                        <button onClick={handleAiGeneration} disabled={isAiLoading} className="w-full py-10 bg-indigo-50 border-2 border-dashed border-indigo-200 rounded-[2.5rem] flex flex-col items-center justify-center gap-4 hover:bg-indigo-100 transition-all text-indigo-600 font-bold group">
                                                            {isAiLoading ? (
                                                                <div className="flex flex-col items-center gap-3"><div className="loading-spinner"></div><span className="animate-pulse">正在調用 Gemini 2.5 進行感官渲染...</span></div>
                                                            ) : (
                                                                <Fragment><Icon name="sparkles" className="w-10 h-10 group-hover:scale-110 transition-transform" /><span>啟動 AI 感官劇本生成</span></Fragment>
                                                            )}
                                                        </button>
                                                        {aiError && <p className="mt-4 text-red-500 text-xs font-mono break-all">{aiError.msg}</p>}
                                                    </Fragment>
                                                ) : (
                                                    <div className="p-8 bg-slate-900 text-white rounded-[2.5rem] shadow-2xl relative text-left">
                                                        <div className="flex justify-between items-center mb-4 border-b border-white/10 pb-2">
                                                            <span className="text-[10px] font-bold uppercase tracking-[0.3em] text-indigo-400">Identity Alignment Simulation</span>
                                                            <button onClick={() => setData({...data, futureScript: ''})} className="text-[10px] text-slate-400 hover:text-white uppercase font-bold flex items-center gap-1 transition-colors">重新生成</button>
                                                        </div>
                                                        <p className="text-slate-200 italic leading-relaxed whitespace-pre-wrap font-medium">{data.futureScript}</p>
                                                    </div>
                                                )}
                                            </div>
                                        )}
                                        {step === 4 && (
                                            <div className="fade-in">
                                                <div className="flex items-center gap-3 text-emerald-600 mb-6">
                                                    <Icon name="zap" className="w-6 h-6" />
                                                    <h2 className="text-3xl font-extrabold tracking-tighter">智慧助推建議</h2>
                                                </div>
                                                <div className="space-y-4">
                                                    {isNudgeLoading ? (
                                                        <div className="p-12 bg-emerald-50 rounded-[2rem] flex flex-col items-center gap-4 text-emerald-700">
                                                            <div className="loading-spinner border-t-emerald-600"></div>
                                                            <p className="font-bold animate-pulse">正在根據決策與願景設計環境助推方案...</p>
                                                        </div>
                                                    ) : (
                                                        <Fragment>
                                                            <div className="bg-emerald-50 p-8 rounded-[2rem] border border-emerald-100 text-emerald-900 font-medium leading-relaxed whitespace-pre-wrap">
                                                                {data.nudges || "正在生成建議中..."}
                                                            </div>
                                                            <div className="flex gap-4">
                                                                <button onClick={handleNudgeGeneration} className="text-xs text-emerald-600 underline font-bold px-2 py-1">重新生成助推方案</button>
                                                            </div>
                                                        </Fragment>
                                                    )}
                                                </div>
                                                <div className="mt-12 text-center py-6 border-t border-slate-50">
                                                    <button onClick={() => window.print()} className="bg-indigo-600 text-white px-10 py-4 rounded-full font-bold shadow-xl hover:bg-indigo-700 flex items-center gap-3 mx-auto active:scale-95 shadow-indigo-100 transition-all">
                                                        <Icon name="file" className="w-5 h-5" /> 下載完整 PDF 決策報告
                                                    </button>
                                                </div>
                                            </div>
                                        )}

                                        {step < 4 && (
                                            <div className="mt-12 flex justify-between items-center pt-8 border-t border-slate-50">
                                                <button onClick={() => setStep(s => s - 1)} disabled={step === 1} className={`font-bold flex items-center gap-1 ${step === 1 ? 'text-slate-200' : 'text-slate-400 hover:text-slate-600 transition-colors'}`}><Icon name="chevronLeft" className="w-5 h-5" /> 上一步</button>
                                                <button onClick={() => setStep(s => s + 1)} className="bg-slate-900 text-white px-10 py-3.5 rounded-full font-bold flex items-center gap-2 hover:bg-black shadow-lg transition-all active:scale-95 shadow-slate-100 font-inter">下一步 <Icon name="chevronRight" className="w-5 h-5" /></button>
                                            </div>
                                        )}
                                    </Fragment>
                                ) : (
                                    <RoadmapView />
                                )}
                            </div>
                        </div>
                    </div>

                    {/* 金鑰管理彈窗 */}
                    {showKeyModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-[2.5rem] p-10 max-w-md w-full shadow-2xl fade-in border border-indigo-50">
                                <div className="flex items-center gap-3 text-indigo-600 mb-6">
                                    <div className="bg-indigo-50 p-2 rounded-xl"><Icon name="key" className="w-6 h-6" /></div>
                                    <h3 className="text-2xl font-extrabold tracking-tight text-left">API 安全設定</h3>
                                </div>
                                <p className="text-slate-500 mb-6 text-sm font-medium leading-relaxed text-left">
                                    請填入支援 <b>Gemini 2.5-Flash</b> 的 API Key。金鑰僅存在本機分頁，不會上傳到 GitHub。
                                </p>
                                <input 
                                    type="password" 
                                    className="w-full p-4 bg-slate-50 rounded-2xl border-2 border-slate-100 focus:border-indigo-600 outline-none mb-6 font-mono text-sm shadow-inner" 
                                    placeholder="貼上您的 API Key" 
                                    value={tempKey}
                                    onChange={(e)=>setTempKey(e.target.value)}
                                />
                                <div className="flex gap-3">
                                    <button onClick={() => setShowKeyModal(false)} className="flex-1 py-4 bg-slate-100 rounded-2xl font-bold hover:bg-slate-200 transition-all text-slate-600 text-sm">取消</button>
                                    <button onClick={() => { saveKeyToStorage(tempKey); setShowKeyModal(false); }} className="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-bold hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-200 text-sm">儲存設定</button>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {/* PDF 隱藏報告 */}
                    <div className="print-only"><PrintableReport data={data} /></div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
